<svg viewBox="0 0 720 400" width="1080" height="600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="400" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Plane Sweeping — 폭 D의 활성 창이 미끄러진다</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">왼쪽 끝은 밀려나고 · 오른쪽 끝으로 새 점이 들어온다 · y창 안만 비교</text>

  <!-- Chart area: x 70~650, y 70~350 -->

  <!-- Active window background (width D, left of sweep line) -->
  <rect x="392" y="70" width="130" height="280" fill="#1e3a5f" fill-opacity="0.30"/>

  <!-- Removed region (left of window) — dim wash -->
  <rect x="70" y="70" width="322" height="280" fill="#1a1d26" fill-opacity="0.5"/>

  <!-- Sweep line at current point P -->
  <line x1="522" y1="66" x2="522" y2="354" stroke="#f97316" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="522" y="60" text-anchor="middle" fill="#f97316" font-size="11" font-weight="700">sweep line (x = x_P)</text>

  <!-- Left window boundary -->
  <line x1="392" y1="70" x2="392" y2="350" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- D bracket (window width) -->
  <line x1="392" y1="84" x2="522" y2="84" stroke="#3b82f6" stroke-width="1"/>
  <line x1="392" y1="80" x2="392" y2="88" stroke="#3b82f6" stroke-width="1"/>
  <line x1="522" y1="80" x2="522" y2="88" stroke="#3b82f6" stroke-width="1"/>
  <text x="457" y="80" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">D</text>

  <!-- y-window query box around P (width D-ish x, height 2D) — green outline -->
  <rect x="392" y="150" width="130" height="120" fill="#14331f" fill-opacity="0.30" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="537" y="156" fill="#4ade80" font-size="10">y_P + D</text>
  <text x="537" y="272" fill="#4ade80" font-size="10">y_P − D</text>

  <!-- Removed points (left of window) — gray -->
  <circle cx="110" cy="130" r="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="160" cy="250" r="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="230" cy="180" r="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="300" cy="300" r="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="340" cy="110" r="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>

  <!-- Active points inside window but OUTSIDE y-window — blue -->
  <circle cx="430" cy="100" r="7" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="480" cy="320" r="7" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>

  <!-- Active points inside y-window — green (candidates) -->
  <circle cx="425" cy="185" r="7" fill="#14331f" stroke="#22c55e" stroke-width="2"/>
  <circle cx="470" cy="240" r="7" fill="#14331f" stroke="#22c55e" stroke-width="2"/>

  <!-- Current point P on sweep line -->
  <circle cx="522" cy="210" r="8" fill="#3b0764" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="522" y="214" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">P</text>

  <!-- Comparison arrows from P to green candidates -->
  <line x1="522" y1="210" x2="425" y2="185" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.85"/>
  <line x1="522" y1="210" x2="470" y2="240" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.85"/>

  <!-- Slide arrow at bottom -->
  <line x1="120" y1="368" x2="230" y2="368" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="255" y="372" fill="#64748b" font-size="10">훑는 방향 (x 증가)</text>
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Legend -->
  <circle cx="360" cy="368" r="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <text x="372" y="372" fill="#64748b" font-size="10">창에서 빠짐</text>
  <circle cx="470" cy="368" r="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="482" y="372" fill="#93c5fd" font-size="10">활성(y창 밖)</text>
  <circle cx="590" cy="368" r="6" fill="#14331f" stroke="#22c55e" stroke-width="2"/>
  <text x="602" y="372" fill="#4ade80" font-size="10">후보</text>
</svg>
