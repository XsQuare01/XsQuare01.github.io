<svg viewBox="0 0 720 400" width="1080" height="600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="400" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">복잡도 분석 — O(n log n)</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">n개 점을 훑으며, 점마다 균형 BST 연산 세 가지를 각 O(log n)에</text>

  <!-- n points row (sweep) -->
  <text x="60" y="94" text-anchor="middle" fill="#f97316" font-size="11" font-weight="700">n개 점</text>
  <text x="60" y="108" text-anchor="middle" fill="#64748b" font-size="9">x순 훑기</text>
  <g>
    <circle cx="130" cy="98" r="6" fill="#3b0764" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="160" cy="98" r="6" fill="#334155" stroke="#475569" stroke-width="1.3"/>
    <circle cx="190" cy="98" r="6" fill="#334155" stroke="#475569" stroke-width="1.3"/>
    <circle cx="220" cy="98" r="6" fill="#334155" stroke="#475569" stroke-width="1.3"/>
    <text x="250" y="102" fill="#475569" font-size="14">⋯</text>
    <circle cx="280" cy="98" r="6" fill="#334155" stroke="#475569" stroke-width="1.3"/>
  </g>
  <line x1="130" y1="118" x2="130" y2="140" stroke="#64748b" stroke-width="1.3" marker-end="url(#arrc)"/>
  <text x="360" y="102" text-anchor="middle" fill="#64748b" font-size="10">각 점마다 ↓</text>
  <defs>
    <marker id="arrc" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Three per-point operations -->
  <rect x="100" y="150" width="160" height="66" rx="7" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="176" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">① 삽입</text>
  <text x="180" y="196" text-anchor="middle" fill="#64748b" font-size="10">set.insert</text>
  <text x="180" y="210" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">O(log n)</text>

  <rect x="280" y="150" width="160" height="66" rx="7" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
  <text x="360" y="176" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">② 삭제 (왼쪽 밀기)</text>
  <text x="360" y="196" text-anchor="middle" fill="#64748b" font-size="10">점당 최대 1회, 전체 O(n)</text>
  <text x="360" y="210" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">O(log n)</text>

  <rect x="460" y="150" width="160" height="66" rx="7" fill="#2d1f3f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="540" y="176" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">③ y창 조회</text>
  <text x="540" y="192" text-anchor="middle" fill="#64748b" font-size="10">lower/upper_bound</text>
  <text x="540" y="204" text-anchor="middle" fill="#64748b" font-size="9">후보 상수 개 → 비교 O(1)</text>
  <text x="540" y="216" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">O(log n)</text>

  <!-- Per-point subtotal -->
  <line x1="360" y1="222" x2="360" y2="248" stroke="#64748b" stroke-width="1.3" marker-end="url(#arrc)"/>
  <rect x="230" y="252" width="260" height="30" rx="6" fill="#161a22" stroke="#334155" stroke-width="1"/>
  <text x="360" y="272" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">점 하나당 O(log n)</text>

  <!-- multiply by n -->
  <line x1="360" y1="284" x2="360" y2="310" stroke="#64748b" stroke-width="1.3" marker-end="url(#arrc)"/>
  <text x="400" y="302" text-anchor="start" fill="#a78bfa" font-size="11" font-weight="700">× n개 점</text>

  <!-- initial sort note -->
  <text x="360" y="330" text-anchor="middle" fill="#4ade80" font-size="11">초기 x정렬 O(n log n)은 딱 한 번 — 지배항 아님</text>

  <!-- Summary box -->
  <rect x="180" y="346" width="360" height="34" rx="6" fill="#2d1f3f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="360" y="368" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">n × O(log n) = O(n log n)</text>
</svg>
