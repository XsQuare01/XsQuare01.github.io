<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 325" width="930" height="488">
  <rect width="620" height="325" fill="#0f1117" rx="10"/>
  <text x="310" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">정지 문제 모순 증명 — S(⟨S⟩) 자기 참조</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#6b7280"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#f87171"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect x="14" y="30" width="592" height="113" rx="6" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="30" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#9ca3af" font-weight="600">기계 S 의 구성</text>

  <line x1="14" y1="85" x2="64" y2="85" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="39" y="77" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">⟨M⟩</text>

  <rect x="64" y="65" width="115" height="40" rx="4" fill="#1a2035" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="121" y="81" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#60a5fa">H 결정기</text>
  <text x="121" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#93c5fd">(Halting 결정 TM)</text>

  <line x1="179" y1="85" x2="225" y2="85" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="202" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#9ca3af">Y/N</text>

  <rect x="225" y="65" width="110" height="40" rx="4" fill="#1a2035" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="280" y="81" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#a78bfa">결과 반전</text>
  <text x="280" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#c4b5fd">(Y → 루프,  N → 정지)</text>

  <line x1="335" y1="85" x2="365" y2="85" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="365" y="57" width="230" height="56" rx="4" fill="#161d2e" stroke="#374151" stroke-width="1.5"/>
  <text x="380" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#f87171">Y → 무한 루프 (S가 멈추지 않음)</text>
  <text x="380" y="98" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4ade80">N → 정지 (accept)</text>

  <line x1="14" y1="155" x2="606" y2="155" stroke="#374151" stroke-width="1"/>
  <text x="310" y="172" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">S(⟨S⟩) 실행 시 모순</text>

  <rect x="14" y="183" width="130" height="40" rx="4" fill="rgba(248,113,113,0.14)" stroke="#f87171" stroke-width="1.5"/>
  <text x="79" y="199" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#f87171">S(⟨S⟩) 정지</text>
  <text x="79" y="214" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#f87171">가정</text>

  <line x1="144" y1="203" x2="172" y2="203" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <rect x="172" y="183" width="90" height="40" rx="4" fill="#1a2035" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="217" y="199" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">H: accept</text>
  <text x="217" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#93c5fd">(정지한다고 판단)</text>

  <line x1="262" y1="203" x2="290" y2="203" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <rect x="290" y="183" width="110" height="40" rx="4" fill="rgba(248,113,113,0.14)" stroke="#f87171" stroke-width="1.5"/>
  <text x="345" y="199" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#f87171">S → 루프</text>
  <text x="345" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#9ca3af">(반전 규칙 적용)</text>

  <line x1="400" y1="203" x2="428" y2="203" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <rect x="428" y="183" width="110" height="40" rx="4" fill="rgba(248,113,113,0.28)" stroke="#f87171" stroke-width="2"/>
  <text x="483" y="207" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#f87171">모순!</text>

  <rect x="14" y="263" width="130" height="40" rx="4" fill="rgba(96,165,250,0.14)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="79" y="279" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">S(⟨S⟩) 루프</text>
  <text x="79" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#60a5fa">가정</text>

  <line x1="144" y1="283" x2="172" y2="283" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <rect x="172" y="263" width="90" height="40" rx="4" fill="#1a2035" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="217" y="279" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">H: reject</text>
  <text x="217" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#93c5fd">(루프한다고 판단)</text>

  <line x1="262" y1="283" x2="290" y2="283" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <rect x="290" y="263" width="110" height="40" rx="4" fill="rgba(96,165,250,0.14)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="345" y="279" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">S → 정지</text>
  <text x="345" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#9ca3af">(반전 규칙 적용)</text>

  <line x1="400" y1="283" x2="428" y2="283" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <rect x="428" y="263" width="110" height="40" rx="4" fill="rgba(248,113,113,0.28)" stroke="#f87171" stroke-width="2"/>
  <text x="483" y="287" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#f87171">모순!</text>
</svg>
