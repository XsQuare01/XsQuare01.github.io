<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" width="900" height="563">
  <rect width="600" height="375" fill="#0f1117" rx="10"/>
  <text x="300" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">언어 클래스 계층도</text>

  <rect x="18" y="28" width="564" height="248" rx="8" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="300" y="44" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4b5563">모든 언어 (All Languages)</text>

  <ellipse cx="215" cy="163" rx="158" ry="100" fill="rgba(96,165,250,0.08)" stroke="#60a5fa" stroke-width="2"/>
  <text x="118" y="107" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17.6" font-weight="700" fill="#60a5fa">E</text>
  <text x="118" y="124" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#93c5fd">Enumerable (RE)</text>

  <ellipse cx="385" cy="163" rx="158" ry="100" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="2"/>
  <text x="482" y="107" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17.6" font-weight="700" fill="#a78bfa">co-E</text>
  <text x="482" y="124" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#c4b5fd">co-Enumerable</text>

  <text x="300" y="153" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="19.2" font-weight="700" fill="#4ade80">D</text>
  <text x="300" y="173" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#86efac">Decidable</text>
  <text x="300" y="189" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#86efac">= E ∩ co-E</text>

  <text x="148" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#60a5fa">L_halt</text>
  <text x="148" y="214" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">∈ E,  ∉ D</text>

  <text x="452" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#a78bfa">L̄_halt</text>
  <text x="452" y="214" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">∈ co-E,  ∉ D</text>

  <text x="300" y="302" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="600" fill="#94a3b8">E와 co-E 모두 바깥에 존재하는 언어</text>
  <text x="300" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">어느 클래스에도 속하지 않는 언어가 존재한다</text>
</svg>
