<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="1290" height="570">
  <rect width="860" height="380" fill="#0f1117" rx="10"/>
  <text x="430" y="16" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">RSA 구조 — 키 구성과 암복호화 흐름</text>

  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#60a5fa"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Left panel (x=15, width=232 → right edge x=247) -->
  <rect x="15" y="28" width="232" height="295" rx="6" fill="rgba(30,41,59,0.5)" stroke="#374151" stroke-width="1.2"/>
  <text x="131" y="46" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#94a3b8">키 구성</text>
  <line x1="15" y1="53" x2="247" y2="53" stroke="#374151" stroke-width="1"/>

  <!-- Row 1: p, q -->
  <text x="30" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#fbbf24">p, q</text>
  <text x="30" y="86" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">큰 소수 선택 · 비공개</text>

  <!-- Row 2: n = pq -->
  <text x="30" y="116" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#e2e8f0">n = p·q</text>
  <text x="30" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#4ade80">공개 (modulus)</text>

  <!-- Row 3: φ(n) -->
  <text x="30" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#fbbf24">φ(n) = (p−1)(q−1)</text>
  <text x="30" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">비공개 · 보안의 핵심</text>

  <!-- Row 4: e -->
  <text x="30" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#e2e8f0">e</text>
  <text x="30" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">gcd(e, φ(n)) = 1 · 공개</text>

  <!-- Row 5: d -->
  <text x="30" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#fbbf24">d</text>
  <text x="30" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">ed ≡ 1 (mod φ(n)) · 비공개</text>

  <!-- Separator + Summary -->
  <line x1="15" y1="278" x2="247" y2="278" stroke="#374151" stroke-width="1"/>
  <text x="131" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="600" fill="#4ade80">공개키: (n, e)</text>
  <text x="131" y="311" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#fbbf24">개인키: (p, q, d, φ(n))</text>

  <!-- Arrow: → encryption -->
  <line x1="247" y1="116" x2="270" y2="98" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Arrow: → decryption -->
  <line x1="247" y1="248" x2="270" y2="260" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Right top: Encryption box (x=270, width=575 → right edge x=845) -->
  <rect x="270" y="28" width="575" height="139" rx="6" fill="rgba(96,165,250,0.06)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="557" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#60a5fa">암호화 (Encryption)</text>
  <line x1="270" y1="55" x2="845" y2="55" stroke="#60a5fa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="557" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14.4" font-weight="700" fill="#93c5fd">C = m^e  mod n</text>
  <text x="557" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">공개키 (n, e) 사용 — 누구나 암호화 가능</text>
  <text x="557" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#60a5fa">평문 m  →  암호문 C</text>

  <!-- Arrow: C flows down -->
  <line x1="557" y1="167" x2="557" y2="192" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="570" y="183" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#94a3b8">C</text>

  <!-- Right bottom: Decryption box -->
  <rect x="270" y="197" width="575" height="126" rx="6" fill="rgba(74,222,128,0.06)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="557" y="217" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">복호화 (Decryption)</text>
  <line x1="270" y1="224" x2="845" y2="224" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="557" y="265" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14.4" font-weight="700" fill="#86efac">m = C^d  mod n</text>
  <text x="557" y="285" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">개인키 d 사용 — 수신자만 복호화 가능</text>
  <text x="557" y="303" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4ade80">암호문 C  →  평문 m</text>

  <!-- Captions -->
  <text x="430" y="345" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="600" fill="#94a3b8">n, e 공개  ·  p, q, d, φ(n) 비공개</text>
  <text x="430" y="362" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">n = pq 소인수분해 → φ(n) → d 역산 가능  — 소인수분해의 어려움이 보안 근거</text>
</svg>
