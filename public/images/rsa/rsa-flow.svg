<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 310" width="620" height="310">
  <rect width="620" height="310" fill="#0f1117" rx="10"/>
  <text x="310" y="16" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">RSA 구조 — 키 구성과 암복호화 흐름</text>

  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#60a5fa"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#4ade80"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Left panel: Key Components -->
  <rect x="15" y="28" width="232" height="228" rx="6" fill="rgba(30,41,59,0.5)" stroke="#374151" stroke-width="1.2"/>
  <text x="131" y="46" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#94a3b8">키 구성</text>
  <line x1="15" y1="53" x2="247" y2="53" stroke="#374151" stroke-width="1"/>

  <text x="30" y="74" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#fbbf24">p, q</text>
  <text x="65" y="74" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#fcd34d">큰 소수 선택  (비공개)</text>

  <text x="30" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">n = p·q</text>
  <text x="110" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4ade80">(공개)</text>

  <text x="30" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#fbbf24">φ(n) = (p−1)(q−1)</text>
  <text x="30" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7a99">(비공개 — 보안의 핵심)</text>

  <text x="30" y="156" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">e</text>
  <text x="44" y="156" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#e2e8f0">:  gcd(e, φ(n)) = 1</text>
  <text x="44" y="169" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4ade80">(공개)</text>

  <text x="30" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#fbbf24">d</text>
  <text x="44" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#fbbf24">:  ed ≡ 1  (mod φ(n))</text>
  <text x="44" y="207" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6b7a99">(비공개)</text>

  <line x1="15" y1="220" x2="247" y2="220" stroke="#374151" stroke-width="1"/>
  <text x="131" y="236" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4ade80">공개키: (n, e)</text>
  <text x="131" y="251" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#fbbf24">개인키: (p, q, d, φ(n))</text>

  <!-- Arrow: key gen → encryption (public key) -->
  <line x1="247" y1="83" x2="270" y2="83" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Arrow: key gen → decryption (private key) -->
  <line x1="247" y1="210" x2="270" y2="210" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Right top: Encryption box -->
  <rect x="270" y="28" width="335" height="110" rx="6" fill="rgba(96,165,250,0.06)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="437" y="47" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#60a5fa">암호화 (Encryption)</text>
  <line x1="270" y1="54" x2="605" y2="54" stroke="#60a5fa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="437" y="85" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#93c5fd">C = m^e  mod n</text>
  <text x="437" y="103" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7a99">공개키 (n, e) 사용 — 누구나 암호화 가능</text>
  <text x="437" y="120" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#60a5fa">평문 m  →  암호문 C</text>

  <!-- Arrow: C flows down -->
  <line x1="437" y1="138" x2="437" y2="163" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="450" y="154" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">C</text>

  <!-- Right bottom: Decryption box -->
  <rect x="270" y="163" width="335" height="93" rx="6" fill="rgba(74,222,128,0.06)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="437" y="182" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ade80">복호화 (Decryption)</text>
  <line x1="270" y1="189" x2="605" y2="189" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="437" y="216" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#86efac">m = C^d  mod n</text>
  <text x="437" y="234" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7a99">개인키 d 사용 — 수신자만 복호화 가능</text>
  <text x="437" y="249" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4ade80">암호문 C  →  평문 m</text>

  <!-- Captions -->
  <text x="310" y="276" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">n, e 공개  ·  p, q, d, φ(n) 비공개</text>
  <text x="310" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">n = pq 소인수분해 → φ(n) → d 역산 가능  — 소인수분해의 어려움이 보안 근거</text>
</svg>
