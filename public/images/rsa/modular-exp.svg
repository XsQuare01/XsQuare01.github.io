<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 295" width="620" height="295">
  <rect width="620" height="295" fill="#0f1117" rx="10"/>
  <text x="310" y="16" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">Square-and-Multiply — 17^23 예시  (23 = 10111₂)</text>

  <!-- Binary bit display -->
  <text x="20" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7a99">지수 비트:</text>
  <rect x="75"  y="25" width="28" height="20" rx="3" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="108" y="25" width="28" height="20" rx="3" fill="rgba(30,41,59,0.5)"    stroke="#374151" stroke-width="1"/>
  <rect x="141" y="25" width="28" height="20" rx="3" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="174" y="25" width="28" height="20" rx="3" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="207" y="25" width="28" height="20" rx="3" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="89"  y="39" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4ade80">1</text>
  <text x="122" y="39" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">0</text>
  <text x="155" y="39" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4ade80">1</text>
  <text x="188" y="39" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4ade80">1</text>
  <text x="221" y="39" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4ade80">1</text>
  <text x="244" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4b5563">← MSB 순서로 처리</text>

  <!--
    Table: y=50 ~ y=237 (height=187)
    Header: y=50~82 (32px)
    Rows 1~5: y=82~237, each 31px
    Row 1: 82~113   Row 2: 113~144   Row 3: 144~175   Row 4: 175~206   Row 5: 206~237
    Text center of each row: +15.5 → 98, 129, 160, 191, 222
  -->
  <rect x="20" y="50" width="580" height="187" rx="4" fill="none" stroke="#2d3748" stroke-width="1.2"/>

  <!-- Column dividers: 단계(20-72) | 비트(72-130) | 연산(130-455) | 누적지수(455-600) -->
  <line x1="72"  y1="50" x2="72"  y2="237" stroke="#2d3748" stroke-width="1"/>
  <line x1="130" y1="50" x2="130" y2="237" stroke="#2d3748" stroke-width="1"/>
  <line x1="455" y1="50" x2="455" y2="237" stroke="#2d3748" stroke-width="1.5"/>

  <!-- Header (y=50~82, text at y=70) -->
  <line x1="20" y1="82" x2="600" y2="82" stroke="#2d3748" stroke-width="1.5"/>
  <text x="46"  y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7a99">단계</text>
  <text x="101" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7a99">비트</text>
  <text x="292" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7a99">연산</text>
  <text x="527" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#fbbf24">누적 지수</text>

  <!-- Row 1 초기 bit=1 (y=82~113, text at y=98) -->
  <line x1="20" y1="113" x2="600" y2="113" stroke="#2d3748" stroke-width="1"/>
  <text x="46"  y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">초기</text>
  <text x="101" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ade80">1</text>
  <text x="292" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">result = m   (MSB = 1 → result = m으로 시작)</text>
  <text x="527" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fbbf24">1</text>

  <!-- Row 2 step1 bit=0 (y=113~144, text at y=129) -->
  <line x1="20" y1="144" x2="600" y2="144" stroke="#2d3748" stroke-width="1"/>
  <text x="46"  y="129" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">1</text>
  <text x="101" y="129" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6b7a99">0</text>
  <text x="292" y="129" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#cbd5e1">result = result²   (제곱만, 곱셈 없음)</text>
  <text x="527" y="129" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fbbf24">2</text>

  <!-- Row 3 step2 bit=1 (y=144~175, text at y=160) -->
  <rect x="21" y="145" width="578" height="29" fill="rgba(74,222,128,0.05)"/>
  <line x1="20" y1="175" x2="600" y2="175" stroke="#2d3748" stroke-width="1"/>
  <text x="46"  y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">2</text>
  <text x="101" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ade80">1</text>
  <text x="292" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">result = result² × m   (제곱 후 곱셈)</text>
  <text x="527" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fbbf24">5</text>

  <!-- Row 4 step3 bit=1 (y=175~206, text at y=191) -->
  <rect x="21" y="176" width="578" height="29" fill="rgba(74,222,128,0.05)"/>
  <line x1="20" y1="206" x2="600" y2="206" stroke="#2d3748" stroke-width="1"/>
  <text x="46"  y="191" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">3</text>
  <text x="101" y="191" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ade80">1</text>
  <text x="292" y="191" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">result = result² × m   (제곱 후 곱셈)</text>
  <text x="527" y="191" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fbbf24">11</text>

  <!-- Row 5 step4 bit=1 LSB (y=206~237, text at y=222) -->
  <rect x="21" y="207" width="578" height="29" fill="rgba(74,222,128,0.10)"/>
  <text x="46"  y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">4</text>
  <text x="101" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ade80">1</text>
  <text x="292" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">result = result² × m   (제곱 후 곱셈, LSB)</text>
  <text x="527" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#4ade80">23</text>

  <!-- Captions -->
  <text x="310" y="254" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">총 7회 곱셈 (4 제곱 + 3 ×m)  —  지수 길이 O(log e)에 비례</text>
  <text x="310" y="272" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">e ≈ 2000비트  →  직접 2^2000번  vs  Square-and-Multiply 약 3000번</text>
</svg>
