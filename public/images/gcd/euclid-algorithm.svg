<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 270" width="930" height="405">
  <rect width="620" height="270" fill="#0f1117" rx="10"/>
  <text x="310" y="16" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">유클리드 호제법 — gcd(48, 18) 예시</text>

  <!-- Main table box -->
  <rect x="20" y="24" width="580" height="152" rx="6" fill="rgba(30,41,59,0.5)" stroke="#2d3748" stroke-width="1"/>

  <!-- Column divider -->
  <line x1="340" y1="24" x2="340" y2="176" stroke="#2d3748" stroke-width="1"/>

  <!-- Column headers -->
  <text x="180" y="41" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4b5563">나눗셈 (b = qa + r)</text>
  <text x="480" y="41" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4b5563">GCD 변환</text>
  <line x1="20" y1="46" x2="600" y2="46" stroke="#2d3748" stroke-width="1"/>

  <!-- Step 1 -->
  <text x="180" y="74" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#e2e8f0">48 = 2 × 18 + 12</text>
  <text x="480" y="74" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#93c5fd">gcd(48, 18) = gcd(18, 12)</text>
  <line x1="20" y1="88" x2="600" y2="88" stroke="#2d3748" stroke-width="1"/>

  <!-- Step 2 -->
  <text x="180" y="116" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#e2e8f0">18 = 1 × 12 + 6</text>
  <text x="480" y="116" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#93c5fd">gcd(18, 12) = gcd(12, 6)</text>
  <line x1="20" y1="130" x2="600" y2="130" stroke="#2d3748" stroke-width="1"/>

  <!-- Step 3 (last) -->
  <rect x="341" y="131" width="258" height="44" rx="0" fill="rgba(74,222,128,0.08)"/>
  <text x="180" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#e2e8f0">12 = 2 × 6 + <tspan fill="#f87171" font-weight="700">0</tspan></text>
  <text x="480" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4ade80">gcd = 6</text>

  <!-- Result box -->
  <rect x="195" y="184" width="230" height="38" rx="8" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="310" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.8" font-weight="700" fill="#4ade80">gcd(48, 18) = 6</text>

  <!-- Captions -->
  <text x="310" y="238" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="600" fill="#e2e8f0">b = qa + r 이면  gcd(b, a) = gcd(a, r)</text>
  <text x="310" y="257" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">나머지가 0이 되면 직전 단계의 나머지가 GCD</text>
</svg>
