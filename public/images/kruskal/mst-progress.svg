<svg viewBox="0 0 760 420" width="1140" height="630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif" role="img" aria-labelledby="mst-progress-title mst-progress-desc">
  <title id="mst-progress-title">Kruskal 알고리즘 단계별 진행</title>
  <desc id="mst-progress-desc">5개 정점과 7개 엣지를 가진 그래프에서 Kruskal 알고리즘이 가중치 오름차순으로 엣지를 검사하며, 사이클을 만들지 않는 엣지만 추가해 MST를 만드는 과정. n-1=4개 엣지가 추가되면 남은 엣지를 보지 않고 종료한다.</desc>

  <!-- Background -->
  <rect width="760" height="420" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Kruskal 단계별 진행</text>
  <text x="730" y="46" text-anchor="end" fill="#64748b" font-size="11">정점 5, 엣지 7 — MST 엣지 4개로 종료</text>

  <!-- Section labels -->
  <text x="40" y="74" fill="#94a3b8" font-size="11" font-weight="600">그래프</text>
  <text x="460" y="74" fill="#94a3b8" font-size="11" font-weight="600">가중치 오름차순 진행</text>

  <!--
    Graph node coordinates:
    A=(220,110)  B=(110,220)  C=(220,220)  D=(330,220)  E=(220,330)
  -->

  <!-- Edges (drawn before nodes so circles overlap them) -->

  <!-- Skipped (cycle): A-C, weight 3, red dashed -->
  <line x1="220" y1="110" x2="220" y2="220" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="5 3"/>
  <text x="234" y="170" fill="#ef4444" font-size="11" font-weight="700">3</text>

  <!-- Unused: C-E weight 6, B-E weight 7, gray solid thin -->
  <line x1="220" y1="220" x2="220" y2="330" stroke="#475569" stroke-width="1.5"/>
  <text x="234" y="280" fill="#64748b" font-size="11">6</text>
  <line x1="110" y1="220" x2="220" y2="330" stroke="#475569" stroke-width="1.5"/>
  <text x="148" y="290" fill="#64748b" font-size="11">7</text>

  <!-- Selected (in MST): A-B(1), B-C(2), C-D(4), D-E(5) — orange thick -->
  <line x1="220" y1="110" x2="110" y2="220" stroke="#f97316" stroke-width="3.2"/>
  <text x="148" y="160" fill="#f97316" font-size="12" font-weight="700">1</text>

  <line x1="110" y1="220" x2="220" y2="220" stroke="#f97316" stroke-width="3.2"/>
  <text x="160" y="214" fill="#f97316" font-size="12" font-weight="700">2</text>

  <line x1="220" y1="220" x2="330" y2="220" stroke="#f97316" stroke-width="3.2"/>
  <text x="271" y="214" fill="#f97316" font-size="12" font-weight="700">4</text>

  <line x1="330" y1="220" x2="220" y2="330" stroke="#f97316" stroke-width="3.2"/>
  <text x="290" y="290" fill="#f97316" font-size="12" font-weight="700">5</text>

  <!-- Nodes -->
  <g>
    <circle cx="220" cy="110" r="18" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="220" y="115" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">A</text>
  </g>
  <g>
    <circle cx="110" cy="220" r="18" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="110" y="225" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">B</text>
  </g>
  <g>
    <circle cx="220" cy="220" r="18" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="220" y="225" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">C</text>
  </g>
  <g>
    <circle cx="330" cy="220" r="18" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="330" y="225" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">D</text>
  </g>
  <g>
    <circle cx="220" cy="330" r="18" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="220" y="335" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">E</text>
  </g>

  <!-- Right panel: ordered edge list -->
  <!-- column headers -->
  <text x="466" y="98"  fill="#64748b" font-size="10" letter-spacing="0.1em">#</text>
  <text x="500" y="98"  fill="#64748b" font-size="10" letter-spacing="0.1em">EDGE</text>
  <text x="566" y="98"  fill="#64748b" font-size="10" letter-spacing="0.1em">W</text>
  <text x="610" y="98"  fill="#64748b" font-size="10" letter-spacing="0.1em">RESULT</text>
  <line x1="460" y1="108" x2="740" y2="108" stroke="#1e293b" stroke-width="1"/>

  <!-- Step 1: A-B,1 added -->
  <text x="466" y="132" fill="#94a3b8" font-size="12" font-family="ui-monospace,monospace">1</text>
  <text x="500" y="132" fill="#e2e8f0" font-size="12" font-family="ui-monospace,monospace">A–B</text>
  <text x="566" y="132" fill="#e2e8f0" font-size="12" font-family="ui-monospace,monospace">1</text>
  <text x="610" y="132" fill="#f97316" font-size="12" font-weight="700">+ 추가</text>

  <!-- Step 2: B-C,2 added -->
  <text x="466" y="158" fill="#94a3b8" font-size="12" font-family="ui-monospace,monospace">2</text>
  <text x="500" y="158" fill="#e2e8f0" font-size="12" font-family="ui-monospace,monospace">B–C</text>
  <text x="566" y="158" fill="#e2e8f0" font-size="12" font-family="ui-monospace,monospace">2</text>
  <text x="610" y="158" fill="#f97316" font-size="12" font-weight="700">+ 추가</text>

  <!-- Step 3: A-C,3 cycle, skipped -->
  <text x="466" y="184" fill="#94a3b8" font-size="12" font-family="ui-monospace,monospace">3</text>
  <text x="500" y="184" fill="#e2e8f0" font-size="12" font-family="ui-monospace,monospace">A–C</text>
  <text x="566" y="184" fill="#e2e8f0" font-size="12" font-family="ui-monospace,monospace">3</text>
  <text x="610" y="184" fill="#ef4444" font-size="12" font-weight="700">× 사이클</text>
  <text x="668" y="184" fill="#94a3b8" font-size="9" font-family="ui-monospace,monospace">find(A)=find(C)</text>

  <!-- Step 4: C-D,4 added -->
  <text x="466" y="210" fill="#94a3b8" font-size="12" font-family="ui-monospace,monospace">4</text>
  <text x="500" y="210" fill="#e2e8f0" font-size="12" font-family="ui-monospace,monospace">C–D</text>
  <text x="566" y="210" fill="#e2e8f0" font-size="12" font-family="ui-monospace,monospace">4</text>
  <text x="610" y="210" fill="#f97316" font-size="12" font-weight="700">+ 추가</text>

  <!-- Step 5: D-E,5 added → done -->
  <text x="466" y="236" fill="#94a3b8" font-size="12" font-family="ui-monospace,monospace">5</text>
  <text x="500" y="236" fill="#e2e8f0" font-size="12" font-family="ui-monospace,monospace">D–E</text>
  <text x="566" y="236" fill="#e2e8f0" font-size="12" font-family="ui-monospace,monospace">5</text>
  <text x="610" y="236" fill="#f97316" font-size="12" font-weight="700">+ 추가 ✓</text>

  <!-- horizontal divider after MST completion -->
  <line x1="460" y1="252" x2="740" y2="252" stroke="#1e293b" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="466" y="270" fill="#64748b" font-size="10.5" font-style="italic">|T| = n−1 = 4 → 종료</text>

  <!-- Step 6, 7: never examined -->
  <text x="466" y="296" fill="#475569" font-size="12" font-family="ui-monospace,monospace">6</text>
  <text x="500" y="296" fill="#475569" font-size="12" font-family="ui-monospace,monospace">C–E</text>
  <text x="566" y="296" fill="#475569" font-size="12" font-family="ui-monospace,monospace">6</text>
  <text x="610" y="296" fill="#64748b" font-size="12">(미검사)</text>

  <text x="466" y="322" fill="#475569" font-size="12" font-family="ui-monospace,monospace">7</text>
  <text x="500" y="322" fill="#475569" font-size="12" font-family="ui-monospace,monospace">B–E</text>
  <text x="566" y="322" fill="#475569" font-size="12" font-family="ui-monospace,monospace">7</text>
  <text x="610" y="322" fill="#64748b" font-size="12">(미검사)</text>

  <!-- Legend at bottom -->
  <line x1="30" y1="380" x2="50" y2="380" stroke="#f97316" stroke-width="3.2"/>
  <text x="58" y="384" fill="#94a3b8" font-size="11">선택 (MST)</text>

  <line x1="170" y1="380" x2="190" y2="380" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="5 3"/>
  <text x="198" y="384" fill="#94a3b8" font-size="11">스킵 (사이클)</text>

  <line x1="330" y1="380" x2="350" y2="380" stroke="#475569" stroke-width="1.5"/>
  <text x="358" y="384" fill="#94a3b8" font-size="11">미검사 (종료 후)</text>

  <circle cx="460" cy="380" r="6" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="472" y="384" fill="#94a3b8" font-size="11">정점</text>
</svg>
