<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 430" width="1020" height="645">
  <defs>
    <marker id="ga" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="ba" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="pa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="ra" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
    <marker id="oa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="680" height="430" fill="#0f1117" rx="10"/>
  <text x="340" y="17" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">마이켈슨 간섭계 (Michelson Interferometer)</text>

  <!-- ===== 장치 구조 ===== -->
  <!-- Photon source -->
  <circle cx="80" cy="310" r="12" fill="rgba(249,115,22,0.2)" stroke="#f97316" stroke-width="1.5"/>
  <text x="80" y="314" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#f97316">광원</text>
  <text x="80" y="334" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#cbd5e1">광자 1개</text>

  <!-- Arrow: source → half mirror 1 -->
  <line x1="96" y1="310" x2="176" y2="310" stroke="#f97316" stroke-width="1.5" marker-end="url(#oa)"/>

  <!-- Half mirror 1 (bottom-left) -->
  <line x1="180" y1="290" x2="210" y2="330" stroke="#a78bfa" stroke-width="3"/>
  <text x="220" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#a78bfa">반투명 거울</text>

  <!-- Path 1: up (blue) -->
  <line x1="195" y1="295" x2="195" y2="118" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#ba)"/>
  <text x="175" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">경로 ②</text>

  <!-- Full mirror (top-left) -->
  <line x1="175" y1="95" x2="215" y2="115" stroke="#e2e8f0" stroke-width="3"/>
  <text x="165" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#94a3b8">거울</text>

  <!-- Path 1 reflected: right -->
  <line x1="205" y1="102" x2="405" y2="102" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#ba)"/>

  <!-- Path 2: right (green) -->
  <line x1="210" y1="310" x2="405" y2="310" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ga)"/>
  <text x="310" y="326" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#4ade80">경로 ①</text>

  <!-- Full mirror (bottom-right) -->
  <line x1="410" y1="290" x2="430" y2="330" stroke="#e2e8f0" stroke-width="3"/>
  <text x="442" y="316" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#94a3b8">거울</text>

  <!-- Path 2 reflected: up -->
  <line x1="420" y1="295" x2="420" y2="118" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ga)"/>

  <!-- Half mirror 2 (top-right) -->
  <line x1="400" y1="88" x2="440" y2="128" stroke="#a78bfa" stroke-width="3"/>
  <text x="448" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#a78bfa">반투명 거울</text>

  <!-- Output: right (constructive) -->
  <line x1="440" y1="102" x2="540" y2="102" stroke="#4ade80" stroke-width="2" marker-end="url(#ga)"/>

  <!-- Wave visualization (constructive) -->
  <path d="M 548 102 C 554 90, 560 90, 566 102 C 572 114, 578 114, 584 102 C 590 90, 596 90, 602 102" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  <text x="575" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#4ade80">보강 간섭</text>
  <text x="575" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#cbd5e1">파동이 합쳐짐</text>

  <!-- Output: up (destructive) -->
  <line x1="420" y1="85" x2="420" y2="54" stroke="#f87171" stroke-width="2" marker-end="url(#ra)"/>
  <text x="420" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#f87171">상쇄 간섭</text>

  <!-- Wave visualization (destructive) -->
  <path d="M 452 62 C 458 54, 464 54, 470 62 C 476 70, 482 70, 488 62" fill="none" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <path d="M 452 62 C 458 70, 464 70, 470 62 C 476 54, 482 54, 488 62" fill="none" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="500" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#f87171">= 0</text>
  <text x="470" y="78" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#cbd5e1">파동이 상쇄</text>

  <!-- Distance labels -->
  <text x="308" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#94a3b8">d₁</text>
  <text x="185" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#94a3b8">d₂</text>

  <!-- ===== 하단: 설명 ===== -->
  <line x1="18" y1="354" x2="662" y2="354" stroke="#2d3748" stroke-width="1"/>

  <text x="340" y="374" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#e2e8f0">핵심 원리</text>

  <rect x="18" y="384" width="310" height="34" rx="4" fill="rgba(74,222,128,0.06)" stroke="#4ade80" stroke-width="1"/>
  <text x="173" y="405" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4ade80">d₁과 d₂의 거리차로 파동의 위상차 조절</text>

  <rect x="352" y="384" width="310" height="34" rx="4" fill="rgba(249,115,22,0.06)" stroke="#f97316" stroke-width="1"/>
  <text x="507" y="405" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#f97316">LIGO: 이 원리로 중력파 검출 (10⁻²¹ m 변위)</text>
</svg>