<svg viewBox="0 0 860 400" width="1290" height="600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="860" height="400" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">두 y정렬 절반을 O(n) merge로 합치기</text>
  <text x="430" y="50" text-anchor="middle" fill="#64748b" font-size="11">이미 정렬된 것끼리는 앞에서부터 훑기만 하면 된다 — 새로 정렬하지 않는다</text>

  <!-- ===== Left half (blue) ===== -->
  <text x="130" y="90" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">왼쪽 절반 (y정렬됨)</text>
  <g>
    <rect x="90" y="104" width="80" height="30" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="130" y="124" text-anchor="middle" fill="#93c5fd" font-size="12">y = 1</text>
    <rect x="90" y="140" width="80" height="30" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="130" y="160" text-anchor="middle" fill="#93c5fd" font-size="12">y = 4</text>
    <rect x="90" y="176" width="80" height="30" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="130" y="196" text-anchor="middle" fill="#93c5fd" font-size="12">y = 7</text>
  </g>
  <!-- left pointer -->
  <text x="60" y="124" text-anchor="middle" fill="#facc15" font-size="14">▶</text>

  <!-- ===== Right half (green) ===== -->
  <text x="130" y="248" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">오른쪽 절반 (y정렬됨)</text>
  <g>
    <rect x="90" y="262" width="80" height="30" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="130" y="282" text-anchor="middle" fill="#6ee7b7" font-size="12">y = 2</text>
    <rect x="90" y="298" width="80" height="30" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="130" y="318" text-anchor="middle" fill="#6ee7b7" font-size="12">y = 3</text>
    <rect x="90" y="334" width="80" height="30" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="130" y="354" text-anchor="middle" fill="#6ee7b7" font-size="12">y = 8</text>
  </g>
  <!-- right pointer -->
  <text x="60" y="282" text-anchor="middle" fill="#facc15" font-size="14">▶</text>

  <!-- Arrow to merged -->
  <line x1="200" y1="234" x2="330" y2="234" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="224" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">merge</text>
  <text x="265" y="252" text-anchor="middle" fill="#64748b" font-size="10">두 포인터 비교</text>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ===== Merged output ===== -->
  <text x="430" y="90" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">합친 결과 (y정렬 유지)</text>
  <g>
    <rect x="380" y="104" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="430" y="123" text-anchor="middle" fill="#93c5fd" font-size="12">y = 1</text>
    <rect x="380" y="136" width="100" height="28" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="430" y="155" text-anchor="middle" fill="#6ee7b7" font-size="12">y = 2</text>
    <rect x="380" y="168" width="100" height="28" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="430" y="187" text-anchor="middle" fill="#6ee7b7" font-size="12">y = 3</text>
    <rect x="380" y="200" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="430" y="219" text-anchor="middle" fill="#93c5fd" font-size="12">y = 4</text>
    <rect x="380" y="232" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="430" y="251" text-anchor="middle" fill="#93c5fd" font-size="12">y = 7</text>
    <rect x="380" y="264" width="100" height="28" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="430" y="283" text-anchor="middle" fill="#6ee7b7" font-size="12">y = 8</text>
  </g>

  <!-- ===== Right explanation ===== -->
  <rect x="540" y="120" width="280" height="160" rx="8" fill="#161a22" stroke="#334155" stroke-width="1"/>
  <text x="560" y="148" fill="#e2e8f0" font-size="12" font-weight="700">merge의 핵심</text>
  <text x="560" y="174" fill="#94a3b8" font-size="11">· 두 절반은 재귀가 이미</text>
  <text x="574" y="190" fill="#94a3b8" font-size="11">y정렬해서 물려줌</text>
  <text x="560" y="214" fill="#94a3b8" font-size="11">· 두 포인터로 작은 y부터</text>
  <text x="574" y="230" fill="#94a3b8" font-size="11">차례로 뽑아 담음</text>
  <text x="560" y="254" fill="#94a3b8" font-size="11">· 각 원소를 한 번씩만 방문</text>

  <!-- cost badge -->
  <rect x="560" y="300" width="240" height="34" rx="6" fill="#2d1f3f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="680" y="322" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">비용 O(n) — 정렬 없음</text>

  <!-- contrast note -->
  <text x="680" y="360" text-anchor="middle" fill="#64748b" font-size="10">1편은 이 자리에서 매번 O(n log n) 정렬을 했다</text>
</svg>
