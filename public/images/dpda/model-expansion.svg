<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 172" width="800" height="172">
  <rect width="800" height="172" fill="#0f1117" rx="10"/>
  <text x="400" y="22" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7a99">계산 모델별 메모리 구조 — DFA → 튜링 머신</text>

  <defs>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Arrows (box gap = 30px): box ends at x+160, next starts x+190 -->
  <line x1="198" y1="97" x2="219" y2="97" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="388" y1="97" x2="409" y2="97" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="578" y1="97" x2="599" y2="97" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- BOX 1: DFA (x=30, cx=110) -->
  <rect x="30" y="32" width="165" height="120" rx="6" fill="#1a2035" stroke="#4a5568" stroke-width="1"/>
  <text x="112" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#f97316">DFA</text>
  <circle cx="112" cy="97" r="18" fill="rgba(249,115,22,0.12)" stroke="#f97316" stroke-width="1.5"/>
  <text x="112" y="101" text-anchor="middle" font-size="9" fill="#f97316" font-weight="600">state</text>
  <text x="112" y="140" text-anchor="middle" font-size="9" fill="#6b7a99">Regular Languages</text>

  <!-- BOX 2: DPDA (x=225, cx=307) -->
  <rect x="225" y="32" width="165" height="120" rx="6" fill="#1a2035" stroke="#4a5568" stroke-width="1"/>
  <text x="307" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#f97316">DPDA</text>
  <circle cx="278" cy="97" r="15" fill="rgba(249,115,22,0.12)" stroke="#f97316" stroke-width="1.5"/>
  <text x="278" y="101" text-anchor="middle" font-size="8" fill="#f97316" font-weight="600">state</text>
  <text x="302" y="101" text-anchor="middle" font-size="11" fill="#4a5568">+</text>
  <rect x="316" y="80" width="22" height="34" rx="3" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="327" y="101" text-anchor="middle" font-size="9" fill="#38bdf8" font-weight="700">S</text>
  <text x="307" y="140" text-anchor="middle" font-size="9" fill="#6b7a99">Det. Context-Free</text>

  <!-- BOX 3: NPDA (x=415, cx=497) -->
  <rect x="415" y="32" width="165" height="120" rx="6" fill="#1a2035" stroke="#a78bfa" stroke-width="1"/>
  <text x="497" y="51" text-anchor="middle" font-size="15" font-weight="700" fill="#a78bfa">NPDA</text>
  <text x="497" y="65" text-anchor="middle" font-size="9" fill="#a78bfa" opacity="0.7">(비결정론적)</text>
  <circle cx="468" cy="97" r="15" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="468" y="101" text-anchor="middle" font-size="8" fill="#a78bfa" font-weight="600">state</text>
  <text x="492" y="101" text-anchor="middle" font-size="11" fill="#4a5568">+</text>
  <rect x="506" y="80" width="22" height="34" rx="3" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="517" y="101" text-anchor="middle" font-size="9" fill="#38bdf8" font-weight="700">S</text>
  <text x="497" y="140" text-anchor="middle" font-size="9" fill="#6b7a99">Context-Free</text>

  <!-- BOX 4: 2-Stack = TM (x=605, cx=687) -->
  <rect x="605" y="32" width="165" height="120" rx="6" fill="#1a2035" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="687" y="51" text-anchor="middle" font-size="14" font-weight="700" fill="#38bdf8">2-Stack DPDA</text>
  <text x="687" y="65" text-anchor="middle" font-size="9" fill="#38bdf8" opacity="0.8">= 튜링 머신</text>
  <circle cx="645" cy="97" r="14" fill="rgba(249,115,22,0.12)" stroke="#f97316" stroke-width="1.5"/>
  <text x="645" y="101" text-anchor="middle" font-size="7" fill="#f97316" font-weight="600">state</text>
  <text x="666" y="101" text-anchor="middle" font-size="11" fill="#4a5568">+</text>
  <rect x="676" y="80" width="20" height="34" rx="3" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="686" y="101" text-anchor="middle" font-size="8" fill="#38bdf8" font-weight="700">S₁</text>
  <rect x="700" y="80" width="20" height="34" rx="3" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="710" y="101" text-anchor="middle" font-size="8" fill="#38bdf8" font-weight="700">S₂</text>
  <text x="687" y="140" text-anchor="middle" font-size="9" fill="#6b7a99">Recursively Enumerable</text>
</svg>
