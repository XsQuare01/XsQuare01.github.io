<svg viewBox="0 0 860 430" width="1290" height="645" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="860" height="430" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">N×N 행렬을 2×2 블록으로 나눈다</text>
  <text x="430" y="53" text-anchor="middle" fill="#64748b" font-size="11">각 블록은 (N/2)×(N/2) 행렬 — 같은 문제가 절반 크기로 재귀한다</text>

  <!-- ===== A (blue) ===== -->
  <text x="150" y="100" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">A</text>
  <g stroke="#3b82f6" stroke-width="1.5">
    <rect x="90" y="112" width="60" height="60" fill="#1e3a5f"/>
    <rect x="150" y="112" width="60" height="60" fill="#1e3a5f"/>
    <rect x="90" y="172" width="60" height="60" fill="#1e3a5f"/>
    <rect x="150" y="172" width="60" height="60" fill="#1e3a5f"/>
  </g>
  <text x="120" y="147" text-anchor="middle" fill="#dbeafe" font-size="14">A₁₁</text>
  <text x="180" y="147" text-anchor="middle" fill="#dbeafe" font-size="14">A₁₂</text>
  <text x="120" y="207" text-anchor="middle" fill="#dbeafe" font-size="14">A₂₁</text>
  <text x="180" y="207" text-anchor="middle" fill="#dbeafe" font-size="14">A₂₂</text>

  <text x="240" y="177" text-anchor="middle" fill="#94a3b8" font-size="20">×</text>

  <!-- ===== B (green) ===== -->
  <text x="330" y="100" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">B</text>
  <g stroke="#34d399" stroke-width="1.5">
    <rect x="270" y="112" width="60" height="60" fill="#14352b"/>
    <rect x="330" y="112" width="60" height="60" fill="#14352b"/>
    <rect x="270" y="172" width="60" height="60" fill="#14352b"/>
    <rect x="330" y="172" width="60" height="60" fill="#14352b"/>
  </g>
  <text x="300" y="147" text-anchor="middle" fill="#d1fae5" font-size="14">B₁₁</text>
  <text x="360" y="147" text-anchor="middle" fill="#d1fae5" font-size="14">B₁₂</text>
  <text x="300" y="207" text-anchor="middle" fill="#d1fae5" font-size="14">B₂₁</text>
  <text x="360" y="207" text-anchor="middle" fill="#d1fae5" font-size="14">B₂₂</text>

  <text x="420" y="177" text-anchor="middle" fill="#94a3b8" font-size="20">=</text>

  <!-- ===== C (amber) ===== -->
  <text x="510" y="100" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">C</text>
  <g stroke="#f59e0b" stroke-width="1.5">
    <rect x="450" y="112" width="60" height="60" fill="#3a2c0f"/>
    <rect x="510" y="112" width="60" height="60" fill="#3a2c0f"/>
    <rect x="450" y="172" width="60" height="60" fill="#3a2c0f"/>
    <rect x="510" y="172" width="60" height="60" fill="#3a2c0f"/>
  </g>
  <text x="480" y="147" text-anchor="middle" fill="#fef3c7" font-size="14">C₁₁</text>
  <text x="540" y="147" text-anchor="middle" fill="#fef3c7" font-size="14">C₁₂</text>
  <text x="480" y="207" text-anchor="middle" fill="#fef3c7" font-size="14">C₂₁</text>
  <text x="540" y="207" text-anchor="middle" fill="#fef3c7" font-size="14">C₂₂</text>

  <!-- Divider -->
  <line x1="90" y1="270" x2="770" y2="270" stroke="#1e293b" stroke-width="1"/>

  <!-- Block formulas -->
  <text x="90" y="300" fill="#94a3b8" font-size="12" font-weight="600">블록 하나를 만드는 데 곱셈 2번 — 블록이 4개이므로 곱셈은 모두 8번:</text>

  <g font-size="13.5">
    <text x="110" y="332" fill="#fef3c7">C₁₁</text>
    <text x="140" y="332" fill="#94a3b8">=</text>
    <text x="160" y="332" fill="#dbeafe">A₁₁</text><text x="188" y="332" fill="#d1fae5">B₁₁</text>
    <text x="220" y="332" fill="#94a3b8">+</text>
    <text x="240" y="332" fill="#dbeafe">A₁₂</text><text x="268" y="332" fill="#d1fae5">B₂₁</text>

    <text x="470" y="332" fill="#fef3c7">C₁₂</text>
    <text x="500" y="332" fill="#94a3b8">=</text>
    <text x="520" y="332" fill="#dbeafe">A₁₁</text><text x="548" y="332" fill="#d1fae5">B₁₂</text>
    <text x="580" y="332" fill="#94a3b8">+</text>
    <text x="600" y="332" fill="#dbeafe">A₁₂</text><text x="628" y="332" fill="#d1fae5">B₂₂</text>

    <text x="110" y="364" fill="#fef3c7">C₂₁</text>
    <text x="140" y="364" fill="#94a3b8">=</text>
    <text x="160" y="364" fill="#dbeafe">A₂₁</text><text x="188" y="364" fill="#d1fae5">B₁₁</text>
    <text x="220" y="364" fill="#94a3b8">+</text>
    <text x="240" y="364" fill="#dbeafe">A₂₂</text><text x="268" y="364" fill="#d1fae5">B₂₁</text>

    <text x="470" y="364" fill="#fef3c7">C₂₂</text>
    <text x="500" y="364" fill="#94a3b8">=</text>
    <text x="520" y="364" fill="#dbeafe">A₂₁</text><text x="548" y="364" fill="#d1fae5">B₁₂</text>
    <text x="580" y="364" fill="#94a3b8">+</text>
    <text x="600" y="364" fill="#dbeafe">A₂₂</text><text x="628" y="364" fill="#d1fae5">B₂₂</text>
  </g>

  <text x="430" y="402" text-anchor="middle" fill="#f87171" font-size="12.5">T(N) = 8·T(N/2) + Θ(N²)  →  Θ(N³) — 나누기만으로는 나이브와 같다</text>
</svg>
