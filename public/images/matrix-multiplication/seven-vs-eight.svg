<svg viewBox="0 0 860 430" width="1290" height="645" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="860" height="430" rx="10" fill="#0f1117"/>

  <text x="430" y="32" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">곱셈 한 번이 재귀 가지 하나 — 8개를 7개로 줄이면 지수가 바뀐다</text>
  <text x="430" y="53" text-anchor="middle" fill="#64748b" font-size="11">복잡도를 정하는 것은 한 번의 곱셈 크기가 아니라, 크기가 절반일 때 몇 번 재귀하느냐다</text>

  <line x1="430" y1="80" x2="430" y2="410" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== Left: naive D&C, branch 8 ===== -->
  <text x="215" y="100" text-anchor="middle" fill="#f87171" font-size="13" font-weight="700">나이브 분할 정복 — 곱 8번</text>

  <rect x="185" y="112" width="60" height="30" rx="5" fill="#3a1518" stroke="#f87171" stroke-width="1.5"/>
  <text x="215" y="132" text-anchor="middle" fill="#fecaca" font-size="12">N</text>

  <g stroke="#7f1d1d" stroke-width="1">
    <line x1="215" y1="142" x2="70" y2="180"/>
    <line x1="215" y1="142" x2="112" y2="180"/>
    <line x1="215" y1="142" x2="154" y2="180"/>
    <line x1="215" y1="142" x2="196" y2="180"/>
    <line x1="215" y1="142" x2="238" y2="180"/>
    <line x1="215" y1="142" x2="280" y2="180"/>
    <line x1="215" y1="142" x2="322" y2="180"/>
    <line x1="215" y1="142" x2="360" y2="180"/>
  </g>
  <g fill="#3a1518" stroke="#f87171" stroke-width="1.2">
    <rect x="52" y="180" width="36" height="24" rx="4"/>
    <rect x="94" y="180" width="36" height="24" rx="4"/>
    <rect x="136" y="180" width="36" height="24" rx="4"/>
    <rect x="178" y="180" width="36" height="24" rx="4"/>
    <rect x="220" y="180" width="36" height="24" rx="4"/>
    <rect x="262" y="180" width="36" height="24" rx="4"/>
    <rect x="304" y="180" width="36" height="24" rx="4"/>
    <rect x="344" y="180" width="36" height="24" rx="4"/>
  </g>
  <g fill="#fca5a5" font-size="10" text-anchor="middle">
    <text x="70" y="197">N/2</text>
    <text x="112" y="197">N/2</text>
    <text x="154" y="197">N/2</text>
    <text x="196" y="197">N/2</text>
    <text x="238" y="197">N/2</text>
    <text x="280" y="197">N/2</text>
    <text x="322" y="197">N/2</text>
    <text x="362" y="197">N/2</text>
  </g>
  <text x="215" y="234" text-anchor="middle" fill="#94a3b8" font-size="11">가지 8개 · 크기 절반</text>

  <text x="215" y="290" text-anchor="middle" fill="#e2e8f0" font-size="15">T(N) = 8·T(N/2) + Θ(N²)</text>
  <text x="215" y="322" text-anchor="middle" fill="#94a3b8" font-size="12">지수 = log₂8 = 3</text>
  <text x="215" y="360" text-anchor="middle" fill="#f87171" font-size="20" font-weight="700">Θ(N³)</text>
  <text x="215" y="388" text-anchor="middle" fill="#64748b" font-size="11">나이브와 똑같다</text>

  <!-- ===== Right: Strassen, branch 7 ===== -->
  <text x="645" y="100" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">Strassen — 곱 7번</text>

  <rect x="615" y="112" width="60" height="30" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
  <text x="645" y="132" text-anchor="middle" fill="#d1fae5" font-size="12">N</text>

  <g stroke="#065f46" stroke-width="1">
    <line x1="645" y1="142" x2="512" y2="180"/>
    <line x1="645" y1="142" x2="556" y2="180"/>
    <line x1="645" y1="142" x2="600" y2="180"/>
    <line x1="645" y1="142" x2="644" y2="180"/>
    <line x1="645" y1="142" x2="688" y2="180"/>
    <line x1="645" y1="142" x2="732" y2="180"/>
    <line x1="645" y1="142" x2="776" y2="180"/>
  </g>
  <g fill="#14352b" stroke="#34d399" stroke-width="1.2">
    <rect x="494" y="180" width="36" height="24" rx="4"/>
    <rect x="538" y="180" width="36" height="24" rx="4"/>
    <rect x="582" y="180" width="36" height="24" rx="4"/>
    <rect x="626" y="180" width="36" height="24" rx="4"/>
    <rect x="670" y="180" width="36" height="24" rx="4"/>
    <rect x="714" y="180" width="36" height="24" rx="4"/>
    <rect x="758" y="180" width="36" height="24" rx="4"/>
  </g>
  <g fill="#6ee7b7" font-size="10" text-anchor="middle">
    <text x="512" y="197">N/2</text>
    <text x="556" y="197">N/2</text>
    <text x="600" y="197">N/2</text>
    <text x="644" y="197">N/2</text>
    <text x="688" y="197">N/2</text>
    <text x="732" y="197">N/2</text>
    <text x="776" y="197">N/2</text>
  </g>
  <text x="645" y="234" text-anchor="middle" fill="#94a3b8" font-size="11">가지 7개 · 크기 절반</text>

  <text x="645" y="290" text-anchor="middle" fill="#e2e8f0" font-size="15">T(N) = 7·T(N/2) + Θ(N²)</text>
  <text x="645" y="322" text-anchor="middle" fill="#94a3b8" font-size="12">지수 = log₂7 = 2.807…</text>
  <text x="645" y="360" text-anchor="middle" fill="#34d399" font-size="20" font-weight="700">Θ(N²·⁸⁰⁷)</text>
  <text x="645" y="388" text-anchor="middle" fill="#64748b" font-size="11">가지 하나가 판을 바꾼다</text>
</svg>
