<svg viewBox="0 0 680 420" width="1020" height="630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="680" height="420" rx="10" fill="#0f1117"/>
  <defs>
    <marker id="v-b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#3b82f6"/>
    </marker>
    <marker id="v-p" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">CCW = 부호 있는 넓이 (외적)</text>
  <text x="340" y="50" text-anchor="middle" fill="#64748b" font-size="11">두 벡터 AB, AC가 만드는 평행사변형의 부호 있는 넓이</text>

  <!-- parallelogram A, B, B+AC, C -->
  <polygon points="160,330 420,290 540,110 280,150"
           fill="rgba(167,139,250,0.13)" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- vector AB -->
  <line x1="160" y1="330" x2="410" y2="292" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#v-b)"/>
  <!-- vector AC -->
  <line x1="160" y1="330" x2="272" y2="152" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#v-p)"/>

  <!-- points -->
  <g font-size="14" font-weight="700" fill="#e2e8f0">
    <circle cx="160" cy="330" r="6" fill="#93c5fd"/><text x="140" y="352">A</text>
    <circle cx="420" cy="290" r="6" fill="#93c5fd"/><text x="430" y="296">B</text>
    <circle cx="280" cy="150" r="6" fill="#93c5fd"/><text x="256" y="146">C</text>
  </g>
  <text x="300" y="250" fill="#c4b5fd" font-size="12" font-weight="700">평행사변형 넓이</text>

  <!-- formula box -->
  <rect x="410" y="330" width="250" height="70" rx="8" fill="#161a22" stroke="#334155" stroke-width="1"/>
  <text x="425" y="356" fill="#93c5fd" font-size="12">넓이 = |ccw(A, B, C)|</text>
  <text x="425" y="378" fill="#6ee7b7" font-size="12">부호 &gt; 0 → 반시계 (C가 AB 왼쪽)</text>
  <text x="425" y="394" fill="#fca5a5" font-size="12">부호 &lt; 0 → 시계 (C가 AB 오른쪽)</text>
</svg>
