<svg viewBox="0 0 680 420" width="1020" height="630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="680" height="420" rx="10" fill="#0f1117"/>
  <defs>
    <marker id="w-g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#34d399"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">Package Wrapping — 한 걸음</text>
  <text x="340" y="50" text-anchor="middle" fill="#64748b" font-size="11">현재 점에서 나머지 점을 훑어 가장 바깥 점을 다음 껍질 점으로</text>

  <!-- rejected candidate lines (dashed) -->
  <line x1="130" y1="340" x2="350" y2="205" stroke="#475569" stroke-width="1.3" stroke-dasharray="5 4"/>
  <line x1="130" y1="340" x2="300" y2="300" stroke="#475569" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="360" y="203" fill="#64748b" font-size="11">✗ 후보 (오른쪽에 점이 남음)</text>

  <!-- chosen edge (solid green) -->
  <line x1="140" y1="338" x2="552" y2="302" stroke="#34d399" stroke-width="3" marker-end="url(#w-g)"/>

  <!-- other points (gray, all left/above of chosen edge) -->
  <g fill="#64748b">
    <circle cx="250" cy="250" r="5"/>
    <circle cx="350" cy="205" r="5"/>
    <circle cx="430" cy="240" r="5"/>
    <circle cx="300" cy="300" r="5"/>
    <circle cx="470" cy="200" r="5"/>
  </g>

  <!-- current point -->
  <circle cx="130" cy="340" r="8" fill="#34d399"/>
  <text x="118" y="365" fill="#6ee7b7" font-size="12" font-weight="700">현재 점</text>

  <!-- next point -->
  <circle cx="560" cy="300" r="8" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="290" fill="#93c5fd" font-size="12" font-weight="700">다음 껍질 점</text>

  <text x="330" y="392" text-anchor="middle" fill="#94a3b8" font-size="12">나머지 점이 모두 이 선분의 왼쪽 → 껍질의 변 ✓</text>
</svg>
