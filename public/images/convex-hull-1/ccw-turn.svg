<svg viewBox="0 0 680 420" width="1020" height="630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="680" height="420" rx="10" fill="#0f1117"/>
  <defs>
    <marker id="ah-g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#34d399"/>
    </marker>
    <marker id="ah-r" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#f87171"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">CCW — 세 점의 회전 방향</text>
  <text x="340" y="50" text-anchor="middle" fill="#64748b" font-size="11">A → B → C 를 따라갈 때 어느 쪽으로 꺾이는가</text>

  <line x1="340" y1="72" x2="340" y2="400" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== Left: CCW (left turn) ===== -->
  <text x="175" y="96" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">반시계 (좌회전) · ccw &gt; 0</text>
  <line x1="90" y1="330" x2="222" y2="330" stroke="#34d399" stroke-width="2.5" marker-end="url(#ah-g)"/>
  <line x1="230" y1="330" x2="305" y2="220" stroke="#34d399" stroke-width="2.5" marker-end="url(#ah-g)"/>
  <!-- turn arc at B -->
  <path d="M 190 330 A 40 40 0 0 0 205 300" fill="none" stroke="#6ee7b7" stroke-width="1.5"/>
  <g font-size="13" font-weight="700" fill="#e2e8f0">
    <circle cx="90" cy="330" r="6" fill="#34d399"/><text x="78" y="352">A</text>
    <circle cx="230" cy="330" r="6" fill="#34d399"/><text x="230" y="354">B</text>
    <circle cx="310" cy="210" r="6" fill="#34d399"/><text x="322" y="210">C</text>
  </g>
  <text x="175" y="388" text-anchor="middle" fill="#94a3b8" font-size="11">진행 방향 왼쪽으로 꺾임</text>

  <!-- ===== Right: CW (right turn) ===== -->
  <text x="510" y="96" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">시계 (우회전) · ccw &lt; 0</text>
  <line x1="405" y1="230" x2="532" y2="230" stroke="#f87171" stroke-width="2.5" marker-end="url(#ah-r)"/>
  <line x1="540" y1="230" x2="615" y2="335" stroke="#f87171" stroke-width="2.5" marker-end="url(#ah-r)"/>
  <path d="M 500 230 A 40 40 0 0 1 515 262" fill="none" stroke="#fca5a5" stroke-width="1.5"/>
  <g font-size="13" font-weight="700" fill="#e2e8f0">
    <circle cx="405" cy="230" r="6" fill="#f87171"/><text x="393" y="224">A</text>
    <circle cx="540" cy="230" r="6" fill="#f87171"/><text x="540" y="216">B</text>
    <circle cx="620" cy="345" r="6" fill="#f87171"/><text x="632" y="349">C</text>
  </g>
  <text x="510" y="388" text-anchor="middle" fill="#94a3b8" font-size="11">진행 방향 오른쪽으로 꺾임</text>
</svg>
