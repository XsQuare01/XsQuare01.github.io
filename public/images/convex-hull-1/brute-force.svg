<svg viewBox="0 0 680 420" width="1020" height="630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="680" height="420" rx="10" fill="#0f1117"/>

  <text x="340" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">브루트포스 — 선분이 껍질의 변인가</text>
  <text x="340" y="50" text-anchor="middle" fill="#64748b" font-size="11">선분을 직선으로 늘렸을 때 나머지 점이 모두 한쪽에 있는가</text>

  <!-- divider -->
  <line x1="340" y1="72" x2="340" y2="400" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== Left: hull edge ===== -->
  <text x="175" y="92" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">껍질의 변 ✓</text>
  <!-- extended line -->
  <line x1="40" y1="314" x2="320" y2="346" stroke="#475569" stroke-width="1.3" stroke-dasharray="6 4"/>
  <!-- other points: all above -->
  <g fill="#6ee7b7">
    <circle cx="130" cy="250" r="5"/>
    <circle cx="200" cy="225" r="5"/>
    <circle cx="250" cy="270" r="5"/>
    <circle cx="160" cy="290" r="5"/>
    <circle cx="235" cy="300" r="5"/>
  </g>
  <!-- segment -->
  <line x1="90" y1="320" x2="270" y2="340" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="90" cy="320" r="6" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="270" cy="340" r="6" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
  <text x="175" y="388" text-anchor="middle" fill="#94a3b8" font-size="11">나머지 점이 모두 위쪽 → 변</text>

  <!-- ===== Right: not an edge ===== -->
  <text x="510" y="92" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">변이 아님 ✗</text>
  <line x1="360" y1="225" x2="650" y2="255" stroke="#475569" stroke-width="1.3" stroke-dasharray="6 4"/>
  <!-- above (blue) -->
  <g fill="#93c5fd">
    <circle cx="440" cy="150" r="5"/>
    <circle cx="530" cy="140" r="5"/>
  </g>
  <!-- below (red) -->
  <g fill="#fca5a5">
    <circle cx="460" cy="330" r="5"/>
    <circle cx="570" cy="340" r="5"/>
  </g>
  <!-- segment -->
  <line x1="410" y1="230" x2="600" y2="250" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="410" cy="230" r="6" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="600" cy="250" r="6" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
  <text x="510" y="388" text-anchor="middle" fill="#94a3b8" font-size="11">위·아래로 갈림 → 내부를 가로지름</text>
</svg>
