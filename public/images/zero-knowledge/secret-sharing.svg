<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" width="1020" height="570">
  <defs>
    <marker id="ga" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="ra" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
    <marker id="sa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="680" height="380" fill="#0f1117" rx="10"/>
  <text x="340" y="17" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">Shamir의 비밀 공유 — (k, n) 임계 방식, ℤ₁₁ 위의 예시</text>

  <!-- ===== 좌측: 다항식과 점 ===== -->
  <rect x="18" y="28" width="310" height="200" rx="8" fill="#0d1524" stroke="#334155" stroke-width="1.5"/>
  <text x="173" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#4ade80">비밀 다항식 (k=3, n=5)</text>

  <!-- Polynomial -->
  <text x="173" y="72" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#e2e8f0">f(y) = 3y² + 2y + 7  (mod 11)</text>
  <text x="173" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">비밀 x = a₀ = 7,  임의 계수 a₁=2, a₂=3</text>

  <!-- Shares -->
  <text x="30" y="114" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">참여자별 지분(share):</text>

  <rect x="30" y="122" width="55" height="24" rx="3" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/>
  <text x="57" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">P₁: f(1)=1</text>

  <rect x="92" y="122" width="55" height="24" rx="3" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/>
  <text x="119" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">P₂: f(2)=1</text>

  <rect x="154" y="122" width="55" height="24" rx="3" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/>
  <text x="181" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">P₃: f(3)=7</text>

  <rect x="216" y="122" width="55" height="24" rx="3" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/>
  <text x="243" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">P₄: f(4)=8</text>

  <rect x="278" y="122" width="55" height="24" rx="3" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/>
  <text x="305" y="138" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">P₅: f(5)=4</text>

  <!-- k people can reconstruct -->
  <rect x="30" y="160" width="286" height="28" rx="4" fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1"/>
  <text x="173" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4ade80">k=3명 이상 → 2차식 확정 → a₀ = 7 복원 ✓</text>

  <!-- k-1 people cannot -->
  <rect x="30" y="196" width="286" height="24" rx="4" fill="rgba(248,113,113,0.08)" stroke="#f87171" stroke-width="1"/>
  <text x="173" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#f87171">k-1=2명 이하 → 2차식 미확정 → a₀ 알 수 없음 ✗</text>

  <!-- ===== 우측: 기하학적 직관 ===== -->
  <rect x="352" y="28" width="310" height="200" rx="8" fill="#0d1524" stroke="#334155" stroke-width="1.5"/>
  <text x="507" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#a78bfa">기하학적 직관</text>

  <!-- Coordinate system -->
  <line x1="390" y1="200" x2="630" y2="200" stroke="#2d3748" stroke-width="1"/>
  <line x1="390" y1="200" x2="390" y2="60" stroke="#2d3748" stroke-width="1"/>
  <text x="636" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#94a3b8">y</text>
  <text x="384" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#94a3b8">f(y)</text>

  <!-- Curve (approximate parabola for f(y) = 3y²+2y+7 mod 11) -->
  <!-- Points: (0,7), (1,1), (2,1), (3,7), (4,8), (5,4) -->
  <!-- Scaled: y*40+390, 200-val*17 -->
  <!-- (390,81), (430,183), (470,183), (510,81), (550,64), (590,132) -->
  <path d="M 390 81 C 410 140, 440 190, 470 183 C 490 178, 500 110, 510 81 C 520 68, 540 62, 550 64 C 560 80, 580 115, 590 132" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Secret point (0,7) -->
  <circle cx="390" cy="81" r="6" fill="rgba(249,115,22,0.3)" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="75" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#f97316">비밀 (0, 7)</text>

  <!-- Known points -->
  <circle cx="430" cy="183" r="4" fill="#60a5fa"/>
  <text x="436" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#60a5fa">(1,1)</text>

  <circle cx="470" cy="183" r="4" fill="#60a5fa"/>
  <text x="476" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#60a5fa">(2,1)</text>

  <circle cx="510" cy="81" r="4" fill="#60a5fa"/>
  <text x="516" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#60a5fa">(3,7)</text>

  <circle cx="550" cy="64" r="4" fill="#4ade80" stroke="#4ade80" stroke-width="1" fill-opacity="0.3"/>
  <text x="556" y="59" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#4ade80">(4,8)</text>

  <circle cx="590" cy="132" r="4" fill="#4ade80" stroke="#4ade80" stroke-width="1" fill-opacity="0.3"/>
  <text x="596" y="127" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#4ade80">(5,4)</text>

  <!-- Annotation -->
  <text x="507" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#cbd5e1">(k-1)차 다항식은 k개의 점으로 유일하게 결정된다</text>

  <!-- ===== 하단: 핵심 원리 ===== -->
  <line x1="18" y1="244" x2="662" y2="244" stroke="#2d3748" stroke-width="1"/>

  <text x="340" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#e2e8f0">Shamir 비밀 공유의 핵심</text>

  <rect x="18" y="274" width="310" height="48" rx="6" fill="rgba(74,222,128,0.06)" stroke="#4ade80" stroke-width="1"/>
  <text x="173" y="292" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#4ade80">k명 이상 협력</text>
  <text x="173" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">k개 점 → (k-1)차식 유일 확정 → f(0) = x 복원</text>

  <rect x="352" y="274" width="310" height="48" rx="6" fill="rgba(248,113,113,0.06)" stroke="#f87171" stroke-width="1"/>
  <text x="507" y="292" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#f87171">(k-1)명 이하 협력</text>
  <text x="507" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">(k-1)개 점 → 무한히 많은 곡선 가능 → x 정보 없음</text>

  <!-- Bottom note -->
  <rect x="120" y="336" width="440" height="28" rx="4" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1"/>
  <text x="340" y="355" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#a78bfa">정보 이론적 안전성 — (k-1)명은 계산 능력과 무관하게 비밀을 복원할 수 없다</text>
</svg>