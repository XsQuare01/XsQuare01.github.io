<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" width="930" height="420">
  <rect width="620" height="280" fill="#0f1117" rx="10"/>
  <text x="310" y="16" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">a<tspan baseline-shift="super" font-size="70%">k</tspan> mod 7 — p = 7 (소수), a ∈ Zp* = {1,2,3,4,5,6}</text>

  <!-- k=6 column highlight (last column) -->
  <rect x="515" y="30" width="85" height="192" rx="3" fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1.2"/>

  <!-- Table outer border -->
  <rect x="20" y="30" width="580" height="192" rx="4" fill="none" stroke="#2d3748" stroke-width="1.2"/>

  <!-- Column dividers (vertical lines) -->
  <line x1="95"  y1="30" x2="95"  y2="222" stroke="#2d3748" stroke-width="1"/>
  <line x1="180" y1="30" x2="180" y2="222" stroke="#2d3748" stroke-width="1"/>
  <line x1="265" y1="30" x2="265" y2="222" stroke="#2d3748" stroke-width="1"/>
  <line x1="350" y1="30" x2="350" y2="222" stroke="#2d3748" stroke-width="1"/>
  <line x1="435" y1="30" x2="435" y2="222" stroke="#2d3748" stroke-width="1"/>
  <line x1="515" y1="30" x2="515" y2="222" stroke="#2d3748" stroke-width="1.5"/>

  <!-- Row dividers (horizontal lines) -->
  <line x1="20" y1="62" x2="600" y2="62" stroke="#2d3748" stroke-width="1.5"/>
  <line x1="20" y1="94"  x2="600" y2="94"  stroke="#2d3748" stroke-width="1"/>
  <line x1="20" y1="126" x2="600" y2="126" stroke="#2d3748" stroke-width="1"/>
  <line x1="20" y1="158" x2="600" y2="158" stroke="#2d3748" stroke-width="1"/>
  <line x1="20" y1="190" x2="600" y2="190" stroke="#2d3748" stroke-width="1"/>

  <!-- Header row: a\k | 1 | 2 | 3 | 4 | 5 | p−1=6 -->
  <text x="57"  y="51" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">a \ k</text>
  <text x="137" y="51" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#94a3b8">1</text>
  <text x="222" y="51" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#94a3b8">2</text>
  <text x="307" y="51" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#94a3b8">3</text>
  <text x="392" y="51" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#94a3b8">4</text>
  <text x="475" y="51" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#94a3b8">5</text>
  <text x="557" y="44" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#4ade80">p−1</text>
  <text x="557" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#4ade80">= 6</text>

  <!-- Row a=2: 2,4,1,2,4,1 -->
  <text x="57"  y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#e2e8f0">a=2</text>
  <text x="137" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">2</text>
  <text x="222" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">4</text>
  <text x="307" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">1</text>
  <text x="392" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">2</text>
  <text x="475" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">4</text>
  <text x="557" y="83" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.8" font-weight="700" fill="#4ade80">1</text>

  <!-- Row a=3: 3,2,6,4,5,1 -->
  <text x="57"  y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#e2e8f0">a=3</text>
  <text x="137" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">3</text>
  <text x="222" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">2</text>
  <text x="307" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">6</text>
  <text x="392" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">4</text>
  <text x="475" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">5</text>
  <text x="557" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.8" font-weight="700" fill="#4ade80">1</text>

  <!-- Row a=4: 4,2,1,4,2,1 -->
  <text x="57"  y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#e2e8f0">a=4</text>
  <text x="137" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">4</text>
  <text x="222" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">2</text>
  <text x="307" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">1</text>
  <text x="392" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">4</text>
  <text x="475" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">2</text>
  <text x="557" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.8" font-weight="700" fill="#4ade80">1</text>

  <!-- Row a=5: 5,4,6,2,3,1 -->
  <text x="57"  y="179" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#e2e8f0">a=5</text>
  <text x="137" y="179" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">5</text>
  <text x="222" y="179" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">4</text>
  <text x="307" y="179" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">6</text>
  <text x="392" y="179" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">2</text>
  <text x="475" y="179" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">3</text>
  <text x="557" y="179" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.8" font-weight="700" fill="#4ade80">1</text>

  <!-- Row a=6: 6,1,6,1,6,1 -->
  <text x="57"  y="211" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#e2e8f0">a=6</text>
  <text x="137" y="211" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">6</text>
  <text x="222" y="211" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">1</text>
  <text x="307" y="211" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">6</text>
  <text x="392" y="211" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">1</text>
  <text x="475" y="211" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#cbd5e1">6</text>
  <text x="557" y="211" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.8" font-weight="700" fill="#4ade80">1</text>

  <!-- Captions -->
  <text x="310" y="244" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="600" fill="#94a3b8">k = p−1 = 6 열이 모두 1 — 페르마의 소정리</text>
  <text x="310" y="263" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">원소마다 주기(order)는 다르지만, p−1 지점에서 반드시 1로 수렴</text>
</svg>
