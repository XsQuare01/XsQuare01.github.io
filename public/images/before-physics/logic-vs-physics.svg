<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="1020" height="480">
  <defs>
    <marker id="ga" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="ba" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="pa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="680" height="320" fill="#0f1117" rx="10"/>
  <text x="340" y="17" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">수학·논리 vs 물리학 — 진리의 두 가지 기준</text>

  <!-- ===== 좌측: Math & Logic ===== -->
  <rect x="18" y="28" width="300" height="220" rx="8" fill="#0d1524" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="168" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#a78bfa">수학 · 논리</text>

  <!-- Axiom -->
  <rect x="30" y="60" width="276" height="36" rx="4" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1"/>
  <text x="168" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#a78bfa">공리 집합 (Axiom Set)</text>
  <text x="168" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#cbd5e1">참이라고 가정하는 출발점</text>

  <!-- Arrow -->
  <line x1="168" y1="96" x2="168" y2="112" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#pa)"/>
  <text x="200" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#a78bfa">논리적 추론</text>

  <!-- Theorem -->
  <rect x="30" y="116" width="276" height="36" rx="4" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1"/>
  <text x="168" y="132" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#a78bfa">정리 (Theorem)</text>
  <text x="168" y="146" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#cbd5e1">공리로부터 논리적으로 도출</text>

  <!-- Properties -->
  <rect x="30" y="164" width="130" height="36" rx="4" fill="rgba(74,222,128,0.06)" stroke="#4ade80" stroke-width="1"/>
  <text x="95" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#4ade80">무모순성</text>
  <text x="95" y="194" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#cbd5e1">S와 ~S 동시 불가</text>

  <rect x="176" y="164" width="130" height="36" rx="4" fill="rgba(96,165,250,0.06)" stroke="#60a5fa" stroke-width="1"/>
  <text x="241" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#60a5fa">완전성?</text>
  <text x="241" y="194" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#cbd5e1">모든 참에 증명 존재?</text>

  <!-- Key difference -->
  <rect x="30" y="212" width="276" height="26" rx="4" fill="rgba(248,113,113,0.06)" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="168" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#f87171">현실에 존재하지 않아도 된다</text>

  <!-- ===== 우측: Physics ===== -->
  <rect x="362" y="28" width="300" height="220" rx="8" fill="#0d1524" stroke="#4ade80" stroke-width="1.5"/>
  <text x="512" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">물리학</text>

  <!-- Math foundation -->
  <rect x="374" y="60" width="276" height="36" rx="4" fill="rgba(167,139,250,0.06)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="512" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#a78bfa">수학적 모델</text>
  <text x="512" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#cbd5e1">논리적 체계 위에 구축</text>

  <!-- Plus sign -->
  <text x="512" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4ade80">+</text>

  <!-- Experiment -->
  <rect x="374" y="116" width="276" height="36" rx="4" fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1"/>
  <text x="512" y="132" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#4ade80">반복 실험 (Experiment)</text>
  <text x="512" y="146" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#cbd5e1">같은 실험 → 같은 결과</text>

  <!-- Scientific principle -->
  <rect x="374" y="164" width="276" height="72" rx="4" fill="rgba(249,115,22,0.06)" stroke="#f97316" stroke-width="1"/>
  <text x="512" y="182" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#f97316">과학적 원리</text>
  <text x="512" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">실험으로 검증 불가 → 존재하지 않음</text>
  <text x="512" y="214" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">실험으로 구별 불가 → 같은 것</text>
  <text x="512" y="228" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">실험으로 차이 검증 불가 → 차이 없음</text>

  <!-- ===== 하단: 연결 ===== -->
  <line x1="18" y1="262" x2="662" y2="262" stroke="#2d3748" stroke-width="1"/>

  <rect x="80" y="272" width="220" height="34" rx="6" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1"/>
  <text x="190" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#a78bfa">논리: 무모순 + 논리적 추론 = 참</text>

  <rect x="380" y="272" width="220" height="34" rx="6" fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1"/>
  <text x="490" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4ade80">물리: 수학 + 실험적 검증 = 참</text>

  <!-- Connection arrow -->
  <line x1="300" y1="289" x2="374" y2="289" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="337" y="284" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#94a3b8">기반</text>
</svg>