<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 200" width="620" height="200">
  <rect width="620" height="200" fill="#0f1117" rx="10"/>
  <text x="310" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">L₄ DFA — 0* 1* 형태의 문자열</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Initial arrow -->
  <line x1="35" y1="105" x2="67" y2="105" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- q0 (accept, double circle) at (100, 105) -->
  <circle cx="100" cy="105" r="30" fill="#1a2035" stroke="#4ade80" stroke-width="2"/>
  <circle cx="100" cy="105" r="22" fill="none" stroke="#4ade80" stroke-width="1.2"/>
  <text x="100" y="101" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#4ade80">q₀</text>
  <text x="100" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4ade80">0…: accept</text>

  <!-- q1 (accept, double circle) at (310, 105) -->
  <circle cx="310" cy="105" r="30" fill="#1a2035" stroke="#4ade80" stroke-width="2"/>
  <circle cx="310" cy="105" r="22" fill="none" stroke="#4ade80" stroke-width="1.2"/>
  <text x="310" y="101" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#4ade80">q₁</text>
  <text x="310" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4ade80">1…: accept</text>

  <!-- q_dead (reject) at (510, 105) -->
  <circle cx="510" cy="105" r="30" fill="#1a2035" stroke="#f87171" stroke-width="1.5"/>
  <text x="510" y="101" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f87171">q_d</text>
  <text x="510" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#f87171">reject</text>

  <!-- Self-loop q0: 0 -->
  <path d="M 85,75 C 52,32 148,32 115,75" fill="none" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="100" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#e2e8f0">0</text>

  <!-- Self-loop q1: 1 -->
  <path d="M 295,75 C 262,32 358,32 325,75" fill="none" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="310" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#e2e8f0">1</text>

  <!-- Self-loop q_dead: 0,1 -->
  <path d="M 495,75 C 462,32 558,32 525,75" fill="none" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e2e8f0">0,1</text>

  <!-- q0 --1--> q1 -->
  <line x1="130" y1="105" x2="278" y2="105" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="204" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#e2e8f0">1</text>

  <!-- q1 --0--> q_dead -->
  <line x1="340" y1="105" x2="478" y2="105" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="409" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#e2e8f0">0</text>

  <!-- Legend -->
  <text x="310" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7a99">이중 원(녹색) = Accepting State  ·  빨간 원 = Dead (Reject) State</text>
</svg>
