<svg viewBox="0 0 720 440" width="1080" height="660" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="440" rx="10" fill="#0f1117"/>
  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">증명 2 — 왜 u의 엣지만 갱신해도 충분한가</text>
  <text x="360" y="50" text-anchor="middle" fill="#64748b" font-size="11">u → t → R^C 우회 경로는 불필요 — t는 u보다 먼저 R에 들어왔으므로 u 없는 d_min(t)가 이미 확정</text>

  <!-- R region -->
  <ellipse cx="280" cy="240" rx="200" ry="130" fill="#0c1426" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="280" y="120" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">R</text>

  <!-- R^C region -->
  <ellipse cx="580" cy="240" rx="120" ry="120" fill="#0c1426" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="580" y="130" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">R^C</text>

  <!-- v0 -->
  <circle cx="160" cy="240" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="245" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">v₀</text>

  <!-- intermediate R node -->
  <circle cx="230" cy="220" r="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>

  <!-- t (in R, blue) -->
  <circle cx="310" cy="280" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="285" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">t</text>

  <!-- u (just added — thicker red outline) -->
  <circle cx="400" cy="200" r="16" fill="#1e3a5f" stroke="#ef4444" stroke-width="3"/>
  <text x="400" y="205" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">u</text>

  <!-- R^C nodes -->
  <circle cx="560" cy="220" r="12" fill="#1e3a5f" stroke="#64748b" stroke-width="2"/>
  <circle cx="620" cy="270" r="12" fill="#1e3a5f" stroke="#64748b" stroke-width="2"/>
  <text x="620" y="275" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="700">v</text>

  <!-- Existing v0 → ... → t path (blue solid) — t의 확정된 d_min 경로 -->
  <line x1="160" y1="240" x2="230" y2="220" stroke="#3b82f6" stroke-width="2"/>
  <line x1="230" y1="220" x2="310" y2="280" stroke="#3b82f6" stroke-width="2"/>

  <!-- Existing v0 → ... → u path (blue solid, freshly determined this iteration) -->
  <line x1="230" y1="220" x2="400" y2="200" stroke="#3b82f6" stroke-width="2"/>

  <!-- Detour path: u → t → some R^C node v (gray dashed, "불필요") -->
  <line x1="400" y1="200" x2="310" y2="280" stroke="#64748b" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="310" y1="280" x2="620" y2="270" stroke="#64748b" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Direct path from u to R^C: u → v (red solid, "이게 충분") -->
  <line x1="400" y1="200" x2="560" y2="220" stroke="#ef4444" stroke-width="2.5"/>

  <!-- Labels -->
  <rect x="320" y="172" width="80" height="20" rx="4" fill="#0f1117" stroke="#ef4444"/>
  <text x="360" y="187" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">u → v 직접 갱신</text>

  <rect x="360" y="340" width="160" height="20" rx="4" fill="#0f1117" stroke="#64748b"/>
  <text x="440" y="355" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700">u → t → v: 불필요한 우회</text>

  <!-- Annotation -->
  <text x="360" y="400" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">t는 u보다 먼저 R에 들어왔다 → d_min(t)는 이미 u 없이 확정 → u를 거쳐 t로 갈 이유 없음</text>
</svg>
