<svg viewBox="0 0 720 700" width="1080" height="1050" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="700" rx="10" fill="#0f1117"/>
  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Dijkstra 알고리즘 진행 과정</text>
  <text x="360" y="50" text-anchor="middle" fill="#64748b" font-size="11">A에서 시작 — 매 단계 R^C 중 d_min이 가장 작은 정점을 R에 추가하고 인접 거리를 갱신</text>

  <!-- Panel separators -->
  <line x1="360" y1="80" x2="360" y2="680" stroke="#1e293b" stroke-width="1"/>
  <line x1="40" y1="380" x2="680" y2="380" stroke="#1e293b" stroke-width="1"/>

  <!--
    Common graph layout (within each panel, relative to panel origin):
    A(px+90, py+180), B(px+220, py+130), C(px+220, py+250), D(px+320, py+130), E(px+320, py+250)
    Edges: A-B(2), A-C(5), B-C(1), B-D(7), C-D(3), C-E(8), D-E(2)
  -->

  <!-- ====== PANEL 1: Step 0 — R = {A} ====== -->
  <text x="180" y="100" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Step 0 — R = {A}</text>

  <!-- Edges (all gray initially) -->
  <line x1="90" y1="180" x2="220" y2="130" stroke="#475569" stroke-width="1.5"/>
  <line x1="90" y1="180" x2="220" y2="250" stroke="#475569" stroke-width="1.5"/>
  <line x1="220" y1="130" x2="220" y2="250" stroke="#475569" stroke-width="1.5"/>
  <line x1="220" y1="130" x2="320" y2="130" stroke="#475569" stroke-width="1.5"/>
  <line x1="220" y1="250" x2="320" y2="130" stroke="#475569" stroke-width="1.5"/>
  <line x1="220" y1="250" x2="320" y2="250" stroke="#475569" stroke-width="1.5"/>
  <line x1="320" y1="130" x2="320" y2="250" stroke="#475569" stroke-width="1.5"/>

  <!-- Edge weights -->
  <rect x="141" y="145" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="152" y="159" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">2</text>
  <rect x="141" y="207" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="152" y="221" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">5</text>
  <rect x="209" y="181" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="220" y="195" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">1</text>
  <rect x="259" y="121" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="270" y="135" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">7</text>
  <rect x="259" y="181" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="270" y="195" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">3</text>
  <rect x="259" y="241" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="270" y="255" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">8</text>
  <rect x="309" y="181" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="320" y="195" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">2</text>

  <!-- Nodes P1: A in R (red), B/C/D/E in R^C (blue) -->
  <circle cx="90" cy="180" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="90" y="185" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">A</text>
  <circle cx="220" cy="130" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="135" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">B</text>
  <circle cx="220" cy="250" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="255" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">C</text>
  <circle cx="320" cy="130" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="135" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">D</text>
  <circle cx="320" cy="250" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="255" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">E</text>

  <!-- Distance labels (small badge above each non-R node) -->
  <text x="220" y="108" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=2</text>
  <text x="220" y="278" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=5</text>
  <text x="320" y="108" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=∞</text>
  <text x="320" y="278" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=∞</text>

  <text x="180" y="365" text-anchor="middle" fill="#64748b" font-size="10">초기 거리: [A=0, B=2, C=5, D=∞, E=∞]</text>

  <!-- ====== PANEL 2: Step 1 — B 추가, panel origin (360, 60) ====== -->
  <text x="540" y="100" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Step 1 — B 추가, R = {A, B}</text>

  <!-- Edges: A-B is now inside R (gray), B-C and B-D are the relaxed edges (red) -->
  <line x1="450" y1="180" x2="580" y2="130" stroke="#475569" stroke-width="1.5"/>
  <line x1="450" y1="180" x2="580" y2="250" stroke="#475569" stroke-width="1.5"/>
  <line x1="580" y1="130" x2="580" y2="250" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="580" y1="130" x2="680" y2="130" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="580" y1="250" x2="680" y2="130" stroke="#475569" stroke-width="1.5"/>
  <line x1="580" y1="250" x2="680" y2="250" stroke="#475569" stroke-width="1.5"/>
  <line x1="680" y1="130" x2="680" y2="250" stroke="#475569" stroke-width="1.5"/>

  <!-- Edge weights P2 -->
  <rect x="501" y="145" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="512" y="159" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">2</text>
  <rect x="501" y="207" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="512" y="221" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">5</text>
  <rect x="569" y="181" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="580" y="195" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">1</text>
  <rect x="619" y="121" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="630" y="135" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">7</text>
  <rect x="619" y="181" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="630" y="195" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">3</text>
  <rect x="619" y="241" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="630" y="255" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">8</text>
  <rect x="669" y="181" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="680" y="195" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">2</text>

  <!-- Nodes P2: A and B in R -->
  <circle cx="450" cy="180" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">A</text>
  <circle cx="580" cy="130" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="580" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">B</text>
  <circle cx="580" cy="250" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="580" y="255" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">C</text>
  <circle cx="680" cy="130" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="680" y="135" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">D</text>
  <circle cx="680" cy="250" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="680" y="255" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">E</text>

  <text x="580" y="278" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=3 (was 5)</text>
  <text x="680" y="108" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=9 (was ∞)</text>
  <text x="680" y="278" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=∞</text>

  <text x="540" y="365" text-anchor="middle" fill="#64748b" font-size="10">갱신: d[C]: 5 → 3, d[D]: ∞ → 9</text>

  <!-- ====== PANEL 3: Step 2 — C 추가, panel origin (0, 380) ====== -->
  <text x="180" y="420" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Step 2 — C 추가, R = {A, B, C}</text>

  <!-- Edges: A-B, B-C inside R (gray). C-D and C-E are relaxed (red). -->
  <line x1="90" y1="500" x2="220" y2="450" stroke="#475569" stroke-width="1.5"/>
  <line x1="90" y1="500" x2="220" y2="570" stroke="#475569" stroke-width="1.5"/>
  <line x1="220" y1="450" x2="220" y2="570" stroke="#475569" stroke-width="1.5"/>
  <line x1="220" y1="450" x2="320" y2="450" stroke="#475569" stroke-width="1.5"/>
  <line x1="220" y1="570" x2="320" y2="450" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="220" y1="570" x2="320" y2="570" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="320" y1="450" x2="320" y2="570" stroke="#475569" stroke-width="1.5"/>

  <!-- Edge weights P3 -->
  <rect x="141" y="465" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="152" y="479" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">2</text>
  <rect x="141" y="527" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="152" y="541" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">5</text>
  <rect x="209" y="501" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="220" y="515" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">1</text>
  <rect x="259" y="441" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="270" y="455" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">7</text>
  <rect x="259" y="501" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="270" y="515" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">3</text>
  <rect x="259" y="561" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="270" y="575" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">8</text>
  <rect x="309" y="501" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="320" y="515" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">2</text>

  <!-- Nodes P3: A, B, C in R -->
  <circle cx="90" cy="500" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="90" y="505" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">A</text>
  <circle cx="220" cy="450" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">B</text>
  <circle cx="220" cy="570" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="575" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">C</text>
  <circle cx="320" cy="450" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="455" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">D</text>
  <circle cx="320" cy="570" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="575" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">E</text>

  <text x="320" y="428" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=6 (was 9)</text>
  <text x="320" y="598" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=11 (was ∞)</text>

  <text x="180" y="685" text-anchor="middle" fill="#64748b" font-size="10">갱신: d[D]: 9 → 6, d[E]: ∞ → 11</text>

  <!-- ====== PANEL 4: Step 3+4 — 종료, panel origin (360, 380) ====== -->
  <text x="540" y="420" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Step 3·4 (압축) — 종료, R = V</text>

  <!-- All edges gray (algorithm done) -->
  <line x1="450" y1="500" x2="580" y2="450" stroke="#475569" stroke-width="1.5"/>
  <line x1="450" y1="500" x2="580" y2="570" stroke="#475569" stroke-width="1.5"/>
  <line x1="580" y1="450" x2="580" y2="570" stroke="#475569" stroke-width="1.5"/>
  <line x1="580" y1="450" x2="680" y2="450" stroke="#475569" stroke-width="1.5"/>
  <line x1="580" y1="570" x2="680" y2="450" stroke="#475569" stroke-width="1.5"/>
  <line x1="580" y1="570" x2="680" y2="570" stroke="#475569" stroke-width="1.5"/>
  <line x1="680" y1="450" x2="680" y2="570" stroke="#475569" stroke-width="1.5"/>

  <!-- Edge weights P4 -->
  <rect x="501" y="465" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="512" y="479" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">2</text>
  <rect x="501" y="527" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="512" y="541" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">5</text>
  <rect x="569" y="501" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="580" y="515" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">1</text>
  <rect x="619" y="441" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="630" y="455" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">7</text>
  <rect x="619" y="501" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="630" y="515" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">3</text>
  <rect x="619" y="561" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="630" y="575" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">8</text>
  <rect x="669" y="501" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="680" y="515" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">2</text>

  <!-- All nodes red (in R) -->
  <circle cx="450" cy="500" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="505" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">A</text>
  <circle cx="580" cy="450" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="580" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">B</text>
  <circle cx="580" cy="570" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="580" y="575" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">C</text>
  <circle cx="680" cy="450" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="680" y="455" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">D</text>
  <circle cx="680" cy="570" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="680" y="575" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">E</text>

  <!-- Final distance labels next to each node -->
  <text x="450" y="478" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=0</text>
  <text x="580" y="428" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=2</text>
  <text x="580" y="598" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=3</text>
  <text x="680" y="428" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=6</text>
  <text x="680" y="598" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=8</text>

  <text x="540" y="675" text-anchor="middle" fill="#64748b" font-size="10">Step 3: D 추가 시 d[E]: 11 → 8 — 이어서 Step 4: E 추가</text>
  <text x="540" y="690" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">최종 거리: [A=0, B=2, C=3, D=6, E=8]</text>
</svg>
