<svg viewBox="0 0 720 440" width="1080" height="660" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="440" rx="10" fill="#0f1117"/>
  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">증명 1 — 가장 작은 d_min(u)가 정말 u의 최단거리인가</text>
  <text x="360" y="50" text-anchor="middle" fill="#64748b" font-size="11">R^C를 거치는 우회 경로는 어느 시점 u'를 지나며, d_min(u') ≥ d_min(u)이므로 더 짧을 수 없다</text>

  <!-- R region (left blob) -->
  <ellipse cx="220" cy="240" rx="170" ry="120" fill="#0c1426" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="220" y="125" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">R (답이 확정된 정점)</text>

  <!-- R^C region (right blob) -->
  <ellipse cx="540" cy="240" rx="150" ry="120" fill="#0c1426" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="540" y="125" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">R^C (아직 미확정)</text>

  <!-- R internal nodes/edges -->
  <line x1="120" y1="220" x2="180" y2="240" stroke="#3b82f6" stroke-width="2"/>
  <line x1="180" y1="240" x2="260" y2="220" stroke="#3b82f6" stroke-width="2"/>
  <line x1="180" y1="240" x2="240" y2="290" stroke="#3b82f6" stroke-width="2"/>

  <circle cx="120" cy="220" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="225" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">v₀</text>
  <circle cx="180" cy="240" r="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="260" cy="220" r="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="240" cy="290" r="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>

  <!-- u on boundary -->
  <circle cx="390" cy="240" r="16" fill="#1e3a5f" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="390" y="245" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">u</text>

  <!-- u' inside R^C -->
  <circle cx="500" cy="290" r="14" fill="#1e3a5f" stroke="#64748b" stroke-width="2"/>
  <text x="500" y="295" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="700">u'</text>

  <!-- Other R^C nodes -->
  <circle cx="600" cy="220" r="12" fill="#1e3a5f" stroke="#64748b" stroke-width="2"/>
  <circle cx="620" cy="290" r="12" fill="#1e3a5f" stroke="#64748b" stroke-width="2"/>

  <!-- R^C internal edges -->
  <line x1="500" y1="290" x2="600" y2="220" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="500" y1="290" x2="620" y2="290" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="600" y1="220" x2="620" y2="290" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Path (i) — direct, red solid: v0 → 260 → u -->
  <line x1="260" y1="220" x2="390" y2="240" stroke="#ef4444" stroke-width="3"/>

  <!-- Path (ii) — detour, green dashed: v0 → 180,240 → 240,290 (in R) → u' → back to u -->
  <path d="M 240 290 Q 380 350 500 290" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="6 4"/>
  <path d="M 500 290 Q 460 260 390 240" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="6 4"/>

  <!-- Path labels -->
  <rect x="290" y="200" width="80" height="20" rx="4" fill="#0f1117" stroke="#ef4444"/>
  <text x="330" y="215" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">(i) 길이 d_min(u)</text>

  <rect x="320" y="340" width="120" height="20" rx="4" fill="#0f1117" stroke="#22c55e"/>
  <text x="380" y="355" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">(ii) 우회 경로 — u' 경유</text>

  <!-- Annotation -->
  <text x="360" y="400" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">d_min(u) ≤ d_min(u')  →  우회 경로 길이 ≥ d_min(u') ≥ d_min(u) → 더 짧을 수 없음</text>
</svg>
