<svg viewBox="0 0 720 400" width="1080" height="600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="400" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">복잡도 분석 — O(n log² n)</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">재귀 깊이 log n · 각 레벨 combine 비용 O(n log n)</text>

  <!-- Left axis label -->
  <text x="36" y="118" text-anchor="middle" fill="#64748b" font-size="10">레벨 0</text>
  <text x="36" y="193" text-anchor="middle" fill="#64748b" font-size="10">레벨 1</text>
  <text x="36" y="268" text-anchor="middle" fill="#64748b" font-size="10">레벨 2</text>
  <text x="36" y="330" text-anchor="middle" fill="#64748b" font-size="10">…</text>

  <!-- Depth bracket -->
  <line x1="660" y1="96" x2="660" y2="346" stroke="#64748b" stroke-width="1"/>
  <line x1="656" y1="96" x2="664" y2="96" stroke="#64748b" stroke-width="1"/>
  <line x1="656" y1="346" x2="664" y2="346" stroke="#64748b" stroke-width="1"/>
  <text x="692" y="225" text-anchor="middle" fill="#64748b" font-size="10" transform="rotate(90 692 225)">깊이 log n</text>

  <!-- Level 0: root (full problem, n points) -->
  <rect x="270" y="86" width="180" height="36" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="104" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">n개 점</text>
  <text x="360" y="118" text-anchor="middle" fill="#64748b" font-size="10">combine: O(n log n)</text>

  <!-- Level 0 cost label -->
  <text x="612" y="104" text-anchor="end" fill="#a78bfa" font-size="11">×1 → O(n log n)</text>

  <!-- Edges 0→1 -->
  <line x1="320" y1="122" x2="224" y2="158" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="400" y1="122" x2="496" y2="158" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Level 1: two nodes (n/2 each) -->
  <rect x="140" y="160" width="168" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="224" y="177" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">n/2개 점</text>
  <text x="224" y="190" text-anchor="middle" fill="#64748b" font-size="9">combine: O(n/2·log n/2)</text>

  <rect x="412" y="160" width="168" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="496" y="177" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">n/2개 점</text>
  <text x="496" y="190" text-anchor="middle" fill="#64748b" font-size="9">combine: O(n/2·log n/2)</text>

  <!-- Level 1 cost label -->
  <text x="612" y="180" text-anchor="end" fill="#a78bfa" font-size="11">×2 → O(n log n)</text>

  <!-- Edges 1→2 -->
  <line x1="170" y1="194" x2="138" y2="232" stroke="#3b82f6" stroke-width="1.3"/>
  <line x1="278" y1="194" x2="310" y2="232" stroke="#3b82f6" stroke-width="1.3"/>
  <line x1="442" y1="194" x2="410" y2="232" stroke="#3b82f6" stroke-width="1.3"/>
  <line x1="580" y1="194" x2="582" y2="232" stroke="#3b82f6" stroke-width="1.3"/>

  <!-- Level 2: four nodes (n/4 each) -->
  <rect x="90"  y="235" width="96" height="30" rx="5" fill="#162032" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="138" y="252" text-anchor="middle" fill="#93c5fd" font-size="10">n/4개</text>
  <text x="138" y="263" text-anchor="middle" fill="#64748b" font-size="8">O(n/4·log n/4)</text>

  <rect x="262" y="235" width="96" height="30" rx="5" fill="#162032" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="310" y="252" text-anchor="middle" fill="#93c5fd" font-size="10">n/4개</text>
  <text x="310" y="263" text-anchor="middle" fill="#64748b" font-size="8">O(n/4·log n/4)</text>

  <rect x="362" y="235" width="96" height="30" rx="5" fill="#162032" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="410" y="252" text-anchor="middle" fill="#93c5fd" font-size="10">n/4개</text>
  <text x="410" y="263" text-anchor="middle" fill="#64748b" font-size="8">O(n/4·log n/4)</text>

  <rect x="534" y="235" width="96" height="30" rx="5" fill="#162032" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="582" y="252" text-anchor="middle" fill="#93c5fd" font-size="10">n/4개</text>
  <text x="582" y="263" text-anchor="middle" fill="#64748b" font-size="8">O(n/4·log n/4)</text>

  <!-- Level 2 cost label -->
  <text x="612" y="258" text-anchor="end" fill="#a78bfa" font-size="11">×4 → O(n log n)</text>

  <!-- Dots row -->
  <text x="138" y="312" text-anchor="middle" fill="#475569" font-size="18">⋯</text>
  <text x="310" y="312" text-anchor="middle" fill="#475569" font-size="18">⋯</text>
  <text x="410" y="312" text-anchor="middle" fill="#475569" font-size="18">⋯</text>
  <text x="582" y="312" text-anchor="middle" fill="#475569" font-size="18">⋯</text>
  <text x="612" y="312" text-anchor="end" fill="#a78bfa" font-size="11">… × log n 레벨</text>

  <!-- Base cases row -->
  <text x="360" y="350" text-anchor="middle" fill="#4ade80" font-size="11">기저 사례 (크기 1): 상수 비용 O(1)</text>

  <!-- Summary box -->
  <rect x="160" y="366" width="400" height="28" rx="6" fill="#2d1f3f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="360" y="385" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">O(n log n) × log n 레벨 = O(n log² n)</text>
</svg>
