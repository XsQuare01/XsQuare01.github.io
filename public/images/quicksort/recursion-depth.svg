<svg viewBox="0 0 720 340" width="1080" height="510" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="340" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">재귀 깊이 — 균형 분할 vs 한쪽 쏠림</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">같은 n개라도 분할 균형에 따라 깊이가 log n이냐 n이냐로 갈린다</text>

  <!-- vertical divider -->
  <line x1="360" y1="70" x2="360" y2="300" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== LEFT: balanced (depth ~ log n) ===== -->
  <text x="180" y="90" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">균형 분할 · 깊이 ≈ log n</text>

  <!-- edges -->
  <line x1="180" y1="112" x2="120" y2="168" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="180" y1="112" x2="240" y2="168" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="120" y1="190" x2="92"  y2="240" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="120" y1="190" x2="148" y2="240" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="240" y1="190" x2="212" y2="240" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="240" y1="190" x2="268" y2="240" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- level 0 -->
  <circle cx="180" cy="106" r="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="111" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">n</text>
  <!-- level 1 -->
  <circle cx="120" cy="180" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="184" text-anchor="middle" fill="#93c5fd" font-size="10">n/2</text>
  <circle cx="240" cy="180" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="184" text-anchor="middle" fill="#93c5fd" font-size="10">n/2</text>
  <!-- level 2 -->
  <circle cx="92"  cy="252" r="12" fill="#14331f" stroke="#22c55e" stroke-width="2"/>
  <circle cx="148" cy="252" r="12" fill="#14331f" stroke="#22c55e" stroke-width="2"/>
  <circle cx="212" cy="252" r="12" fill="#14331f" stroke="#22c55e" stroke-width="2"/>
  <circle cx="268" cy="252" r="12" fill="#14331f" stroke="#22c55e" stroke-width="2"/>

  <!-- depth bracket left -->
  <line x1="40" y1="106" x2="40" y2="252" stroke="#64748b" stroke-width="1"/>
  <line x1="36" y1="106" x2="44" y2="106" stroke="#64748b" stroke-width="1"/>
  <line x1="36" y1="252" x2="44" y2="252" stroke="#64748b" stroke-width="1"/>
  <text x="30" y="183" text-anchor="middle" fill="#64748b" font-size="10" transform="rotate(-90 30 183)">≈ log n 단계</text>

  <text x="180" y="290" text-anchor="middle" fill="#4ade80" font-size="10">각 단계 비용 O(n) × log n 단계 = O(n log n)</text>

  <!-- ===== RIGHT: skewed (depth ~ n) ===== -->
  <text x="540" y="90" text-anchor="middle" fill="#f97316" font-size="12" font-weight="700">한쪽 쏠림 · 깊이 ≈ n</text>

  <!-- chain edges -->
  <line x1="470" y1="112" x2="498" y2="146" stroke="#f97316" stroke-width="1.5"/>
  <line x1="498" y1="158" x2="526" y2="192" stroke="#f97316" stroke-width="1.5"/>
  <line x1="526" y1="204" x2="554" y2="238" stroke="#f97316" stroke-width="1.5"/>
  <line x1="554" y1="250" x2="582" y2="280" stroke="#f97316" stroke-width="1.5"/>

  <!-- size-1 stubs (the peeled-off element each step) -->
  <line x1="470" y1="106" x2="510" y2="106" stroke="#475569" stroke-width="1.2"/>
  <circle cx="522" cy="106" r="7" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <line x1="498" y1="152" x2="538" y2="152" stroke="#475569" stroke-width="1.2"/>
  <circle cx="550" cy="152" r="7" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <line x1="526" y1="198" x2="566" y2="198" stroke="#475569" stroke-width="1.2"/>
  <circle cx="578" cy="198" r="7" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>

  <!-- chain nodes -->
  <circle cx="470" cy="106" r="15" fill="#3a2a14" stroke="#f97316" stroke-width="2"/>
  <text x="470" y="110" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="700">n</text>
  <circle cx="498" cy="152" r="14" fill="#3a2a14" stroke="#f97316" stroke-width="2"/>
  <text x="498" y="156" text-anchor="middle" fill="#fb923c" font-size="10">n−1</text>
  <circle cx="526" cy="198" r="13" fill="#3a2a14" stroke="#f97316" stroke-width="2"/>
  <text x="526" y="202" text-anchor="middle" fill="#fb923c" font-size="9">n−2</text>
  <circle cx="554" cy="244" r="12" fill="#3a2a14" stroke="#f97316" stroke-width="2"/>
  <text x="554" y="248" text-anchor="middle" fill="#fb923c" font-size="8">n−3</text>
  <circle cx="582" cy="286" r="6" fill="#3a2a14" stroke="#f97316" stroke-width="1.5"/>

  <!-- depth bracket right -->
  <line x1="660" y1="106" x2="660" y2="286" stroke="#64748b" stroke-width="1"/>
  <line x1="656" y1="106" x2="664" y2="106" stroke="#64748b" stroke-width="1"/>
  <line x1="656" y1="286" x2="664" y2="286" stroke="#64748b" stroke-width="1"/>
  <text x="678" y="196" text-anchor="middle" fill="#64748b" font-size="10" transform="rotate(90 678 196)">≈ n 단계</text>

  <text x="500" y="312" text-anchor="middle" fill="#fb923c" font-size="10">각 단계 한 칸씩만 줄어 n 단계 = O(n²)</text>
</svg>
