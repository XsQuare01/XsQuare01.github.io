<svg viewBox="0 0 720 290" width="1080" height="435" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="290" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Quick Sort — 두 포인터로 분할하기</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">i는 p 이상에서, j는 p 미만에서 멈추고 두 값을 맞바꾼다</text>

  <!-- Array cells: [5,3,8,1,7,2,6], pivot = a[0] = 5 -->
  <!-- pivot -->
  <rect x="164" y="96" width="50" height="44" rx="4" fill="#7c2d12" stroke="#f97316" stroke-width="2"/>
  <text x="189" y="124" text-anchor="middle" fill="#fed7aa" font-size="16" font-weight="700">5</text>
  <text x="189" y="86" text-anchor="middle" fill="#64748b" font-size="10">a[0]</text>
  <text x="189" y="160" text-anchor="middle" fill="#fb923c" font-size="10" font-style="italic">pivot p</text>

  <!-- a[1]=3 -->
  <rect x="220" y="96" width="50" height="44" rx="4" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="245" y="124" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="700">3</text>
  <!-- a[2]=8 (i stops here) -->
  <rect x="276" y="96" width="50" height="44" rx="4" fill="#3a2f12" stroke="#eab308" stroke-width="2.5"/>
  <text x="301" y="124" text-anchor="middle" fill="#fde047" font-size="16" font-weight="700">8</text>
  <!-- a[3]=1 -->
  <rect x="332" y="96" width="50" height="44" rx="4" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="357" y="124" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="700">1</text>
  <!-- a[4]=7 -->
  <rect x="388" y="96" width="50" height="44" rx="4" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="413" y="124" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="700">7</text>
  <!-- a[5]=2 (j stops here) -->
  <rect x="444" y="96" width="50" height="44" rx="4" fill="#3a2f12" stroke="#eab308" stroke-width="2.5"/>
  <text x="469" y="124" text-anchor="middle" fill="#fde047" font-size="16" font-weight="700">2</text>
  <!-- a[6]=6 -->
  <rect x="500" y="96" width="50" height="44" rx="4" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="525" y="124" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="700">6</text>

  <!-- i pointer under a[2] -->
  <polygon points="301,150 294,162 308,162" fill="#3b82f6"/>
  <text x="301" y="178" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">i</text>
  <text x="301" y="194" text-anchor="middle" fill="#3b82f6" font-size="10">전진 →</text>

  <!-- j pointer under a[5] -->
  <polygon points="469,150 462,162 476,162" fill="#22c55e"/>
  <text x="469" y="178" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">j</text>
  <text x="469" y="194" text-anchor="middle" fill="#22c55e" font-size="10">← 후진</text>

  <!-- swap arrow between 8 and 2 -->
  <path d="M 301 70 Q 385 36 469 70" fill="none" stroke="#eab308" stroke-width="1.8" stroke-dasharray="5 3"/>
  <polygon points="301,70 305,60 311,68" fill="#eab308"/>
  <polygon points="469,70 459,68 465,60" fill="#eab308"/>
  <text x="385" y="34" text-anchor="middle" fill="#fde047" font-size="11" font-weight="600">swap</text>

  <!-- annotations -->
  <text x="360" y="226" text-anchor="middle" fill="#93c5fd" font-size="11">i는 a[i] &lt; p 인 동안 전진 → p보다 큰 값 8에서 멈춘다</text>
  <text x="360" y="246" text-anchor="middle" fill="#4ade80" font-size="11">j는 a[j] &gt; p 인 동안 후진 → p보다 작은 값 2에서 멈춘다</text>
  <text x="360" y="270" text-anchor="middle" fill="#cbd5e1" font-size="11">8과 2를 맞바꾸고 계속 좁혀 간다. 엇갈리는 순간 pivot을 경계로 보내 최종 위치를 확정</text>
</svg>
