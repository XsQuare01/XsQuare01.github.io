<svg viewBox="0 0 720 300" width="1080" height="450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="300" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Approximate Median — 가운데 40% 안이면 충분하다</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">정렬된 수직선에서 pivot이 30번째~70번째 백분위 사이에 놓이면 어느 쪽 재귀도 최대 0.7n</text>

  <!-- Number line axis -->
  <line x1="80" y1="140" x2="640" y2="140" stroke="#334155" stroke-width="2"/>
  <!-- left cap -->
  <line x1="80" y1="132" x2="80" y2="148" stroke="#475569" stroke-width="2"/>
  <!-- right cap -->
  <line x1="640" y1="132" x2="640" y2="148" stroke="#475569" stroke-width="2"/>
  <!-- min / max labels -->
  <text x="80" y="164" text-anchor="middle" fill="#64748b" font-size="10">최솟값</text>
  <text x="640" y="164" text-anchor="middle" fill="#64748b" font-size="10">최댓값</text>

  <!-- 30% tick -->
  <line x1="248" y1="128" x2="248" y2="152" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="248" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">30%</text>

  <!-- 70% tick -->
  <line x1="472" y1="128" x2="472" y2="152" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="472" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">70%</text>

  <!-- left 30% band -->
  <rect x="80" y="108" width="168" height="64" rx="0" fill="#1e293b" stroke="none" opacity="0.8"/>
  <text x="164" y="176" text-anchor="middle" fill="#64748b" font-size="11">하위 30%</text>
  <text x="164" y="190" text-anchor="middle" fill="#475569" font-size="10">0.3n 원소</text>

  <!-- center 40% band — highlighted -->
  <rect x="248" y="100" width="224" height="80" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="132" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Approximate Median 영역</text>
  <text x="360" y="152" text-anchor="middle" fill="#60a5fa" font-size="11">가운데 40%</text>
  <text x="360" y="172" text-anchor="middle" fill="#64748b" font-size="10">이 범위의 어느 값을 pivot으로 써도 OK</text>

  <!-- right 30% band -->
  <rect x="472" y="108" width="168" height="64" rx="0" fill="#1e293b" stroke="none" opacity="0.8"/>
  <text x="556" y="176" text-anchor="middle" fill="#64748b" font-size="11">상위 30%</text>
  <text x="556" y="190" text-anchor="middle" fill="#475569" font-size="10">0.3n 원소</text>

  <!-- Worst case arrows -->
  <!-- pivot at 30% tick — worst left side recursion -->
  <line x1="248" y1="215" x2="248" y2="230" stroke="#f97316" stroke-width="1.5"/>
  <circle cx="248" cy="210" r="5" fill="#f97316"/>
  <!-- left arrow: 0.3n -->
  <line x1="80" y1="245" x2="243" y2="245" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="80,245 89,241 89,249" fill="#3b82f6"/>
  <text x="161" y="240" text-anchor="middle" fill="#93c5fd" font-size="10">0.3n</text>
  <!-- right arrow: 0.7n worst case -->
  <line x1="253" y1="245" x2="640" y2="245" stroke="#f97316" stroke-width="2"/>
  <polygon points="640,245 631,241 631,249" fill="#f97316"/>
  <text x="447" y="240" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">최대 0.7n — 재귀 크기 상한</text>

  <!-- pivot label -->
  <text x="248" y="270" text-anchor="middle" fill="#fb923c" font-size="10">pivot = 30번째 백분위 (최악)</text>

  <!-- annotation -->
  <text x="360" y="295" text-anchor="middle" fill="#475569" font-size="10">pivot이 70번째 백분위일 때도 대칭적으로 왼쪽이 최대 0.7n — 어느 경우도 0.7n 초과 없음</text>
</svg>
