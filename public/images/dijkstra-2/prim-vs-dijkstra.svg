<svg viewBox="0 0 720 460" width="1080" height="690" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="460" rx="10" fill="#0f1117"/>
  <text x="360" y="32" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Prim vs Dijkstra — 같은 그래프, 다른 트리</text>
  <text x="360" y="52" text-anchor="middle" fill="#64748b" font-size="11">Prim은 "트리에 닿는 가장 가벼운 간선", Dijkstra는 "시작점에서 가장 짧은 거리"를 본다</text>

  <line x1="360" y1="80" x2="360" y2="440" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== LEFT: Prim (MST) ===== -->
  <text x="180" y="108" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Prim → MST</text>

  <!-- edges: A-B(2) and B-C(2) chosen (red); A-C(3) excluded (gray) -->
  <line x1="90" y1="200" x2="290" y2="200" stroke="#475569" stroke-width="1.5"/>
  <line x1="90" y1="200" x2="190" y2="360" stroke="#ef4444" stroke-width="3.5"/>
  <line x1="290" y1="200" x2="190" y2="360" stroke="#ef4444" stroke-width="3.5"/>

  <rect x="179" y="190" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="190" y="204" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">3</text>
  <rect x="109" y="271" width="22" height="18" rx="3" fill="#0f1117" stroke="#ef4444"/>
  <text x="120" y="285" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">2</text>
  <rect x="249" y="271" width="22" height="18" rx="3" fill="#0f1117" stroke="#ef4444"/>
  <text x="260" y="285" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">2</text>

  <circle cx="90" cy="200" r="18" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="90" y="205" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">A</text>
  <circle cx="290" cy="200" r="18" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="290" y="205" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">C</text>
  <circle cx="190" cy="360" r="18" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="190" y="365" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">B</text>

  <text x="180" y="410" text-anchor="middle" fill="#94a3b8" font-size="11">선택: A-B(2), B-C(2) — A-C(3)은 더 무거워 제외</text>
  <text x="180" y="430" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">C는 B를 거쳐 연결 (간선 무게 2)</text>

  <!-- ===== RIGHT: Dijkstra (SPT from A) ===== -->
  <text x="540" y="108" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Dijkstra → 최단경로 트리 (시작 A)</text>

  <!-- edges: A-B(2) and A-C(3) chosen (red); B-C(2) unused (gray) -->
  <line x1="450" y1="200" x2="650" y2="200" stroke="#ef4444" stroke-width="3.5"/>
  <line x1="450" y1="200" x2="550" y2="360" stroke="#ef4444" stroke-width="3.5"/>
  <line x1="650" y1="200" x2="550" y2="360" stroke="#475569" stroke-width="1.5"/>

  <rect x="539" y="190" width="22" height="18" rx="3" fill="#0f1117" stroke="#ef4444"/>
  <text x="550" y="204" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">3</text>
  <rect x="469" y="271" width="22" height="18" rx="3" fill="#0f1117" stroke="#ef4444"/>
  <text x="480" y="285" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">2</text>
  <rect x="609" y="271" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="620" y="285" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">2</text>

  <circle cx="450" cy="200" r="18" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="205" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">A</text>
  <circle cx="650" cy="200" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="650" y="205" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">C</text>
  <circle cx="550" cy="360" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="550" y="365" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">B</text>

  <text x="650" y="176" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=3</text>
  <text x="550" y="394" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">d=2</text>

  <text x="540" y="416" text-anchor="middle" fill="#94a3b8" font-size="11">A→C 직접(3) &lt; A→B→C(2+2=4) → 직접 간선 선택</text>
  <text x="540" y="436" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">C는 A에서 직접 연결 (거리 3)</text>
</svg>
