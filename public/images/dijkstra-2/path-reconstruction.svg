<svg viewBox="0 0 720 480" width="1080" height="720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="480" rx="10" fill="#0f1117"/>
  <text x="360" y="32" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">최단 경로 복원 — 각 노드가 "나를 갱신한 노드"를 기억한다</text>
  <text x="360" y="52" text-anchor="middle" fill="#64748b" font-size="11">1편과 같은 그래프 (시작점 A). 굵은 빨간 간선 = 최단경로 트리, 화살표는 predecessor(부모)를 가리킴</text>

  <!--
    Nodes: A(110,280) B(270,170) C(270,400) D(450,250) E(610,350)
    Edges: A-B(2) A-C(5) B-C(1) B-D(7) C-D(3) C-E(8) D-E(2)
    Shortest dist: A=0 B=2 C=3 D=6 E=8
    Predecessor: B<-A, C<-B, D<-C, E<-D  (single chain A->B->C->D->E)
  -->

  <!-- All edges (gray base) -->
  <line x1="110" y1="280" x2="270" y2="170" stroke="#475569" stroke-width="1.5"/>
  <line x1="110" y1="280" x2="270" y2="400" stroke="#475569" stroke-width="1.5"/>
  <line x1="270" y1="170" x2="270" y2="400" stroke="#475569" stroke-width="1.5"/>
  <line x1="270" y1="170" x2="450" y2="250" stroke="#475569" stroke-width="1.5"/>
  <line x1="270" y1="400" x2="450" y2="250" stroke="#475569" stroke-width="1.5"/>
  <line x1="270" y1="400" x2="610" y2="350" stroke="#475569" stroke-width="1.5"/>
  <line x1="450" y1="250" x2="610" y2="350" stroke="#475569" stroke-width="1.5"/>

  <!-- Shortest-path-tree edges (thick red): A-B, B-C, C-D, D-E -->
  <line x1="110" y1="280" x2="270" y2="170" stroke="#ef4444" stroke-width="3.5"/>
  <line x1="270" y1="170" x2="270" y2="400" stroke="#ef4444" stroke-width="3.5"/>
  <line x1="270" y1="400" x2="450" y2="250" stroke="#ef4444" stroke-width="3.5"/>
  <line x1="450" y1="250" x2="610" y2="350" stroke="#ef4444" stroke-width="3.5"/>

  <!-- Edge weights -->
  <rect x="179" y="216" width="22" height="18" rx="3" fill="#0f1117" stroke="#ef4444"/>
  <text x="190" y="230" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">2</text>
  <rect x="179" y="331" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="190" y="345" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">5</text>
  <rect x="259" y="276" width="22" height="18" rx="3" fill="#0f1117" stroke="#ef4444"/>
  <text x="270" y="290" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">1</text>
  <rect x="349" y="200" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="360" y="214" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">7</text>
  <rect x="349" y="315" width="22" height="18" rx="3" fill="#0f1117" stroke="#ef4444"/>
  <text x="360" y="329" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">3</text>
  <rect x="429" y="366" width="22" height="18" rx="3" fill="#0f1117" stroke="#334155"/>
  <text x="440" y="380" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">8</text>
  <rect x="519" y="289" width="22" height="18" rx="3" fill="#0f1117" stroke="#ef4444"/>
  <text x="530" y="303" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">2</text>

  <!-- Nodes -->
  <circle cx="110" cy="280" r="18" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="110" y="285" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">A</text>
  <circle cx="270" cy="170" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="270" y="175" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">B</text>
  <circle cx="270" cy="400" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="270" y="405" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">C</text>
  <circle cx="450" cy="250" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="255" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">D</text>
  <circle cx="610" cy="350" r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="610" y="355" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">E</text>

  <!-- Distance + predecessor badges -->
  <text x="110" y="318" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">d=0 (시작)</text>
  <text x="270" y="143" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">d=2, 부모=A</text>
  <text x="270" y="438" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">d=3, 부모=B</text>
  <text x="450" y="223" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">d=6, 부모=C</text>
  <text x="610" y="388" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">d=8, 부모=D</text>

  <!-- Reconstructed path footnote -->
  <text x="360" y="462" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">E의 최단경로 복원: E → D → C → B → A 를 거꾸로 따라가면 A→B→C→D→E (길이 8)</text>
</svg>
