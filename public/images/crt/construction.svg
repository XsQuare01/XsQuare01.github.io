<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 310" width="930" height="465">
  <rect width="620" height="310" fill="#0f1117" rx="10"/>
  <text x="310" y="16" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">CRT 구성 예시 — x ≡ 2 (mod 3),  x ≡ 3 (mod 5),  x ≡ 2 (mod 7)</text>

  <!-- System label -->
  <text x="310" y="35" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">m = 3 × 5 × 7 = 105</text>

  <!-- Table: headers -->
  <!-- Columns: i | mi | ci | Mi=m/mi | Ni=Mi⁻¹ mod mi | ci·Mi·Ni -->
  <!-- x boundaries: 20 | 65 | 120 | 175 | 240 | 390 | 510 | 600 -->

  <rect x="20" y="45" width="580" height="160" rx="4" fill="none" stroke="#2d3748" stroke-width="1.2"/>

  <!-- Vertical dividers -->
  <line x1="65"  y1="45" x2="65"  y2="205" stroke="#2d3748" stroke-width="1"/>
  <line x1="120" y1="45" x2="120" y2="205" stroke="#2d3748" stroke-width="1"/>
  <line x1="175" y1="45" x2="175" y2="205" stroke="#2d3748" stroke-width="1"/>
  <line x1="255" y1="45" x2="255" y2="205" stroke="#2d3748" stroke-width="1"/>
  <line x1="415" y1="45" x2="415" y2="205" stroke="#2d3748" stroke-width="1.5"/>

  <!-- Horizontal dividers -->
  <line x1="20" y1="80"  x2="600" y2="80"  stroke="#2d3748" stroke-width="1.5"/>
  <line x1="20" y1="120" x2="600" y2="120" stroke="#2d3748" stroke-width="1"/>
  <line x1="20" y1="160" x2="600" y2="160" stroke="#2d3748" stroke-width="1"/>

  <!-- Header -->
  <text x="42"  y="67" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">i</text>
  <text x="92"  y="67" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">mᵢ</text>
  <text x="147" y="67" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">cᵢ</text>
  <text x="215" y="67" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">Mᵢ = m/mᵢ</text>
  <text x="335" y="60" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">Nᵢ = Mᵢ⁻¹ mod mᵢ</text>
  <text x="335" y="74" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#4b5563">(베주 항등식으로 계산)</text>
  <text x="507" y="67" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#fbbf24">cᵢ·Mᵢ·Nᵢ</text>

  <!-- Row i=1: 3 | 2 | 35 | 35≡2(mod3), 2·2=4≡1 → N=2 | 140 -->
  <text x="42"  y="105" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">1</text>
  <text x="92"  y="105" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">3</text>
  <text x="147" y="105" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#93c5fd">2</text>
  <text x="215" y="105" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">35</text>
  <text x="335" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">35 ≡ 2 (mod 3)</text>
  <text x="335" y="113" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">2 · 2 = 4 ≡ 1  →  N₁ = 2</text>
  <text x="507" y="105" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#fbbf24">140</text>

  <!-- Row i=2: 5 | 3 | 21 | 21≡1(mod5), 1·1=1≡1 → N=1 | 63 -->
  <text x="42"  y="145" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">2</text>
  <text x="92"  y="145" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">5</text>
  <text x="147" y="145" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#93c5fd">3</text>
  <text x="215" y="145" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">21</text>
  <text x="335" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">21 ≡ 1 (mod 5)</text>
  <text x="335" y="153" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">1 · 1 = 1 ≡ 1  →  N₂ = 1</text>
  <text x="507" y="145" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#fbbf24">63</text>

  <!-- Row i=3: 7 | 2 | 15 | 15≡1(mod7), 1·1=1≡1 → N=1 | 30 -->
  <text x="42"  y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">3</text>
  <text x="92"  y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">7</text>
  <text x="147" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#93c5fd">2</text>
  <text x="215" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">15</text>
  <text x="335" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">15 ≡ 1 (mod 7)</text>
  <text x="335" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">1 · 1 = 1 ≡ 1  →  N₃ = 1</text>
  <text x="507" y="185" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#fbbf24">30</text>

  <!-- Sum and result -->
  <text x="310" y="225" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">합계:  140 + 63 + 30 = 233  ≡  <tspan font-weight="700" fill="#4ade80">23</tspan>  (mod 105)</text>

  <!-- Verification box -->
  <rect x="95" y="236" width="430" height="35" rx="6" fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1.2"/>
  <text x="310" y="259" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#86efac">검증:  23 ≡ 2 (mod 3) ✓    23 ≡ 3 (mod 5) ✓    23 ≡ 2 (mod 7) ✓</text>

  <!-- Captions -->
  <text x="310" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="600" fill="#e2e8f0">x = Σ cᵢ·Mᵢ·Nᵢ  mod m  — 해는 mod 105에서 유일</text>
  <text x="310" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">i ≠ j이면 Mᵢ에 mⱼ가 인수로 포함 → j번째 조건에서 0으로 소거됨</text>
</svg>
