<svg viewBox="0 0 720 360" width="1080" height="540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="720" height="360" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">어떤 데이터를 앞에 둘까?</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">예 ·  A = (길이 4, 빈도 1)   B = (길이 1, 빈도 4)</text>

  <!-- ===== Order 1: A → B (bad) ===== -->
  <text x="60" y="104" fill="#f87171" font-size="12" font-weight="700">A → B</text>

  <!-- start head -->
  <polygon points="118,92 118,124 138,108 " fill="#475569"/>
  <!-- A (long) -->
  <rect x="140" y="90" width="160" height="34" fill="#3a1820" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="112" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700">A  (길이 4)</text>
  <!-- B (short) -->
  <rect x="300" y="90" width="40" height="34" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="112" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">B</text>

  <text x="370" y="112" fill="#cbd5e1" font-size="12">비용 = 1·4 + 4·(4+1) =</text>
  <text x="568" y="112" fill="#f87171" font-size="15" font-weight="700">24</text>

  <!-- ===== Order 2: B → A (good) ===== -->
  <text x="60" y="184" fill="#4ade80" font-size="12" font-weight="700">B → A</text>

  <!-- start head -->
  <polygon points="118,172 118,204 138,188 " fill="#475569"/>
  <!-- B (short) -->
  <rect x="140" y="170" width="40" height="34" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="192" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">B</text>
  <!-- A (long) -->
  <rect x="180" y="170" width="160" height="34" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="260" y="192" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">A  (길이 4)</text>

  <text x="370" y="192" fill="#cbd5e1" font-size="12">비용 = 4·1 + 1·(1+4) =</text>
  <text x="568" y="192" fill="#4ade80" font-size="15" font-weight="700">9</text>

  <!-- Divider -->
  <line x1="60" y1="232" x2="660" y2="232" stroke="#1e293b" stroke-width="1"/>

  <!-- Insight box -->
  <rect x="120" y="252" width="480" height="60" rx="8" fill="#0b1220" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="278" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">자주 쓰고(F 큰) 짧은(L 작은) 데이터를 앞으로</text>
  <text x="360" y="299" text-anchor="middle" fill="#94a3b8" font-size="12">B의 F/L = 4,   A의 F/L = 0.25   →   F/L 큰 순서로 정렬</text>

  <!-- Footnote -->
  <text x="360" y="338" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">앞 데이터는 뒤 데이터를 읽을 때마다 매번 지나치므로, 짧고 자주 쓰는 것이 앞에 와야 이득이다</text>
</svg>
