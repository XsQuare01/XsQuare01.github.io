<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="680" height="280">
  <rect width="680" height="280" fill="#0f1117" rx="10"/>
  <text x="340" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">NFA의 비결정성 — 동시에 여러 경로 탐색</text>
  <defs>
