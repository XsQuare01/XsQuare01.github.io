  <path d="M 116,126 C 165,75 225,75 262,75" fill="none" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="188" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e2e8f0">a</text>

  <path d="M 116,154 C 165,207 225,207 262,207" fill="none" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="188" y="227" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e2e8f0">a</text>

