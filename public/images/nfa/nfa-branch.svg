  <line x1="316" y1="207" x2="432" y2="207" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <text x="290" y="46" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4ade80">경로 1 (accept)</text>
  <text x="290" y="246" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f87171">경로 2 (dead end)</text>

  <rect x="504" y="116" width="160" height="50" rx="8" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
