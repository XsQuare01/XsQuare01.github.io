<svg viewBox="0 0 760 340" width="1140" height="510" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="760" height="340" rx="10" fill="#0f1117"/>
  <text x="380" y="28" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">AVL Tree — |L - R| ≤ 1 을 유지하는 균형 BST</text>

  <!-- ===== Unbalanced (Left) ===== -->
  <text x="190" y="52" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600">불균형 BST</text>

  <!-- Edges -->
  <line x1="190" y1="88" x2="130" y2="138" stroke="#334155" stroke-width="1.5"/>
  <line x1="190" y1="88" x2="250" y2="138" stroke="#334155" stroke-width="1.5"/>
  <line x1="130" y1="168" x2="80" y2="218" stroke="#334155" stroke-width="1.5"/>
  <line x1="80" y1="248" x2="40" y2="288" stroke="#334155" stroke-width="1.5"/>

  <!-- Nodes -->
  <rect x="160" y="64" width="60" height="28" rx="14" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="190" y="83" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">30</text>
  <text x="230" y="74" fill="#ef4444" font-size="9">L=3 R=1</text>

  <rect x="100" y="140" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="159" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">20</text>

  <rect x="220" y="140" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="250" y="159" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">35</text>

  <rect x="50" y="220" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="239" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">10</text>

  <rect x="10" y="290" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="40" y="309" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">5</text>

  <!-- Rotation arrow -->
  <path d="M320,170 C340,170 340,170 360,170" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrowOrangeAVL)"/>
  <text x="340" y="160" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600">회전</text>

  <!-- ===== Balanced AVL (Right) ===== -->
  <text x="560" y="52" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">균형 AVL Tree</text>

  <!-- Edges -->
  <line x1="560" y1="88" x2="460" y2="138" stroke="#334155" stroke-width="1.5"/>
  <line x1="560" y1="88" x2="660" y2="138" stroke="#334155" stroke-width="1.5"/>
  <line x1="460" y1="168" x2="410" y2="218" stroke="#334155" stroke-width="1.5"/>
  <line x1="660" y1="168" x2="710" y2="218" stroke="#334155" stroke-width="1.5"/>

  <!-- Root: 20 -->
  <rect x="530" y="64" width="60" height="28" rx="14" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="560" y="83" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">20</text>
  <text x="600" y="74" fill="#22c55e" font-size="9">L=2 R=2</text>

  <!-- Level 1: 10, 30 -->
  <rect x="430" y="140" width="60" height="28" rx="14" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="460" y="159" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">10</text>
  <text x="500" y="150" fill="#22c55e" font-size="9">L=1 R=0</text>

  <rect x="630" y="140" width="60" height="28" rx="14" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="660" y="159" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">30</text>
  <text x="700" y="150" fill="#22c55e" font-size="9">L=0 R=1</text>

  <!-- Level 2: 5, 15, 35 -->
  <rect x="380" y="220" width="60" height="28" rx="14" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="410" y="239" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">5</text>

  <rect x="680" y="220" width="60" height="28" rx="14" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="710" y="239" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">35</text>

  <!-- Bottom note -->
  <text x="380" y="330" text-anchor="middle" fill="#64748b" font-size="11">모든 노드에서 |L - R| ≤ 1 유지 · Height = O(log n) 보장 · 회전으로 균형 복구</text>

  <defs>
    <marker id="arrowOrangeAVL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>
</svg>
