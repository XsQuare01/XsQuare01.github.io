<svg viewBox="0 0 760 200" width="1140" height="300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="760" height="200" rx="10" fill="#0f1117"/>
  <text x="380" y="28" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Linked List — 노드와 포인터로 연결된 자료구조</text>

  <!-- Node 1 -->
  <rect x="60" y="75" width="50" height="40" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="100" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">10</text>
  <rect x="110" y="75" width="30" height="40" rx="4" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="125" cy="95" r="4" fill="#3b82f6"/>

  <!-- Arrow 1→2 -->
  <path d="M140,95 L190,95" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrowBlueLL)"/>

  <!-- Node 2 -->
  <rect x="195" y="75" width="50" height="40" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="100" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">25</text>
  <rect x="245" y="75" width="30" height="40" rx="4" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="260" cy="95" r="4" fill="#3b82f6"/>

  <!-- Arrow 2→3 -->
  <path d="M275,95 L325,95" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrowBlueLL)"/>

  <!-- Node 3 (insert target) -->
  <rect x="330" y="75" width="50" height="40" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="355" y="100" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">30</text>
  <rect x="380" y="75" width="30" height="40" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="395" cy="95" r="4" fill="#22c55e"/>

  <!-- Arrow 3→4 -->
  <path d="M410,95 L460,95" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrowBlueLL)"/>

  <!-- Node 4 -->
  <rect x="465" y="75" width="50" height="40" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="490" y="100" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">42</text>
  <rect x="515" y="75" width="30" height="40" rx="4" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="530" cy="95" r="4" fill="#3b82f6"/>

  <!-- Arrow 4→null -->
  <path d="M545,95 L590,95" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrowBlueLL)"/>
  <text x="610" y="100" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">null</text>

  <!-- Labels -->
  <text x="85" y="68" text-anchor="middle" fill="#94a3b8" font-size="10">data</text>
  <text x="125" y="68" text-anchor="middle" fill="#94a3b8" font-size="10">next</text>

  <!-- Head pointer -->
  <text x="85" y="135" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600">Head</text>
  <path d="M85,125 L85,118" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrowOrangeLL)"/>

  <!-- Insert annotation -->
  <text x="355" y="55" text-anchor="middle" fill="#86efac" font-size="11">Insert: 포인터 변경만으로 O(1)</text>

  <!-- Bottom note -->
  <text x="380" y="172" text-anchor="middle" fill="#64748b" font-size="11">순차 접근만 가능 · Binary Search 불가 · Insert/Delete 시 포인터 변경 O(1)</text>

  <!-- Legend -->
  <rect x="200" y="183" width="12" height="12" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="218" y="193" fill="#94a3b8" font-size="10">기존 노드</text>
  <rect x="310" y="183" width="12" height="12" rx="3" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="328" y="193" fill="#94a3b8" font-size="10">삽입 노드</text>

  <defs>
    <marker id="arrowBlueLL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowOrangeLL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>
</svg>
