<svg viewBox="0 0 760 200" width="1140" height="300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="760" height="200" rx="10" fill="#0f1117"/>
  <text x="380" y="30" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Array — 연속된 메모리에 동일한 타입의 데이터를 저장</text>

  <!-- Index labels -->
  <text x="130" y="65" text-anchor="middle" fill="#64748b" font-size="11">index</text>
  <text x="210" y="65" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">0</text>
  <text x="290" y="65" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">1</text>
  <text x="370" y="65" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">2</text>
  <text x="450" y="65" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">3</text>
  <text x="530" y="65" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">4</text>
  <text x="610" y="65" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">5</text>

  <!-- Array cells -->
  <text x="130" y="100" text-anchor="middle" fill="#64748b" font-size="11">value</text>
  <rect x="175" y="76" width="70" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="98" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">10</text>
  <rect x="255" y="76" width="70" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="98" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">25</text>
  <rect x="335" y="76" width="70" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="370" y="98" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">8</text>
  <rect x="415" y="76" width="70" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="98" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">42</text>
  <rect x="495" y="76" width="70" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="530" y="98" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">17</text>
  <rect x="575" y="76" width="70" height="34" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="610" y="98" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">3</text>

  <!-- Address labels -->
  <text x="130" y="135" text-anchor="middle" fill="#64748b" font-size="11">addr</text>
  <text x="210" y="135" text-anchor="middle" fill="#475569" font-size="10" font-family="monospace">0x100</text>
  <text x="290" y="135" text-anchor="middle" fill="#475569" font-size="10" font-family="monospace">0x104</text>
  <text x="370" y="135" text-anchor="middle" fill="#475569" font-size="10" font-family="monospace">0x108</text>
  <text x="450" y="135" text-anchor="middle" fill="#475569" font-size="10" font-family="monospace">0x10C</text>
  <text x="530" y="135" text-anchor="middle" fill="#475569" font-size="10" font-family="monospace">0x110</text>
  <text x="610" y="135" text-anchor="middle" fill="#475569" font-size="10" font-family="monospace">0x114</text>

  <!-- Direct access arrow -->
  <path d="M450,150 L450,115" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="450" y="168" text-anchor="middle" fill="#86efac" font-size="11">arr[3] → O(1) 직접 접근</text>

  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="380" y="192" text-anchor="middle" fill="#64748b" font-size="11">크기가 고정 · 연속 메모리 · 인덱스로 O(1) 접근 · 정렬 시 Binary Search 가능</text>
</svg>
