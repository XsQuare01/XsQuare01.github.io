<svg viewBox="0 0 760 340" width="1140" height="510" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="760" height="340" rx="10" fill="#0f1117"/>
  <text x="380" y="28" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Min Heap — 부모는 항상 자식보다 작다</text>

  <!-- Edges -->
  <line x1="380" y1="68" x2="230" y2="128" stroke="#334155" stroke-width="1.5"/>
  <line x1="380" y1="68" x2="530" y2="128" stroke="#334155" stroke-width="1.5"/>
  <line x1="230" y1="158" x2="150" y2="208" stroke="#334155" stroke-width="1.5"/>
  <line x1="230" y1="158" x2="310" y2="208" stroke="#334155" stroke-width="1.5"/>
  <line x1="530" y1="158" x2="450" y2="208" stroke="#334155" stroke-width="1.5"/>
  <line x1="530" y1="158" x2="610" y2="208" stroke="#334155" stroke-width="1.5"/>
  <line x1="150" y1="238" x2="105" y2="278" stroke="#334155" stroke-width="1.5"/>
  <line x1="150" y1="238" x2="195" y2="278" stroke="#334155" stroke-width="1.5"/>

  <!-- Root: 2 (min) -->
  <rect x="350" y="44" width="60" height="28" rx="14" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="380" y="63" text-anchor="middle" fill="#fed7aa" font-size="13" font-weight="700">2</text>
  <text x="380" y="40" text-anchor="middle" fill="#f97316" font-size="10">min</text>

  <!-- Level 1 -->
  <rect x="200" y="130" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="149" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">5</text>

  <rect x="500" y="130" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="530" y="149" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">8</text>

  <!-- Level 2 -->
  <rect x="120" y="210" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="229" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">10</text>

  <rect x="280" y="210" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="310" y="229" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">15</text>

  <rect x="420" y="210" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="229" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">12</text>

  <rect x="580" y="210" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="610" y="229" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">20</text>

  <!-- Level 3: new insert -->
  <rect x="75" y="280" width="60" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="105" y="299" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">18</text>

  <rect x="165" y="280" width="60" height="28" rx="14" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="195" y="299" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">3</text>

  <!-- Insert bubble-up arrow -->
  <path d="M195,276 C195,260 170,250 155,242" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowGreenH)"/>
  <text x="225" y="276" fill="#86efac" font-size="10">3 &lt; 10 → 위로 이동</text>

  <!-- Operation notes -->
  <text x="650" y="75" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Insert</text>
  <text x="650" y="92" fill="#64748b" font-size="10" text-anchor="middle">1. 맨 뒤에 삽입</text>
  <text x="650" y="107" fill="#64748b" font-size="10" text-anchor="middle">2. 부모와 비교하며 위로</text>

  <text x="650" y="135" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Delete (min)</text>
  <text x="650" y="152" fill="#64748b" font-size="10" text-anchor="middle">1. root 제거</text>
  <text x="650" y="167" fill="#64748b" font-size="10" text-anchor="middle">2. 맨 뒤 → root로</text>
  <text x="650" y="182" fill="#64748b" font-size="10" text-anchor="middle">3. 자식과 비교하며 아래로</text>

  <!-- Bottom -->
  <text x="380" y="330" text-anchor="middle" fill="#64748b" font-size="11">Priority Queue 구현 · Insert/Delete: O(log n) · 꽉 찬 이진 트리 형태 유지</text>

  <defs>
    <marker id="arrowGreenH" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
