<svg viewBox="0 0 760 300" width="1140" height="450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="760" height="300" rx="10" fill="#0f1117"/>
  <text x="380" y="28" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Graph — 정점(Vertex)과 간선(Edge)의 집합</text>

  <!-- Edges -->
  <line x1="180" y1="100" x2="340" y2="80" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <line x1="180" y1="100" x2="240" y2="200" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="80" x2="480" y2="120" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="80" x2="240" y2="200" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="80" x2="400" y2="210" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="120" x2="400" y2="210" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <line x1="240" y1="200" x2="400" y2="210" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>

  <!-- Vertices -->
  <circle cx="180" cy="100" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="105" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">A</text>

  <circle cx="340" cy="80" r="22" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="340" y="85" text-anchor="middle" fill="#fed7aa" font-size="13" font-weight="700">B</text>

  <circle cx="480" cy="120" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="125" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">C</text>

  <circle cx="240" cy="200" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="240" y="205" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">D</text>

  <circle cx="400" cy="210" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="215" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">E</text>

  <!-- Degree annotation for B -->
  <text x="340" y="50" text-anchor="middle" fill="#f97316" font-size="10">deg(B) = 4</text>

  <!-- Definition box -->
  <rect x="530" y="60" width="210" height="105" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="635" y="82" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">G = (V, E)</text>
  <text x="545" y="102" fill="#94a3b8" font-size="10">V = {A, B, C, D, E}</text>
  <text x="545" y="118" fill="#94a3b8" font-size="10">E = {{A,B}, {A,D}, {B,C},</text>
  <text x="565" y="134" fill="#94a3b8" font-size="10">{B,D}, {B,E}, {C,E}, {D,E}}</text>
  <text x="545" y="155" fill="#64748b" font-size="10">|E| ≤ n(n-1)/2</text>

  <!-- Bottom note -->
  <text x="380" y="265" text-anchor="middle" fill="#64748b" font-size="11">Simple Graph: 무방향, 자기 루프 없음 · 최대 간선 수 = n(n-1)/2</text>
  <text x="380" y="282" text-anchor="middle" fill="#64748b" font-size="11">cycle이 존재할 수 있음 · 다른 자료구조의 일반화</text>
</svg>
