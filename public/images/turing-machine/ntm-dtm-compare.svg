<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 280" width="1170" height="420">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#4a5568"/>
    </marker>
  </defs>
  <rect width="780" height="280" fill="#0f1117" rx="10"/>

  <!-- Title -->
  <text x="390" y="20" text-anchor="middle" fill="#e2e8f0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">DTM vs NTM — 계산 가능성은 동일, 효율은 다를 수 있다</text>

  <!-- DTM Box -->
  <rect x="10" y="30" width="355" height="200" rx="8" fill="#1a2035" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="10" y="30" width="355" height="38" rx="8" fill="rgba(96,165,250,0.15)"/>
  <text x="187" y="55" text-anchor="middle" fill="#60a5fa" font-size="10.4" font-weight="700" font-family="system-ui,-apple-system,sans-serif">DTM — 결정론적</text>

  <!-- DTM: 5 nodes in a line at cy=128 -->
  <circle cx="50"  cy="128" r="16" fill="#1a2035" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="105" cy="128" r="16" fill="#1a2035" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="165" cy="128" r="16" fill="#1a2035" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="225" cy="128" r="16" fill="#1a2035" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="280" cy="128" r="16" fill="#1a2035" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="280" cy="128" r="11" fill="none"    stroke="#60a5fa" stroke-width="1.5"/>

  <!-- DTM arrows -->
  <line x1="66"  y1="128" x2="87"  y2="128" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="121" y1="128" x2="147" y2="128" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="181" y1="128" x2="207" y2="128" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="241" y1="128" x2="262" y2="128" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="187" y="200" text-anchor="middle" fill="#e2e8f0" font-size="8.8" font-family="system-ui,-apple-system,sans-serif">하나의 경로만 탐색</text>

  <!-- NTM Box -->
  <rect x="415" y="30" width="355" height="200" rx="8" fill="#1a2035" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="415" y="30" width="355" height="38" rx="8" fill="rgba(167,139,250,0.15)"/>
  <text x="592" y="55" text-anchor="middle" fill="#a78bfa" font-size="10.4" font-weight="700" font-family="system-ui,-apple-system,sans-serif">NTM — 비결정론적</text>

  <!-- NTM: root -->
  <circle cx="460" cy="132" r="14" fill="#1a2035" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- NTM: level 2 (gap 64px, no overlap) -->
  <circle cx="510" cy="100" r="14" fill="#1a2035" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="510" cy="164" r="14" fill="#1a2035" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- NTM: leaves at cy=84,116,148,180 (32px apart, r=12 → 8px gap each) -->
  <circle cx="558" cy="84"  r="12" fill="#1a2035" stroke="#4ade80" stroke-width="2"/>
  <circle cx="558" cy="84"  r="7"  fill="none"    stroke="#4ade80" stroke-width="1"/>
  <circle cx="558" cy="116" r="12" fill="#1a2035" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="558" cy="148" r="12" fill="#1a2035" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="558" cy="180" r="12" fill="#1a2035" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- NTM arrows: root → level2 -->
  <line x1="472" y1="124" x2="498" y2="108" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="472" y1="140" x2="498" y2="156" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- NTM arrows: level2-upper → leaf1, leaf2 -->
  <line x1="523" y1="96"  x2="547" y2="88"  stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="523" y1="104" x2="547" y2="112" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- NTM arrows: level2-lower → leaf3, leaf4 -->
  <line x1="523" y1="160" x2="547" y2="152" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="523" y1="168" x2="547" y2="176" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="592" y="210" text-anchor="middle" fill="#e2e8f0" font-size="8.8" font-family="system-ui,-apple-system,sans-serif">여러 경로 동시 탐색</text>

  <!-- Summary bar -->
  <rect x="10" y="237" width="760" height="32" rx="6" fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-width="1"/>
  <text x="390" y="258" text-anchor="middle" fill="#4ade80" font-size="9.6" font-weight="700" font-family="system-ui,-apple-system,sans-serif">Class DTM = Class NTM  ·  계산 가능성 동일, 단 시간 복잡도는 다를 수 있음</text>
</svg>
