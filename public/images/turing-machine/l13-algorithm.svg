<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 225" width="1410" height="338">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#4a5568"/>
    </marker>
  </defs>
  <rect width="940" height="225" fill="#0f1117" rx="10"/>
  <text x="470" y="18" text-anchor="middle" fill="#6b7a99" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">L₁₃ 알고리즘 — y2y 동일성 검사</text>
  <rect x="10" y="28" width="220" height="185" rx="8" fill="#1a2035" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="10" y="28" width="220" height="38" rx="8" fill="rgba(251,146,60,0.15)"/>
  <text x="120" y="45" text-anchor="middle" fill="#fb923c" font-size="8" font-weight="700" font-family="system-ui,-apple-system,sans-serif">STEP 1</text>
  <text x="120" y="60" text-anchor="middle" fill="#fb923c" font-size="10.4" font-weight="700" font-family="system-ui,-apple-system,sans-serif">심볼 마킹</text>
  <text x="120" y="90" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">왼쪽 미처리 심볼 읽기</text>
  <text x="120" y="110" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">0 → 3으로 마킹</text>
  <text x="120" y="130" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">1 → 4로 마킹</text>
  <text x="120" y="152" text-anchor="middle" fill="#fb923c" font-size="8.8" font-family="system-ui,-apple-system,sans-serif">이후 오른쪽 이동</text>
  <line x1="230" y1="120" x2="248" y2="120" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="250" y="28" width="220" height="185" rx="8" fill="#1a2035" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="250" y="28" width="220" height="38" rx="8" fill="rgba(96,165,250,0.15)"/>
  <text x="360" y="45" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="700" font-family="system-ui,-apple-system,sans-serif">STEP 2</text>
  <text x="360" y="60" text-anchor="middle" fill="#60a5fa" font-size="10.4" font-weight="700" font-family="system-ui,-apple-system,sans-serif">구분자 통과</text>
  <text x="360" y="90" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">마킹된 심볼 (3,4) 건너뜀</text>
  <text x="360" y="110" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">구분자 '2' 찾을 때까지</text>
  <text x="360" y="130" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">오른쪽으로 이동</text>
  <text x="360" y="152" text-anchor="middle" fill="#60a5fa" font-size="8.8" font-family="system-ui,-apple-system,sans-serif">구분자 '2' 통과</text>
  <line x1="470" y1="120" x2="488" y2="120" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="490" y="28" width="220" height="185" rx="8" fill="#1a2035" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="490" y="28" width="220" height="38" rx="8" fill="rgba(251,191,36,0.15)"/>
  <text x="600" y="45" text-anchor="middle" fill="#fbbf24" font-size="8" font-weight="700" font-family="system-ui,-apple-system,sans-serif">STEP 3</text>
  <text x="600" y="60" text-anchor="middle" fill="#fbbf24" font-size="10.4" font-weight="700" font-family="system-ui,-apple-system,sans-serif">대응 심볼 확인</text>
  <text x="600" y="90" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">3이었으면 → 0 기대</text>
  <text x="600" y="110" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">4이었으면 → 1 기대</text>
  <text x="600" y="130" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">일치하면 마킹 후 복귀</text>
  <text x="600" y="152" text-anchor="middle" fill="#f87171" font-size="8.8" font-family="system-ui,-apple-system,sans-serif">불일치 → Reject</text>
  <line x1="710" y1="120" x2="728" y2="120" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="730" y="28" width="200" height="185" rx="8" fill="#1a2035" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="730" y="28" width="200" height="38" rx="8" fill="rgba(74,222,128,0.15)"/>
  <text x="830" y="45" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="700" font-family="system-ui,-apple-system,sans-serif">STEP 4</text>
  <text x="830" y="60" text-anchor="middle" fill="#4ade80" font-size="10.4" font-weight="700" font-family="system-ui,-apple-system,sans-serif">반복 / 종료</text>
  <text x="830" y="90" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">처음으로 돌아가 반복</text>
  <text x="830" y="110" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">2 앞뒤 모두 마킹 완료시</text>
  <text x="830" y="130" text-anchor="middle" fill="#cbd5e0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">→ Accept</text>
  <text x="830" y="152" text-anchor="middle" fill="#4ade80" font-size="8.8" font-family="system-ui,-apple-system,sans-serif">미처리 심볼 없음 확인</text>
</svg>
