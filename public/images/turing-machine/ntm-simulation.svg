<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" width="1170" height="450">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#4a5568"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#4ade80"/>
    </marker>
    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#f87171"/>
    </marker>
  </defs>
  <rect width="780" height="300" fill="#0f1117" rx="10"/>

  <!-- Title -->
  <text x="390" y="18" text-anchor="middle" fill="#e2e8f0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">NTM 시뮬레이션 — UTM의 BFS 트리 탐색</text>

  <!-- Root -->
  <circle cx="390" cy="58" r="22" fill="#1a2035" stroke="#a78bfa" stroke-width="2"/>
  <text x="390" y="62" text-anchor="middle" fill="#a78bfa" font-size="8.8" font-family="'JetBrains Mono',monospace">(q₀,a)</text>

  <!-- Level 1: two branch nodes -->
  <circle cx="240" cy="125" r="20" fill="#1a2035" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="240" y="129" text-anchor="middle" fill="#cbd5e0" font-size="8" font-family="'JetBrains Mono',monospace">(r,b,R)</text>
  <circle cx="540" cy="125" r="20" fill="#1a2035" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="540" y="129" text-anchor="middle" fill="#cbd5e0" font-size="8" font-family="'JetBrains Mono',monospace">(r,c,R)</text>

  <!-- Curves: root → level 1 -->
  <path d="M 374,70 C 330,100 270,112 258,117" fill="none" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 410,70 C 450,100 510,112 522,117" fill="none" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="390" y="94" text-anchor="middle" fill="#e2e8f0" font-size="8" font-family="system-ui,-apple-system,sans-serif">BFS 탐색</text>

  <!-- Level 2: Accept, Reject, ..., ... (moved down to cy=205 for spacing) -->
  <!-- Accept (green double circle) -->
  <circle cx="140" cy="205" r="18" fill="#1a2035" stroke="#4ade80" stroke-width="2"/>
  <circle cx="140" cy="205" r="12" fill="none" stroke="#4ade80" stroke-width="1"/>
  <text x="140" y="209" text-anchor="middle" fill="#4ade80" font-size="7.2" font-family="system-ui,-apple-system,sans-serif">Accept</text>
  <!-- Reject -->
  <circle cx="285" cy="205" r="18" fill="#1a2035" stroke="#f87171" stroke-width="1.5"/>
  <text x="285" y="209" text-anchor="middle" fill="#f87171" font-size="7.2" font-family="system-ui,-apple-system,sans-serif">Reject</text>
  <!-- ... (left) -->
  <circle cx="435" cy="205" r="18" fill="#1a2035" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="435" y="210" text-anchor="middle" fill="#e2e8f0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">...</text>
  <!-- ... (right) -->
  <circle cx="565" cy="205" r="18" fill="#1a2035" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="565" y="210" text-anchor="middle" fill="#e2e8f0" font-size="9.6" font-family="system-ui,-apple-system,sans-serif">...</text>

  <!-- Lines: level1-left → Accept (green), Reject (red) -->
  <line x1="224" y1="137" x2="154" y2="194" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="250" y1="142" x2="276" y2="189" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Lines: level1-right → ...(left), ...(right) -->
  <line x1="524" y1="137" x2="449" y2="194" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="546" y1="144" x2="560" y2="188" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Summary box -->
  <rect x="615" y="142" width="155" height="52" rx="8" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="692" y="166" text-anchor="middle" fill="#4ade80" font-size="9.6" font-weight="700" font-family="system-ui,-apple-system,sans-serif">하나라도</text>
  <text x="692" y="183" text-anchor="middle" fill="#4ade80" font-size="8.8" font-family="system-ui,-apple-system,sans-serif">Accept → ACCEPT</text>

  <!-- Dashed path: Accept → summary box, routed below all level-2 nodes -->
  <path d="M 140,223 C 140,275 620,275 614,175" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-green)"/>

  <!-- Bottom summary text -->
  <text x="390" y="283" text-anchor="middle" fill="#e2e8f0" font-size="8" font-family="system-ui,-apple-system,sans-serif">BFS로 모든 경로를 동시에 탐색  ·  하나라도 Accept이면 전체 Accept  ·  NTM → DTM(UTM)으로 시뮬레이션 가능</text>
</svg>
