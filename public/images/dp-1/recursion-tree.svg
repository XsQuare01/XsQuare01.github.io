<svg viewBox="0 0 860 430" width="1290" height="645" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="860" height="430" rx="10" fill="#0f1117"/>

  <text x="430" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">F(5)의 재귀 트리 — 같은 부분 문제를 몇 번씩 다시 푼다</text>
  <text x="430" y="50" text-anchor="middle" fill="#64748b" font-size="11">F(3)은 2번, F(2)는 3번 계산된다. n이 커지면 이 중복이 지수로 불어난다</text>

  <!-- edges -->
  <g stroke="#334155" stroke-width="1.2">
    <!-- F5 -> F4, F3 -->
    <line x1="430" y1="86" x2="250" y2="126"/>
    <line x1="430" y1="86" x2="650" y2="126"/>
    <!-- F4 -> F3, F2 -->
    <line x1="250" y1="146" x2="150" y2="186"/>
    <line x1="250" y1="146" x2="350" y2="186"/>
    <!-- F3(right) -> F2, F1 -->
    <line x1="650" y1="146" x2="590" y2="186"/>
    <line x1="650" y1="146" x2="710" y2="186"/>
    <!-- F3(left@150) -> F2, F1 -->
    <line x1="150" y1="206" x2="95" y2="246"/>
    <line x1="150" y1="206" x2="205" y2="246"/>
    <!-- F2@350 -> F1, F0 -->
    <line x1="350" y1="206" x2="305" y2="246"/>
    <line x1="350" y1="206" x2="395" y2="246"/>
    <!-- F2@590 -> F1, F0 -->
    <line x1="590" y1="206" x2="545" y2="246"/>
    <line x1="590" y1="206" x2="635" y2="246"/>
    <!-- F2@95 -> F1, F0 -->
    <line x1="95" y1="266" x2="60" y2="306"/>
    <line x1="95" y1="266" x2="130" y2="306"/>
  </g>

  <!-- nodes: helper style via <g> per color -->
  <!-- root & unique-ish (slate) -->
  <g font-size="12.5" text-anchor="middle">
    <!-- F5 -->
    <circle cx="430" cy="76" r="17" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="430" y="80" fill="#e2e8f0">F5</text>
    <!-- F4 -->
    <circle cx="250" cy="136" r="17" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="250" y="140" fill="#e2e8f0">F4</text>

    <!-- F3 nodes (red = 중복 2회) -->
    <circle cx="150" cy="196" r="17" fill="#3a1518" stroke="#f87171" stroke-width="2"/>
    <text x="150" y="200" fill="#fecaca">F3</text>
    <circle cx="650" cy="136" r="17" fill="#3a1518" stroke="#f87171" stroke-width="2"/>
    <text x="650" y="140" fill="#fecaca">F3</text>

    <!-- F2 nodes (amber = 중복 3회) -->
    <circle cx="350" cy="196" r="17" fill="#3a2c0f" stroke="#f59e0b" stroke-width="2"/>
    <text x="350" y="200" fill="#fde68a">F2</text>
    <circle cx="590" cy="196" r="17" fill="#3a2c0f" stroke="#f59e0b" stroke-width="2"/>
    <text x="590" y="200" fill="#fde68a">F2</text>
    <circle cx="95" cy="256" r="17" fill="#3a2c0f" stroke="#f59e0b" stroke-width="2"/>
    <text x="95" y="260" fill="#fde68a">F2</text>

    <!-- leaves F1 / F0 (green / gray) -->
    <circle cx="710" cy="196" r="15" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="710" y="200" fill="#6ee7b7">F1</text>
    <circle cx="205" cy="256" r="15" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="205" y="260" fill="#6ee7b7">F1</text>
    <circle cx="305" cy="256" r="15" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="305" y="260" fill="#6ee7b7">F1</text>
    <circle cx="545" cy="256" r="15" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="545" y="260" fill="#6ee7b7">F1</text>
    <circle cx="60" cy="316" r="15" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="60" y="320" fill="#6ee7b7">F1</text>

    <circle cx="395" cy="256" r="15" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="395" y="260" fill="#94a3b8">F0</text>
    <circle cx="635" cy="256" r="15" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="635" y="260" fill="#94a3b8">F0</text>
    <circle cx="130" cy="316" r="15" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="130" y="320" fill="#94a3b8">F0</text>
  </g>

  <!-- legend -->
  <g font-size="11.5">
    <circle cx="250" cy="368" r="8" fill="#3a1518" stroke="#f87171" stroke-width="2"/>
    <text x="264" y="372" fill="#fecaca">F3 — 2번 중복</text>
    <circle cx="400" cy="368" r="8" fill="#3a2c0f" stroke="#f59e0b" stroke-width="2"/>
    <text x="414" y="372" fill="#fde68a">F2 — 3번 중복</text>
  </g>
  <text x="430" y="404" text-anchor="middle" fill="#f87171" font-size="12.5">잎(F1)의 개수 = F(n) → 호출 수가 Θ(F(n))으로 지수 증가</text>
</svg>
