<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" width="960" height="780">
  <defs>
    <marker id="da" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="pa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="qa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="ba" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="640" height="520" fill="#0f1117" rx="10"/>

  <!-- ===== 제목 ===== -->
  <text x="320" y="22" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">확률적 암호화 (Probabilistic Encryption) — ElGamal vs RSA</text>

  <!-- ========== 상단: ElGamal ========== -->
  <text x="320" y="44" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#4ade80">ElGamal — 확률적 (Randomized)</text>

  <!-- 평문 m=5 -->
  <rect x="271" y="54" width="98" height="34" rx="6" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2"/>
  <text x="320" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4ade80">m = 5</text>

  <!-- 팬아웃 화살표 -->
  <line x1="305" y1="88" x2="130" y2="122" stroke="#f97316" stroke-width="1.4" marker-end="url(#pa)"/>
  <text x="196" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#f97316">k = 2</text>

  <line x1="320" y1="88" x2="320" y2="122" stroke="#a78bfa" stroke-width="1.4" marker-end="url(#qa)"/>
  <text x="337" y="109" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#a78bfa">k = 5</text>

  <line x1="335" y1="88" x2="510" y2="122" stroke="#60a5fa" stroke-width="1.4" marker-end="url(#ba)"/>
  <text x="441" y="112" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">k = 7</text>

  <!-- 암호문 박스 1 (k=2) -->
  <rect x="20" y="126" width="190" height="68" rx="6" fill="rgba(249,115,22,0.1)" stroke="#f97316" stroke-width="1.5"/>
  <text x="115" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#f97316">k=2  →  암호문</text>
  <text x="115" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#f97316">A = g² = 4</text>
  <text x="115" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#f97316">B = 5·8² = 1  →  (4, 1)</text>

  <!-- 암호문 박스 2 (k=5) -->
  <rect x="225" y="126" width="190" height="68" rx="6" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="320" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#a78bfa">k=5  →  암호문</text>
  <text x="320" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#a78bfa">A = g⁵ = 10</text>
  <text x="320" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#a78bfa">B = 5·8⁵ = 6  →  (10, 6)</text>

  <!-- 암호문 박스 3 (k=7) -->
  <rect x="430" y="126" width="190" height="68" rx="6" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="525" y="147" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#60a5fa">k=7  →  암호문</text>
  <text x="525" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#60a5fa">A = g⁷ = 7</text>
  <text x="525" y="183" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#60a5fa">B = 5·8⁷ = 10  →  (7, 10)</text>

  <!-- 수렴 화살표 -->
  <line x1="115" y1="194" x2="294" y2="226" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#da)"/>
  <line x1="320" y1="194" x2="320" y2="226" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#da)"/>
  <line x1="525" y1="194" x2="346" y2="226" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#da)"/>

  <!-- 복호화 결과 m=5 -->
  <rect x="271" y="230" width="98" height="34" rx="6" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2"/>
  <text x="320" y="252" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">m = 5  ✓</text>

  <text x="320" y="280" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#cbd5e1">k가 달라도 복호화하면 항상 m=5로 수렴</text>

  <!-- ========== 구분선 ========== -->
  <line x1="18" y1="296" x2="622" y2="296" stroke="#334155" stroke-width="1.5"/>

  <!-- ========== 하단: RSA ========== -->
  <text x="320" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#f87171">RSA — 결정적 (Deterministic)</text>

  <!-- 평문 m=5 -->
  <rect x="271" y="330" width="98" height="34" rx="6" fill="rgba(248,113,113,0.1)" stroke="#f87171" stroke-width="1.5"/>
  <text x="320" y="352" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f87171">m = 5</text>

  <!-- 화살표 -->
  <line x1="320" y1="364" x2="320" y2="388" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#da)"/>
  <text x="338" y="381" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">Enc(m)</text>

  <!-- 암호문 -->
  <rect x="210" y="392" width="220" height="42" rx="5" fill="rgba(248,113,113,0.08)" stroke="#f87171" stroke-width="1.5"/>
  <text x="320" y="410" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#f87171">C = m<tspan baseline-shift="super" font-size="70%">e</tspan> mod n</text>
  <text x="320" y="427" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#f87171">항상 동일한 암호문</text>

  <!-- 경고 박스 -->
  <rect x="80" y="446" width="480" height="52" rx="6" fill="rgba(248,113,113,0.06)" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="320" y="466" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#f87171">⚠  선택 평문 공격 (CPA) 취약</text>
  <text x="320" y="486" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">공격자가 후보 평문을 직접 암호화 → C와 비교 가능 → IND-CPA 불충족</text>

  <!-- 최하단 요약 -->
  <text x="320" y="507" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#4ade80">ElGamal은 k 재선택으로 IND-CPA 만족 — 단, 암호문 크기 2배 (A, B) 트레이드오프</text>
</svg>
