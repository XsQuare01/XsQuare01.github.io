<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="960" height="480">
  <defs>
    <marker id="earr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="harr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
  </defs>

  <rect width="640" height="320" fill="#0f1117" rx="10"/>
  <text x="320" y="17" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">이산 대수 문제 (DLP) — p=11, g=2, ℤ₁₁* = {1,...,10}</text>

  <!-- Circle: center (175, 168), r=120 -->
  <!-- 10 elements at angles 270 + k*36 degrees (k=0..9), starting from top -->
  <!-- Element values in order: 1,2,4,8,5,10,9,7,3,6 (powers of 2 mod 11) -->
  <!-- k=0: 270°, k=1: 306°, k=2: 342°, k=3: 18°, k=4: 54°, k=5: 90°, k=6: 126°, k=7: 162°, k=8: 198°, k=9: 234° -->
  <!-- x = 175 + 120*cos(θ), y = 168 + 120*sin(θ) -->
  <!-- k=0 (270°): cos=-0, sin=-1 → (175, 48) -->
  <!-- k=1 (306°): cos=0.588, sin=-0.809 → (246, 71) -->
  <!-- k=2 (342°): cos=0.978, sin=-0.208 → (292, 143) -->
  <!-- k=3 (18°):  cos=0.951, sin=0.309 → (289, 205) -->
  <!-- k=4 (54°):  cos=0.588, sin=0.809 → (246, 265) -->
  <!-- k=5 (90°):  cos=0,     sin=1     → (175, 288) -->
  <!-- k=6 (126°): cos=-0.588, sin=0.809 → (104, 265) -->
  <!-- k=7 (162°): cos=-0.951, sin=0.309 → (61, 205) -->
  <!-- k=8 (198°): cos=-0.978, sin=-0.208 → (58, 143) -->
  <!-- k=9 (234°): cos=-0.588, sin=-0.809 → (104, 71) -->

  <circle cx="175" cy="168" r="120" fill="none" stroke="#2d3748" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Arrow arcs between elements (clockwise, green = easy direction) -->
  <!-- We'll draw curved arrows along the circle. Using approximate paths. -->
  <!-- Simplified: just draw arc segments as short lines between adjacent nodes -->

  <!-- Node positions stored for reference:
    k=0: (175, 48)  → value 1 = 2^0
    k=1: (246, 71)  → value 2 = 2^1
    k=2: (292, 143) → value 4 = 2^2
    k=3: (289, 205) → value 8 = 2^3
    k=4: (246, 265) → value 5 = 2^4
    k=5: (175, 288) → value 10 = 2^5
    k=6: (104, 265) → value 9 = 2^6
    k=7: (61, 205)  → value 7 = 2^7
    k=8: (58, 143)  → value 3 = 2^8
    k=9: (104, 71)  → value 6 = 2^9
  -->

  <!-- Green curved arrows clockwise (easy: exponent → value) -->
  <path d="M 181 50 A 120 120 0 0 1 240 74" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#earr)"/>
  <path d="M 248 76 A 120 120 0 0 1 289 141" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#earr)"/>
  <path d="M 292 148 A 120 120 0 0 1 290 199" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#earr)"/>
  <path d="M 288 210 A 120 120 0 0 1 249 261" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#earr)"/>
  <path d="M 243 268 A 120 120 0 0 1 178 286" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#earr)"/>
  <path d="M 172 288 A 120 120 0 0 1 107 268" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#earr)"/>
  <path d="M 102 263 A 120 120 0 0 1 64 208" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#earr)"/>
  <path d="M 61 202 A 120 120 0 0 1 59 147" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#earr)"/>
  <path d="M 60 140 A 120 120 0 0 1 101 74" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#earr)"/>
  <path d="M 107 69 A 120 120 0 0 1 171 49" fill="none" stroke="#4ade80" stroke-width="1.3" stroke-opacity="0.6" marker-end="url(#earr)"/>

  <!-- Nodes -->
  <circle cx="175" cy="48"  r="17" fill="rgba(74,222,128,0.2)"  stroke="#4ade80" stroke-width="2"/>
  <text x="175" y="53"  text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">1</text>

  <circle cx="246" cy="71"  r="17" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="246" y="76"  text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">2</text>

  <circle cx="292" cy="143" r="17" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="292" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">4</text>

  <circle cx="289" cy="205" r="17" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="289" y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">8</text>

  <circle cx="246" cy="265" r="17" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="246" y="270" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">5</text>

  <circle cx="175" cy="288" r="17" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="175" y="293" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">10</text>

  <circle cx="104" cy="265" r="17" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="104" y="270" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">9</text>

  <circle cx="61"  cy="205" r="17" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="61"  y="210" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">7</text>

  <circle cx="58"  cy="143" r="17" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="58"  y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">3</text>

  <circle cx="104" cy="71"  r="17" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="104" y="76"  text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">6</text>

  <!-- Exponent labels outside circle -->
  <text x="175" y="26" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">k=0</text>
  <text x="258" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">k=1</text>
  <text x="312" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">k=2</text>
  <text x="308" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">k=3</text>
  <text x="266" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">k=4</text>
  <text x="175" y="309" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">k=5</text>
  <text x="76"  y="282" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">k=6</text>
  <text x="24"  y="210" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">k=7</text>
  <text x="18"  y="140" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">k=8</text>
  <text x="66"  y="56"  font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">k=9</text>

  <!-- Right panel: easy vs hard -->
  <line x1="345" y1="30" x2="345" y2="310" stroke="#2d3748" stroke-width="1"/>

  <text x="490" y="46" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#94a3b8">DLP 핵심</text>

  <!-- Easy direction -->
  <rect x="358" y="56" width="264" height="72" rx="6" fill="rgba(74,222,128,0.07)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="490" y="74" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#4ade80">쉬운 방향  O(log k)</text>
  <text x="490" y="91" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">k → g^k mod p</text>
  <text x="490" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#475569">Square-and-Multiply 사용</text>
  <text x="490" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#475569">예: k=3 → 2³ mod 11 = 8</text>

  <!-- Hard direction -->
  <rect x="358" y="140" width="264" height="72" rx="6" fill="rgba(248,113,113,0.07)" stroke="#f87171" stroke-width="1.5"/>
  <text x="490" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#f87171">어려운 방향  지수적 시간</text>
  <text x="490" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">g^k mod p → k</text>
  <text x="490" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#475569">알려진 다항식 알고리즘 없음</text>
  <text x="490" y="206" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#475569">예: 8 → k=? (mod 11, g=2)</text>

  <!-- Security note -->
  <rect x="358" y="224" width="264" height="50" rx="6" fill="#0f1929" stroke="#2d3748" stroke-width="1.5"/>
  <text x="490" y="244" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#94a3b8">ElGamal 보안 근거</text>
  <text x="490" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">g^x (공개)로부터 x (비밀)를</text>
  <text x="490" y="274" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">구하는 것 = DLP 풀기</text>

  <!-- Generator label in center -->
  <text x="175" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#475569">g = 2</text>
  <text x="175" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#374151">생성원</text>
  <text x="175" y="192" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#374151">generator</text>

  <!-- Legend -->
  <line x1="358" y1="291" x2="376" y2="291" stroke="#4ade80" stroke-width="2"/>
  <text x="380" y="295" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#4ade80">×2 (mod 11) — 쉬움</text>
</svg>
