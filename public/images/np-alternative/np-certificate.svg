<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 275" width="620" height="275">
  <rect width="620" height="275" fill="#0f1117" rx="10"/>
  <text x="310" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">NP의 검증자 모델 (Verifier Model)</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#6b7280"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#4ade80"/>
    </marker>
  </defs>

  <rect x="25" y="100" width="115" height="58" rx="5" fill="#1a2035" stroke="#60a5fa" stroke-width="2"/>
  <text x="82" y="124" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#60a5fa">입력 x</text>
  <text x="82" y="141" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#93c5fd">Yes/No 문제</text>

  <line x1="140" y1="129" x2="205" y2="129" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="205" y="100" width="165" height="58" rx="5" fill="#1a2035" stroke="#a78bfa" stroke-width="2"/>
  <text x="287" y="123" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#a78bfa">검증자 V</text>
  <text x="287" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#c4b5fd">V ∈ P (다항식 시간)</text>

  <line x1="370" y1="129" x2="435" y2="129" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="435" y="100" width="160" height="58" rx="5" fill="#161d2e" stroke="#374151" stroke-width="1.5"/>
  <text x="515" y="121" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#4ade80">Yes  →  x ∈ L</text>
  <text x="515" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f87171">No   →  x ∉ L</text>

  <rect x="218" y="190" width="138" height="52" rx="5" fill="#1a2035" stroke="#4ade80" stroke-width="2"/>
  <text x="287" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ade80">증명서 h</text>
  <text x="287" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#86efac">|h| ≤ p(|x|)  (다항식 길이)</text>

  <line x1="287" y1="190" x2="287" y2="160" stroke="#4ade80" stroke-width="1.8" marker-end="url(#arr-g)"/>

  <text x="310" y="258" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">x ∈ L  ↔  ∃h : V(x, h) = Yes</text>
</svg>
