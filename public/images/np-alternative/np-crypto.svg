<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 275" width="930" height="413">
  <rect width="620" height="275" fill="#0f1117" rx="10"/>
  <text x="310" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">P ≠ NP 가정 하의 암호학적 함의</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#6b7280"/>
    </marker>
  </defs>

  <line x1="310" y1="32" x2="310" y2="248" stroke="#374151" stroke-width="1.2" stroke-dasharray="4,3"/>

  <text x="155" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#60a5fa">Bob (수신자)</text>
  <text x="465" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#f87171">Eve (도청자)</text>

  <rect x="30" y="60" width="255" height="55" rx="5" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="48" y="82" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#60a5fa">암호문 c + 증명서 h (key)</text>
  <text x="48" y="99" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#93c5fd">→  검증자 V 실행  →  P 문제</text>

  <rect x="335" y="60" width="255" height="55" rx="5" fill="rgba(248,113,113,0.1)" stroke="#f87171" stroke-width="1.5"/>
  <text x="353" y="82" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#f87171">암호문 c만 보유 (h 없음)</text>
  <text x="353" y="99" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#fca5a5">→  NP 문제 직접 풀어야 함</text>

  <rect x="30" y="135" width="255" height="45" rx="5" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="157" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#4ade80">다항식 시간에 복호화</text>
  <text x="157" y="173" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#86efac">(현실적)</text>

  <rect x="335" y="135" width="255" height="45" rx="5" fill="rgba(248,113,113,0.08)" stroke="#f87171" stroke-width="1.5"/>
  <text x="462" y="158" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#f87171">지수 시간 이상 필요</text>
  <text x="462" y="173" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#fca5a5">(비현실적)</text>

  <rect x="110" y="205" width="400" height="42" rx="5" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="310" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#a78bfa">힌트(key)의 유무가 P 문제와 NP 문제의 차이를 만든다</text>
  <text x="310" y="238" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#c4b5fd">P = NP라면 이 차이가 사라져 암호화가 무의미해질 수 있다</text>
</svg>
