<svg viewBox="0 0 720 360" width="1080" height="540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="720" height="360" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Shortest Path — 그리디 선택이 최적이 아닌 경우</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">S에서 D로 가는 최단 경로 비교</text>

  <!--
    Nodes (center coordinates):
      S : (140, 200)
      C : (360, 110)
      D : (580, 200)
    Edges:
      S — C : 5
      S — D : 6
      C — D : 2
  -->

  <!-- ===== EDGES (drawn first so nodes overlap them) ===== -->

  <!-- S — C : greedy first pick (highlighted orange) -->
  <line x1="140" y1="200" x2="360" y2="110" stroke="#f97316" stroke-width="3"/>
  <!-- S — D : actual shortest (highlighted green dashed) -->
  <line x1="140" y1="200" x2="580" y2="200" stroke="#22c55e" stroke-width="3"/>
  <!-- C — D : completes greedy path -->
  <line x1="360" y1="110" x2="580" y2="200" stroke="#f97316" stroke-width="3"/>

  <!-- ===== EDGE LABELS ===== -->

  <!-- S — C label : midpoint ≈ (250, 155), offset above-left -->
  <rect x="222" y="138" width="32" height="22" rx="4" fill="#0f1117" stroke="#334155" stroke-width="1"/>
  <text x="238" y="154" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700">5</text>

  <!-- S — D label : midpoint (360, 200), put above the line -->
  <rect x="344" y="208" width="32" height="22" rx="4" fill="#0f1117" stroke="#334155" stroke-width="1"/>
  <text x="360" y="224" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">6</text>

  <!-- C — D label : midpoint ≈ (470, 155), offset right-above -->
  <rect x="482" y="138" width="32" height="22" rx="4" fill="#0f1117" stroke="#334155" stroke-width="1"/>
  <text x="498" y="154" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="700">2</text>

  <!-- ===== NODES ===== -->

  <!-- S node -->
  <circle cx="140" cy="200" r="26" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="206" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="700">S</text>

  <!-- C node -->
  <circle cx="360" cy="110" r="26" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="116" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="700">C</text>

  <!-- D node -->
  <circle cx="580" cy="200" r="26" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="580" y="206" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="700">D</text>

  <!-- ===== LEGEND ===== -->
  <!-- Greedy path -->
  <line x1="80" y1="290" x2="120" y2="290" stroke="#f97316" stroke-width="3"/>
  <text x="130" y="295" fill="#fb923c" font-size="12" font-weight="600">그리디 선택</text>
  <text x="130" y="312" fill="#94a3b8" font-size="11">S → C → D : 5 + 2 = 7</text>

  <!-- Direct path -->
  <line x1="380" y1="290" x2="420" y2="290" stroke="#22c55e" stroke-width="3"/>
  <text x="430" y="295" fill="#4ade80" font-size="12" font-weight="600">실제 최단 경로</text>
  <text x="430" y="312" fill="#94a3b8" font-size="11">S → D : 6</text>

  <!-- Footnote -->
  <text x="360" y="342" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">눈앞에 보이는 가장 짧은 간선만 고르면 전체 최단 경로를 놓칠 수 있다</text>
</svg>
