  <text x="178" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#2d3748">8</text>
  <text x="228" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#2d3748">11</text>
  <text x="278" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#e2e8f0">14</text>
  <text x="328" y="128" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f97316">17</text>
