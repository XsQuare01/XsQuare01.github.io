  <line x1="14" y1="230" x2="586" y2="230" stroke="#1e293b" stroke-width="1"/>
  <rect x="20"  y="240" width="18" height="12" rx="2" fill="rgba(96,165,250,0.12)"  stroke="#60a5fa" stroke-width="1.5"/>
  <text x="44"  y="251" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#94a3b8">탐색 범위</text>
  <rect x="130" y="240" width="18" height="12" rx="2" fill="rgba(249,115,22,0.22)"  stroke="#f97316" stroke-width="1.5"/>
