  <text x="428" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#60a5fa">R</text>
  <text x="487" y="127" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#9ca3af">arr[5]=17</text>
  <text x="487" y="141" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#9ca3af">17 &gt; 14</text>
  <text x="487" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#60a5fa">← R = 4</text>

  <!-- ── STEP 3 ── -->
  <line x1="14" y1="165" x2="586" y2="165" stroke="#1e293b" stroke-width="1"/>
  <text x="14" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#9ca3af">Step 3</text>
