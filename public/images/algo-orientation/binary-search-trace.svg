<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 295" width="900" height="443">
  <rect width="600" height="295" fill="#0f1117" rx="10"/>
  <text x="300" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">이진 탐색 — arr = [2, 5, 8, 11, 14, 17, 20, 23],  target = 14</text>

