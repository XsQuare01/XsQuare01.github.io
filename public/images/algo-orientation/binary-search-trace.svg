  <rect x="403" y="172" width="48" height="32" rx="3" fill="#0d1424" stroke="#1e293b" stroke-width="1"/>
  <text x="78"  y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#2d3748">2</text>
  <text x="128" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#2d3748">5</text>
  <text x="178" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#2d3748">8</text>
  <text x="228" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" fill="#2d3748">11</text>
  <text x="278" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">14</text>
