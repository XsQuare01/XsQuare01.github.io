<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 248" width="810" height="372">
  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
  </defs>

  <rect width="540" height="248" fill="#0f1117" rx="10"/>

  <text x="270" y="17" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">Witness 밀도 — f(b) = ab 는 B → A 단사함수</text>

  <!-- ℤₙ* outer frame -->
  <rect x="18" y="24" width="504" height="186" rx="8" fill="none" stroke="#2d3748" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="29" y="40" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#475569">ℤₙ*</text>

  <!-- B ellipse: center (135, 118), rx=105, ry=73 -->
  <ellipse cx="135" cy="118" rx="105" ry="73" fill="rgba(99,102,241,0.08)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="135" y="55" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#818cf8">B</text>
  <text x="135" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">non-Witness</text>

  <!-- A ellipse: center (390, 118), rx=120, ry=73 -->
  <ellipse cx="390" cy="118" rx="120" ry="73" fill="rgba(249,115,22,0.08)" stroke="#f97316" stroke-width="1.5"/>
  <text x="390" y="55" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fb923c">A</text>
  <text x="390" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7a99">Witness</text>

  <!-- B elements -->
  <circle cx="90"  cy="92"  r="3.5" fill="#818cf8"/>
  <text x="77"  y="96"  text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#818cf8">b₁</text>

  <circle cx="142" cy="122" r="3.5" fill="#818cf8"/>
  <text x="129" y="126" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#818cf8">b₂</text>

  <circle cx="96"  cy="152" r="3.5" fill="#818cf8"/>
  <text x="83"  y="156" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#818cf8">b₃</text>

  <!-- A elements (mapped) -->
  <circle cx="348" cy="92"  r="3.5" fill="#fb923c"/>
  <text x="355" y="96"  text-anchor="start" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#fb923c">ab₁</text>

  <circle cx="397" cy="122" r="3.5" fill="#fb923c"/>
  <text x="404" y="126" text-anchor="start" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#fb923c">ab₂</text>

  <circle cx="352" cy="152" r="3.5" fill="#fb923c"/>
  <text x="359" y="156" text-anchor="start" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#fb923c">ab₃</text>

  <!-- Arrows b → ab (dashed green) -->
  <line x1="93.5"  y1="92"  x2="344.5" y2="92"  stroke="#4ade80" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ag)"/>
  <line x1="145.5" y1="122" x2="393.5" y2="122" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ag)"/>
  <line x1="99.5"  y1="152" x2="348.5" y2="152" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ag)"/>

  <!-- ×a labels (above each arrow, in the gap between ellipses) -->
  <text x="256" y="85"  text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4ade80">×a</text>
  <text x="256" y="115" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4ade80">×a</text>
  <text x="256" y="145" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#4ade80">×a</text>

  <!-- Conclusion -->
  <text x="270" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#94a3b8">f : B → A,  f(b) = ab 는 단사(injective)  →  |B| ≤ |A|</text>
  <text x="270" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="600" fill="#e2e8f0">∴  |Witness| ≥ |ℤₙ*| / 2</text>
</svg>
