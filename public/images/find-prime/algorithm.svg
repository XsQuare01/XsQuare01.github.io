<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 492" width="780" height="738">
  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="av" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="an" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="520" height="492" fill="#0f1117" rx="10"/>
  <text x="260" y="17" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">Find Prime — 알고리즘 흐름도</text>

  <!-- ── Node 1: 임의의 n 선택 ── -->
  <rect x="175" y="27" width="170" height="36" rx="18" fill="rgba(249,115,22,0.12)" stroke="#f97316" stroke-width="1.5"/>
  <text x="260" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="600" fill="#fb923c">임의의 n 선택</text>

  <!-- Arrow 1 → 2 -->
  <line x1="260" y1="63" x2="260" y2="97" stroke="#64748b" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- ── Node 2: Carmichael? (center 260,125, hw=93, hh=28) ── -->
  <polygon points="260,97 353,125 260,153 167,125" fill="#1a1f2e" stroke="#475569" stroke-width="1.5"/>
  <text x="260" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">Carmichael 수?</text>

  <!-- Arrow 2 → 3 (Yes) -->
  <line x1="260" y1="153" x2="260" y2="190" stroke="#4ade80" stroke-width="1.5" marker-end="url(#av)"/>
  <rect x="224" y="163" width="30" height="16" fill="#0f1117"/>
  <text x="248" y="176" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#4ade80">Yes</text>

  <!-- ── Node 3: gcd? (center 260,218, hw=97, hh=28) ── -->
  <polygon points="260,190 357,218 260,246 163,218" fill="#1a1f2e" stroke="#475569" stroke-width="1.5"/>
  <text x="260" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">gcd(a, n) = 1 ?</text>
  <text x="260" y="229" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">1 &lt; a &lt; n 인 임의의 a 선택</text>

  <!-- Arrow 3 → 4 (Yes) -->
  <line x1="260" y1="246" x2="260" y2="283" stroke="#4ade80" stroke-width="1.5" marker-end="url(#av)"/>
  <rect x="224" y="256" width="30" height="16" fill="#0f1117"/>
  <text x="248" y="269" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#4ade80">Yes</text>

  <!-- ── Node 4: Fermat test (center 260,311, hw=100, hh=28) ── -->
  <polygon points="260,283 360,311 260,339 160,311" fill="#1a1f2e" stroke="#475569" stroke-width="1.5"/>
  <text x="260" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">a<tspan baseline-shift="super" font-size="70%">n−1</tspan> ≡ 1 (mod n) ?</text>
  <text x="260" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">Fermat 테스트</text>

  <!-- Arrow 4 → 5 (Yes) -->
  <line x1="260" y1="339" x2="260" y2="373" stroke="#4ade80" stroke-width="1.5" marker-end="url(#av)"/>
  <rect x="224" y="348" width="30" height="16" fill="#0f1117"/>
  <text x="248" y="361" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#4ade80">Yes</text>

  <!-- ── Node 5: k회 완료? (center 260,400, hw=93, hh=28) ── -->
  <polygon points="260,372 353,400 260,428 167,400" fill="#1a1f2e" stroke="#475569" stroke-width="1.5"/>
  <text x="260" y="405" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">k회 반복 완료?</text>

  <!-- Arrow 5 → 6 (Yes) -->
  <line x1="260" y1="428" x2="260" y2="451" stroke="#4ade80" stroke-width="1.5" marker-end="url(#av)"/>
  <rect x="224" y="431" width="30" height="16" fill="#0f1117"/>
  <text x="248" y="444" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#4ade80">Yes</text>

  <!-- ── Node 6: 소수 (end) ── -->
  <rect x="175" y="451" width="170" height="34" rx="17" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="260" y="473" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="600" fill="#4ade80">n은 소수 ✓</text>

  <!-- ══ Right rejection rail (No → n 재선택) ══ -->

  <!-- Node 2 No: horizontal (353,125) → (455,125) -->
  <line x1="353" y1="125" x2="455" y2="125" stroke="#f87171" stroke-width="1.2"/>
  <rect x="384" y="113" width="26" height="16" fill="#0f1117"/>
  <text x="397" y="125" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#f87171">No</text>

  <!-- Node 3 No: horizontal (357,218) → (455,218) -->
  <line x1="357" y1="218" x2="455" y2="218" stroke="#f87171" stroke-width="1.2"/>
  <rect x="388" y="206" width="26" height="16" fill="#0f1117"/>
  <text x="401" y="218" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#f87171">No</text>

  <!-- Node 4 No: horizontal (360,311) → (455,311) -->
  <line x1="360" y1="311" x2="455" y2="311" stroke="#f87171" stroke-width="1.2"/>
  <rect x="388" y="299" width="26" height="16" fill="#0f1117"/>
  <text x="401" y="311" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#f87171">No</text>
  <rect x="374" y="315" width="56" height="14" fill="#0f1117"/>
  <text x="402" y="326" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">(Witness 발견)</text>

  <!-- Vertical rail x=455, y=45 → y=311 -->
  <line x1="455" y1="45" x2="455" y2="311" stroke="#f87171" stroke-width="1.2"/>

  <!-- Arrow rail → Node 1 -->
  <line x1="455" y1="45" x2="346" y2="45" stroke="#f87171" stroke-width="1.5" marker-end="url(#an)"/>
  <rect x="459" y="34" width="54" height="16" fill="#0f1117"/>
  <text x="461" y="46" text-anchor="start" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#f87171">n 재선택</text>

  <!-- ══ Left loop: Node 5 No → Node 3 (repeat) ══ -->
  <line x1="167" y1="400" x2="62"  y2="400" stroke="#60a5fa" stroke-width="1.2"/>
  <line x1="62"  y1="400" x2="62"  y2="218" stroke="#60a5fa" stroke-width="1.2"/>
  <line x1="62"  y1="218" x2="163" y2="218" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="100" y="388" width="26" height="16" fill="#0f1117"/>
  <text x="113" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#60a5fa">No</text>
  <rect x="90" y="404" width="46" height="14" fill="#0f1117"/>
  <text x="113" y="415" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">(반복)</text>
</svg>
