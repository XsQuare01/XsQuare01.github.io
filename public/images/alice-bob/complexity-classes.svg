<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 315" width="580" height="315">
  <rect width="580" height="315" fill="#0f1117" rx="10"/>
  <text x="290" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">복잡도 클래스 계층</text>

  <rect x="18" y="28" width="544" height="272" rx="8" fill="rgba(248,113,113,0.07)" stroke="#f87171" stroke-width="1.8"/>
  <text x="28" y="48" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#f87171">EXP</text>
  <text x="28" y="63" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#fca5a5">지수 시간, DTM</text>

  <rect x="55" y="72" width="470" height="205" rx="7" fill="rgba(251,191,36,0.07)" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="65" y="91" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#fbbf24">PSPACE</text>
  <text x="65" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#fcd34d">다항식 공간, DTM</text>
  <text x="65" y="119" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#fbbf24">= NPSPACE  (Savitch 정리)</text>

  <rect x="92" y="128" width="396" height="130" rx="7" fill="rgba(167,139,250,0.07)" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="102" y="147" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#a78bfa">NP</text>
  <text x="102" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#c4b5fd">다항식 시간, NTM</text>

  <rect x="129" y="175" width="155" height="70" rx="6" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1.8"/>
  <text x="206" y="206" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#4ade80">P</text>
  <text x="206" y="224" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#86efac">다항식 시간, DTM</text>

  <text x="360" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99" font-style="italic">P = NP ?</text>
  <text x="360" y="221" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4b5563">미해결 문제</text>

  <text x="400" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4b5563">P ≠ EXP 는 증명됨</text>
</svg>
