<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 390" width="780" height="390">
  <rect width="780" height="390" fill="#0f1117" rx="10"/>
  <text x="390" y="20" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6b7a99">프로토콜 흐름 — Alice &amp; Bob</text>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <rect x="20" y="28" width="280" height="36" rx="20" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="1.5"/>
  <text x="160" y="51" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#f97316">A  Alice</text>

  <rect x="480" y="28" width="280" height="36" rx="20" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="620" y="51" text-anchor="middle" font-size="15" font-weight="700" fill="#38bdf8">B  Bob</text>

  <!-- Vertical guide lines -->
  <line x1="160" y1="64" x2="160" y2="378" stroke="#f97316" stroke-width="1" opacity="0.18" stroke-dasharray="4,4"/>
  <line x1="620" y1="64" x2="620" y2="378" stroke="#38bdf8" stroke-width="1" opacity="0.18" stroke-dasharray="4,4"/>

  <!-- Step 1: Alice generates p, q, n -->
  <rect x="20" y="76" width="280" height="70" rx="6" fill="#1a2035" stroke="#f97316" stroke-width="1"/>
  <text x="160" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#f97316" letter-spacing="0.5">① 소수 p, q 생성</text>
  <text x="160" y="127" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8899aa">p ≡ q ≡ 3 (mod 4),  n = pq</text>

  <!-- Arrow 1: n → Bob -->
  <line x1="302" y1="112" x2="476" y2="112" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="330" y="98" width="122" height="24" rx="3" fill="#0f1117"/>
  <text x="391" y="115" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" font-weight="700" fill="#e2e8f0">n = pq  →</text>

  <!-- Step 2: Bob picks x, computes y -->
  <rect x="480" y="162" width="280" height="70" rx="6" fill="#1a2035" stroke="#38bdf8" stroke-width="1"/>
  <text x="620" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#38bdf8" letter-spacing="0.5">② x 선택, y 계산</text>
  <text x="620" y="213" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8899aa">y ≡ x²  (mod n)</text>

  <!-- Arrow 2: y → Alice -->
  <line x1="478" y1="198" x2="304" y2="198" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="330" y="184" width="122" height="24" rx="3" fill="#0f1117"/>
  <text x="391" y="201" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" font-weight="700" fill="#e2e8f0">←  y</text>

  <!-- Step 3: Alice computes 4 roots, sends one -->
  <rect x="20" y="248" width="280" height="70" rx="6" fill="#1a2035" stroke="#f97316" stroke-width="1"/>
  <text x="160" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#f97316" letter-spacing="0.5">③ CRT로 4개 근 계산</text>
  <text x="160" y="299" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8899aa">±x₁, ±x₂ 중 1개 선택 · 전달</text>

  <!-- Arrow 3: root → Bob -->
  <line x1="302" y1="284" x2="476" y2="284" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="322" y="270" width="138" height="24" rx="3" fill="#0f1117"/>
  <text x="391" y="287" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" font-weight="700" fill="#e2e8f0">근 하나  →</text>

  <!-- Step 4: Bob determines result -->
  <rect x="480" y="334" width="280" height="46" rx="6" fill="#1a2035" stroke="#38bdf8" stroke-width="1"/>
  <text x="620" y="355" text-anchor="middle" font-size="13" font-weight="700" fill="#38bdf8">④ 소인수분해 가능 여부로</text>
  <text x="620" y="372" text-anchor="middle" font-size="12" fill="#6b7a99">gcd(x − 근, n) = p or q?  →  승패 결정</text>
</svg>
