<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 310" width="780" height="310">
  <rect width="780" height="310" fill="#0f1117" rx="10"/>
  <text x="390" y="20" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6b7a99">프로토콜 흐름 — Alice &amp; Bob</text>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <rect x="20" y="28" width="280" height="30" rx="20" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="1.5"/>
  <text x="160" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#f97316">A  Alice</text>

  <rect x="480" y="28" width="280" height="30" rx="20" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="620" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#38bdf8">B  Bob</text>

  <!-- Vertical guide lines -->
  <line x1="160" y1="58" x2="160" y2="298" stroke="#f97316" stroke-width="1" opacity="0.18" stroke-dasharray="4,4"/>
  <line x1="620" y1="58" x2="620" y2="298" stroke="#38bdf8" stroke-width="1" opacity="0.18" stroke-dasharray="4,4"/>

  <!-- Step 1: Alice generates p, q, n -->
  <rect x="20" y="70" width="280" height="54" rx="6" fill="#1a2035" stroke="#f97316" stroke-width="1"/>
  <text x="160" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#f97316" letter-spacing="0.5">① 소수 p, q 생성</text>
  <text x="160" y="111" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#8899aa">p ≡ q ≡ 3 (mod 4),  n = pq</text>

  <!-- Arrow 1: n → Bob -->
  <line x1="302" y1="97" x2="476" y2="97" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="336" y="82" width="108" height="20" rx="3" fill="#0f1117"/>
  <text x="390" y="96" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="700" fill="#e2e8f0">n = pq  →</text>

  <!-- Step 2: Bob picks x, computes y -->
  <rect x="480" y="136" width="280" height="54" rx="6" fill="#1a2035" stroke="#38bdf8" stroke-width="1"/>
  <text x="620" y="158" text-anchor="middle" font-size="10" font-weight="700" fill="#38bdf8" letter-spacing="0.5">② x 선택, y 계산</text>
  <text x="620" y="177" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#8899aa">y ≡ x²  (mod n)</text>

  <!-- Arrow 2: y → Alice -->
  <line x1="478" y1="163" x2="304" y2="163" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="336" y="148" width="108" height="20" rx="3" fill="#0f1117"/>
  <text x="390" y="162" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="700" fill="#e2e8f0">←  y</text>

  <!-- Step 3: Alice computes 4 roots, sends one -->
  <rect x="20" y="202" width="280" height="54" rx="6" fill="#1a2035" stroke="#f97316" stroke-width="1"/>
  <text x="160" y="224" text-anchor="middle" font-size="10" font-weight="700" fill="#f97316" letter-spacing="0.5">③ CRT로 4개 근 계산</text>
  <text x="160" y="243" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#8899aa">±x₁, ±x₂ 중 1개 선택 · 전달</text>

  <!-- Arrow 3: root → Bob -->
  <line x1="302" y1="229" x2="476" y2="229" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="328" y="214" width="124" height="20" rx="3" fill="#0f1117"/>
  <text x="390" y="228" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="700" fill="#e2e8f0">근 하나  →</text>

  <!-- Step 4: Bob determines result -->
  <rect x="480" y="268" width="280" height="36" rx="6" fill="#1a2035" stroke="#38bdf8" stroke-width="1"/>
  <text x="620" y="284" text-anchor="middle" font-size="10" font-weight="700" fill="#38bdf8">④ 소인수분해 가능 여부로 승패 결정</text>
  <text x="620" y="298" text-anchor="middle" font-size="9" fill="#6b7a99">gcd(x − 근, n) = p or q?</text>
</svg>
