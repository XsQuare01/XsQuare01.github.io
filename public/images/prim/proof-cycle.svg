<svg viewBox="0 0 720 500" width="1080" height="750" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="500" rx="10" fill="#0f1117"/>
  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Prim 정확성 증명 — cycle과 대체 간선 e'</text>
  <text x="360" y="50" text-anchor="middle" fill="#64748b" font-size="11">T_mst에 e를 추가하면 cycle이 생기고, cycle 위에 boundary를 가로지르는 e'가 반드시 존재</text>

  <!-- ===== Region: T_p (left blob) ===== -->
  <ellipse cx="220" cy="240" rx="170" ry="130" fill="#0c1426" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="220" y="115" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">T_p (Prim이 선택한 트리)</text>

  <!-- ===== Region: V \ T_p (right blob) ===== -->
  <ellipse cx="540" cy="240" rx="150" ry="130" fill="#0c1426" stroke="#64748b" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="540" y="115" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">V \ T_p (남은 정점)</text>

  <!-- ===== T_p internal edges (blue solid) ===== -->
  <line x1="150" y1="200" x2="220" y2="220" stroke="#3b82f6" stroke-width="2"/>
  <line x1="220" y1="220" x2="280" y2="200" stroke="#3b82f6" stroke-width="2"/>
  <line x1="220" y1="220" x2="180" y2="290" stroke="#3b82f6" stroke-width="2"/>
  <line x1="180" y1="290" x2="280" y2="300" stroke="#3b82f6" stroke-width="2"/>

  <!-- T_p nodes -->
  <circle cx="150" cy="200" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="220" cy="220" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="280" cy="200" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="205" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">a</text>
  <circle cx="180" cy="290" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="295" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">x</text>
  <circle cx="280" cy="300" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>

  <!-- ===== V\T_p internal edges (T_mst, gray dashed) ===== -->
  <line x1="450" y1="220" x2="510" y2="270" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="510" y1="270" x2="600" y2="220" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="600" y1="220" x2="620" y2="300" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- V\T_p nodes -->
  <circle cx="450" cy="220" r="14" fill="#1e3a5f" stroke="#64748b" stroke-width="2"/>
  <text x="450" y="225" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="700">b</text>
  <circle cx="510" cy="270" r="14" fill="#1e3a5f" stroke="#64748b" stroke-width="2"/>
  <circle cx="600" cy="220" r="14" fill="#1e3a5f" stroke="#64748b" stroke-width="2"/>
  <text x="600" y="225" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="700">z</text>
  <circle cx="620" cy="300" r="14" fill="#1e3a5f" stroke="#64748b" stroke-width="2"/>

  <!-- ===== Cross edges ===== -->

  <!-- e: Prim picks (red solid bold) — from a (280, 200) to b (450, 220) -->
  <line x1="280" y1="200" x2="450" y2="220" stroke="#ef4444" stroke-width="3"/>
  <rect x="346" y="194" width="36" height="22" rx="4" fill="#0f1117" stroke="#ef4444"/>
  <text x="364" y="210" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">e</text>

  <!-- e': alternative in T_mst (green dashed bold) — from x (180, 290) to z (600, 220) -->
  <path d="M 180 290 Q 380 360 600 220" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="6 4"/>
  <rect x="372" y="332" width="44" height="22" rx="4" fill="#0f1117" stroke="#22c55e"/>
  <text x="394" y="348" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">e'</text>

  <!-- ===== Legend (two rows, separated from main diagram) ===== -->
  <!-- Row 1: cross edges e and e' -->
  <line x1="60" y1="408" x2="100" y2="408" stroke="#ef4444" stroke-width="3"/>
  <text x="108" y="412" fill="#fca5a5" font-size="11" font-weight="600">e — Prim의 다음 선택</text>

  <line x1="330" y1="408" x2="370" y2="408" stroke="#22c55e" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="378" y="412" fill="#4ade80" font-size="11" font-weight="600">e' — T_mst의 다른 경계 간선</text>

  <!-- Row 2: internal edges -->
  <line x1="60" y1="438" x2="100" y2="438" stroke="#3b82f6" stroke-width="2"/>
  <text x="108" y="442" fill="#93c5fd" font-size="11" font-weight="600">T_p 내부 간선</text>

  <line x1="280" y1="438" x2="320" y2="438" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="328" y="442" fill="#cbd5e1" font-size="11" font-weight="600">T_mst의 나머지 간선</text>

  <!-- Cycle annotation on its own line -->
  <text x="360" y="478" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">cycle: a → e → b → ... → z → e' → x → ... → a</text>
</svg>
