<svg viewBox="0 0 720 380" width="1080" height="570" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="380" rx="10" fill="#0f1117"/>
  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Prim은 여러 MST 중 하나를 찾는다</text>
  <text x="360" y="50" text-anchor="middle" fill="#64748b" font-size="11">동률(tie)을 깨는 방식에 따라 다른 MST를 출력 — 모두 똑같이 정답</text>

  <line x1="360" y1="80" x2="360" y2="350" stroke="#1e293b" stroke-width="1"/>

  <!-- ============ PANEL 1: Prim picks B-C first ============ -->
  <text x="180" y="100" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">A → B 후, B에서 B-C(1) 선택</text>

  <line x1="90" y1="160" x2="270" y2="160" stroke="#ef4444" stroke-width="3"/>
  <line x1="90" y1="160" x2="180" y2="280" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="270" y1="160" x2="180" y2="280" stroke="#ef4444" stroke-width="3"/>
  <line x1="180" y1="280" x2="320" y2="280" stroke="#ef4444" stroke-width="3"/>

  <rect x="166" y="150" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444"/>
  <text x="180" y="165" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">1</text>
  <rect x="121" y="210" width="28" height="20" rx="4" fill="#0f1117" stroke="#475569"/>
  <text x="135" y="225" text-anchor="middle" fill="#64748b" font-size="12" font-weight="700">1</text>
  <rect x="211" y="210" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444"/>
  <text x="225" y="225" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">1</text>
  <rect x="236" y="270" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444"/>
  <text x="250" y="285" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">2</text>

  <circle cx="90" cy="160" r="20" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="90" y="165" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">A</text>
  <circle cx="270" cy="160" r="20" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="270" y="165" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">B</text>
  <circle cx="180" cy="280" r="20" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="180" y="285" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">C</text>
  <circle cx="320" cy="280" r="20" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="320" y="285" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">D</text>

  <text x="180" y="325" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">결과: {A-B, B-C, C-D}, 합 = 4</text>

  <!-- ============ PANEL 2: Prim picks A-C first ============ -->
  <text x="540" y="100" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">A에서 A-C(1) 우선 선택했다면</text>

  <line x1="450" y1="160" x2="630" y2="160" stroke="#ef4444" stroke-width="3"/>
  <line x1="450" y1="160" x2="540" y2="280" stroke="#ef4444" stroke-width="3"/>
  <line x1="630" y1="160" x2="540" y2="280" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="540" y1="280" x2="680" y2="280" stroke="#ef4444" stroke-width="3"/>

  <rect x="526" y="150" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444"/>
  <text x="540" y="165" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">1</text>
  <rect x="481" y="210" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444"/>
  <text x="495" y="225" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">1</text>
  <rect x="571" y="210" width="28" height="20" rx="4" fill="#0f1117" stroke="#475569"/>
  <text x="585" y="225" text-anchor="middle" fill="#64748b" font-size="12" font-weight="700">1</text>
  <rect x="596" y="270" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444"/>
  <text x="610" y="285" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">2</text>

  <circle cx="450" cy="160" r="20" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="165" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">A</text>
  <circle cx="630" cy="160" r="20" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="630" y="165" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">B</text>
  <circle cx="540" cy="280" r="20" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="540" y="285" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">C</text>
  <circle cx="680" cy="280" r="20" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="680" y="285" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">D</text>

  <text x="540" y="325" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">결과: {A-B, A-C, C-D}, 합 = 4 (동일)</text>

  <text x="360" y="365" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">같은 합 = 4이지만 간선 조합은 다르다. 둘 다 정답.</text>
</svg>
