<svg viewBox="0 0 720 360" width="1080" height="540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="720" height="360" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Deadline Scheduling — greedy 배치</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">할 일 {(2, 2), (1, 3), (1, 1)} — (이익 큰 순서로 배치)</text>

  <!-- ===== TIME SLOTS ===== -->
  <!-- 두 개의 1시간 슬롯: 시간 1, 시간 2 -->

  <!-- Slot 1 (시간 0~1) -->
  <rect x="180" y="120" width="160" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="260" y="158" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="700">J = (1, 3)</text>
  <text x="260" y="180" text-anchor="middle" fill="#94a3b8" font-size="12">마감 1 · 이익 3</text>

  <!-- Slot 2 (시간 1~2) -->
  <rect x="380" y="120" width="160" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="460" y="158" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="700">J = (2, 2)</text>
  <text x="460" y="180" text-anchor="middle" fill="#94a3b8" font-size="12">마감 2 · 이익 2</text>

  <!-- Time axis labels -->
  <text x="180" y="222" text-anchor="middle" fill="#64748b" font-size="11">0</text>
  <text x="360" y="222" text-anchor="middle" fill="#64748b" font-size="11">1</text>
  <text x="540" y="222" text-anchor="middle" fill="#64748b" font-size="11">2 (= 최대 마감)</text>
  <line x1="180" y1="210" x2="540" y2="210" stroke="#334155" stroke-width="1.5"/>

  <!-- ===== DROPPED JOB ===== -->
  <rect x="180" y="262" width="160" height="58" rx="8" fill="#1f2937" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="260" y="288" text-anchor="middle" fill="#f87171" font-size="16" font-weight="700">J = (1, 1)</text>
  <text x="260" y="308" text-anchor="middle" fill="#94a3b8" font-size="11">마감 1 — 슬롯 1 이미 참 → 버림</text>

  <!-- ===== LEGEND ===== -->
  <rect x="400" y="268" width="22" height="16" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="432" y="281" fill="#93c5fd" font-size="12" font-weight="600">선택된 일 (총 이익 5)</text>

  <rect x="400" y="294" width="22" height="16" rx="3" fill="#1f2937" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="432" y="307" fill="#f87171" font-size="12" font-weight="600">버려진 일</text>

  <!-- Footnote -->
  <text x="360" y="345" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">이익 큰 일부터, 가능한 한 마감 기한에 가까운 슬롯에 배치한다</text>
</svg>
