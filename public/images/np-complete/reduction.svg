<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 285" width="960" height="428">
  <rect width="640" height="285" fill="#0f1117" rx="10"/>
  <text x="320" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">다항식 시간 귀착 (A ≤ₚ B)</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Problem A box -->
  <rect x="30" y="80" width="140" height="70" rx="8" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="100" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.8" font-weight="700" fill="#60a5fa">문제 A</text>
  <text x="100" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#93c5fd">입력 x</text>

  <!-- Transform box -->
  <rect x="240" y="80" width="140" height="70" rx="8" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="310" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#fbbf24">변환 f</text>
  <text x="310" y="126" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#fcd34d">x → f(x)</text>
  <text x="310" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#fbbf24">다항식 시간</text>

  <!-- Problem B box -->
  <rect x="450" y="80" width="140" height="70" rx="8" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="520" y="110" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.8" font-weight="700" fill="#a78bfa">문제 B</text>
  <text x="520" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#c4b5fd">입력 f(x)</text>

  <!-- Arrows -->
  <line x1="170" y1="115" x2="238" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="380" y1="115" x2="448" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Equivalence -->
  <text x="320" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#e2e8f0">x ∈ A  ⟺  f(x) ∈ B</text>

  <!-- Meaning -->
  <text x="320" y="252" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="600" fill="#94a3b8">B를 풀 수 있으면 A도 풀 수 있다</text>
  <text x="320" y="272" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">B의 난이도 ≥ A의 난이도</text>
</svg>
