<svg viewBox="0 0 640 310" width="960" height="465" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="640" height="310" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="320" y="26" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">병합 정렬 재귀 트리 — T(n) = 2T(n/2) + O(n)</text>

  <!-- ==================== Level labels (left) ==================== -->
  <text x="18" y="78" fill="#64748b" font-size="11" font-style="italic">Lv 0</text>
  <text x="18" y="138" fill="#64748b" font-size="11" font-style="italic">Lv 1</text>
  <text x="18" y="198" fill="#64748b" font-size="11" font-style="italic">Lv 2</text>
  <text x="18" y="258" fill="#64748b" font-size="11" font-style="italic">Lv 3</text>

  <!-- ==================== Cost labels (right) ==================== -->
  <!-- cost column header -->
  <text x="600" y="50" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">비용</text>
  <line x1="560" y1="55" x2="640" y2="55" stroke="#334155" stroke-width="1"/>

  <text x="600" y="78" text-anchor="middle" fill="#f97316" font-size="12" font-weight="600">cn</text>
  <text x="600" y="138" text-anchor="middle" fill="#f97316" font-size="12" font-weight="600">cn/2+cn/2 = cn</text>
  <text x="600" y="198" text-anchor="middle" fill="#f97316" font-size="12" font-weight="600">4×cn/4 = cn</text>
  <text x="600" y="258" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">n×c = cn</text>

  <!-- Vertical separator -->
  <line x1="555" y1="56" x2="555" y2="285" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ==================== EDGES ==================== -->
  <!-- Level 0 -> Level 1 -->
  <line x1="270" y1="86" x2="175" y2="126" stroke="#334155" stroke-width="1.5"/>
  <line x1="270" y1="86" x2="365" y2="126" stroke="#334155" stroke-width="1.5"/>

  <!-- Level 1 left -> Level 2 -->
  <line x1="175" y1="146" x2="115" y2="186" stroke="#334155" stroke-width="1.5"/>
  <line x1="175" y1="146" x2="235" y2="186" stroke="#334155" stroke-width="1.5"/>

  <!-- Level 1 right -> Level 2 -->
  <line x1="365" y1="146" x2="305" y2="186" stroke="#334155" stroke-width="1.5"/>
  <line x1="365" y1="146" x2="425" y2="186" stroke="#334155" stroke-width="1.5"/>

  <!-- Level 2 nodes -> Level 3 base cases -->
  <!-- 115 -> 80, 152 -->
  <line x1="115" y1="206" x2="80" y2="246" stroke="#334155" stroke-width="1.5"/>
  <line x1="115" y1="206" x2="152" y2="246" stroke="#334155" stroke-width="1.5"/>
  <!-- 235 -> 200, 272 -->
  <line x1="235" y1="206" x2="200" y2="246" stroke="#334155" stroke-width="1.5"/>
  <line x1="235" y1="206" x2="272" y2="246" stroke="#334155" stroke-width="1.5"/>
  <!-- 305 -> 338, 370 — wait let me recalculate -->
  <line x1="305" y1="206" x2="272" y2="246" stroke="#334155" stroke-width="1.5"/>
  <line x1="305" y1="206" x2="338" y2="246" stroke="#334155" stroke-width="1.5"/>
  <!-- 425 -> 392, 460 -->
  <line x1="425" y1="206" x2="392" y2="246" stroke="#334155" stroke-width="1.5"/>
  <line x1="425" y1="206" x2="460" y2="246" stroke="#334155" stroke-width="1.5"/>

  <!-- ==================== NODES ==================== -->

  <!-- Level 0: n -->
  <rect x="220" y="62" width="100" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="270" y="80" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">n</text>

  <!-- Level 1: n/2 × 2 -->
  <rect x="125" y="126" width="100" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="144" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">n/2</text>

  <rect x="315" y="126" width="100" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="365" y="144" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">n/2</text>

  <!-- Level 2: n/4 × 4 -->
  <rect x="70" y="186" width="90" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" opacity="0.85"/>
  <text x="115" y="204" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">n/4</text>

  <rect x="190" y="186" width="90" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" opacity="0.85"/>
  <text x="235" y="204" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">n/4</text>

  <rect x="260" y="186" width="90" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" opacity="0.85"/>
  <text x="305" y="204" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">n/4</text>

  <rect x="380" y="186" width="90" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" opacity="0.85"/>
  <text x="425" y="204" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">n/4</text>

  <!-- Level 3: base cases (1 × n) — show 4 explicitly then "..." -->
  <rect x="52" y="246" width="56" height="26" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="263" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <rect x="122" y="246" width="56" height="26" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="150" y="263" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <rect x="172" y="246" width="56" height="26" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="200" y="263" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <rect x="244" y="246" width="56" height="26" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="272" y="263" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <!-- dots -->
  <text x="320" y="263" text-anchor="middle" fill="#475569" font-size="18" font-weight="700">···</text>

  <rect x="364" y="246" width="56" height="26" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="392" y="263" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <rect x="432" y="246" width="56" height="26" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="460" y="263" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <!-- ==================== Bottom annotation ==================== -->
  <text x="270" y="293" text-anchor="middle" fill="#64748b" font-size="11">log₂n 레벨 × cn = <tspan fill="#f97316" font-weight="600">O(n log n)</tspan></text>

  <!-- Brace showing log n levels -->
  <line x1="50" y1="68" x2="50" y2="258" stroke="#334155" stroke-width="1.5"/>
  <line x1="46" y1="68" x2="54" y2="68" stroke="#334155" stroke-width="1.5"/>
  <line x1="46" y1="258" x2="54" y2="258" stroke="#334155" stroke-width="1.5"/>
  <text x="36" y="168" text-anchor="middle" fill="#64748b" font-size="11" transform="rotate(-90 36 168)">log₂n 레벨</text>
</svg>
