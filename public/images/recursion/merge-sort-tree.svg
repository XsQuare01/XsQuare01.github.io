<svg viewBox="0 0 860 320" width="1290" height="480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="860" height="320" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="357" y="18" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">병합 정렬 재귀 트리</text>
  <text x="357" y="33" text-anchor="middle" fill="#64748b" font-size="11">T(n) = 2T(n/2) + cn   (c : 병합 비용 상수)</text>

  <!--
    Layout (node center coordinates):
      Level 0  y=63 : n @ x=357
      Level 1  y=128 : n/2 @ x=210, 504
      Level 2  y=193 : n/4 @ x=120, 300, 414, 594
      ⋮ row    y=218
      Level k  y=258 : 1 (×n) — representative 3+3 with ···

    Node widths: L0=76, L1=72, L2=68, Leaf=44
    Level 2 gap check (half=34):
      120(86-154) ↔ 300(266-334): gap=112 ✓
      300(266-334) ↔ 414(380-448): gap=46 ✓
      414(380-448) ↔ 594(560-628): gap=112 ✓
    Level 1 gap (half=36):
      210(174-246) ↔ 504(468-540): gap=222 ✓
  -->

  <!-- ===== LEFT LEVEL LABELS ===== -->
  <text x="35" y="66"  text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">Lv 0</text>
  <text x="35" y="131" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">Lv 1</text>
  <text x="35" y="196" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">Lv 2</text>
  <text x="35" y="254" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">Lv</text>
  <text x="35" y="265" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">log₂n</text>

  <!-- ===== VERTICAL SEPARATOR (tree | cost) ===== -->
  <line x1="658" y1="42" x2="658" y2="288" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ===== RIGHT COST COLUMN ===== -->
  <text x="758" y="43" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">레벨별 비용</text>
  <line x1="666" y1="48" x2="853" y2="48" stroke="#334155" stroke-width="1"/>

  <!-- Cost per level -->
  <text x="758" y="66"  text-anchor="middle" fill="#f97316" font-size="13" font-weight="700">cn</text>

  <text x="758" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">cn/2 + cn/2</text>
  <text x="758" y="135" text-anchor="middle" fill="#f97316" font-size="13" font-weight="700">= cn</text>

  <text x="758" y="187" text-anchor="middle" fill="#94a3b8" font-size="10">4 × cn/4</text>
  <text x="758" y="200" text-anchor="middle" fill="#f97316" font-size="13" font-weight="700">= cn</text>

  <text x="758" y="251" text-anchor="middle" fill="#94a3b8" font-size="10">n × c</text>
  <text x="758" y="264" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">= cn</text>

  <!-- Brace + annotation (right side, inside cost column) -->
  <line x1="670" y1="55"  x2="670" y2="282" stroke="#475569" stroke-width="1.2"/>
  <line x1="666" y1="55"  x2="674" y2="55"  stroke="#475569" stroke-width="1.2"/>
  <line x1="666" y1="282" x2="674" y2="282" stroke="#475569" stroke-width="1.2"/>
  <text x="680" y="163" fill="#64748b" font-size="10">×</text>
  <text x="680" y="174" fill="#64748b" font-size="10">log₂n</text>
  <text x="680" y="185" fill="#64748b" font-size="10">레벨</text>

  <!-- Total -->
  <text x="758" y="300" text-anchor="middle" fill="#94a3b8" font-size="11">cn × log₂n  =  <tspan fill="#f97316" font-weight="700">O(n log n)</tspan></text>

  <!-- ===== EDGES (drawn before nodes) ===== -->
  <!-- Lv0 → Lv1 -->
  <line x1="357" y1="76" x2="210" y2="115" stroke="#334155" stroke-width="1.5"/>
  <line x1="357" y1="76" x2="504" y2="115" stroke="#334155" stroke-width="1.5"/>
  <!-- Lv1 L → Lv2 -->
  <line x1="210" y1="141" x2="120" y2="180" stroke="#334155" stroke-width="1.5"/>
  <line x1="210" y1="141" x2="300" y2="180" stroke="#334155" stroke-width="1.5"/>
  <!-- Lv1 R → Lv2 -->
  <line x1="504" y1="141" x2="414" y2="180" stroke="#334155" stroke-width="1.5"/>
  <line x1="504" y1="141" x2="594" y2="180" stroke="#334155" stroke-width="1.5"/>

  <!-- ===== NODES ===== -->

  <!-- Level 0: n -->
  <rect x="319" y="50" width="76" height="26" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="357" y="67" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">n</text>

  <!-- Level 1: n/2 × 2 -->
  <rect x="174" y="115" width="72" height="26" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="132" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">n/2</text>

  <rect x="468" y="115" width="72" height="26" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="504" y="132" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">n/2</text>

  <!-- Level 2: n/4 × 4 -->
  <rect x="86"  y="180" width="68" height="26" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" opacity="0.85"/>
  <text x="120" y="197" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">n/4</text>

  <rect x="266" y="180" width="68" height="26" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" opacity="0.85"/>
  <text x="300" y="197" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">n/4</text>

  <rect x="380" y="180" width="68" height="26" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" opacity="0.85"/>
  <text x="414" y="197" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">n/4</text>

  <rect x="560" y="180" width="68" height="26" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" opacity="0.85"/>
  <text x="594" y="197" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">n/4</text>

  <!-- Vertical dots (intermediate levels) -->
  <text x="120" y="220" text-anchor="middle" fill="#475569" font-size="13">⋮</text>
  <text x="300" y="220" text-anchor="middle" fill="#475569" font-size="13">⋮</text>
  <text x="414" y="220" text-anchor="middle" fill="#475569" font-size="13">⋮</text>
  <text x="594" y="220" text-anchor="middle" fill="#475569" font-size="13">⋮</text>

  <!-- Level log₂n: leaf nodes (representative: 3 on each side, ··· in middle) -->
  <!-- Left group: x=90, 144, 198  (width 44, gap 10) -->
  <rect x="68"  y="245" width="44" height="24" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="90"  y="261" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <rect x="122" y="245" width="44" height="24" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="144" y="261" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <rect x="176" y="245" width="44" height="24" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="198" y="261" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <!-- Middle dots -->
  <text x="357" y="262" text-anchor="middle" fill="#475569" font-size="16" font-weight="700">···</text>

  <!-- Right group: x=460, 514, 568  (width 44, gap 10) -->
  <rect x="438" y="245" width="44" height="24" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="460" y="261" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <rect x="492" y="245" width="44" height="24" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="514" y="261" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <rect x="546" y="245" width="44" height="24" rx="5" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="568" y="261" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">1</text>

  <!-- n leaves label -->
  <text x="357" y="285" text-anchor="middle" fill="#64748b" font-size="10">← 총 n개의 리프 노드 →</text>
</svg>
