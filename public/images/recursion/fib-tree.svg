<svg viewBox="0 0 760 380" width="1140" height="570" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="760" height="380" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">fib(5) 재귀 호출 트리</text>

  <!-- Complexity note -->
  <text x="730" y="48" text-anchor="end" fill="#64748b" font-size="11">총 호출: O(2ⁿ)</text>
  <text x="730" y="63" text-anchor="end" fill="#64748b" font-size="11">중복 계산 발생</text>

  <!-- Legend -->
  <rect x="30"  y="356" width="12" height="12" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="48"  y="367" fill="#94a3b8" font-size="11">기저 사례 fib(0)/fib(1)</text>
  <rect x="210" y="356" width="12" height="12" rx="3" fill="#ef4444" opacity="0.85"/>
  <text x="228" y="367" fill="#94a3b8" font-size="11">fib(2) ×3 중복</text>
  <rect x="360" y="356" width="12" height="12" rx="3" fill="#f97316" opacity="0.85"/>
  <text x="378" y="367" fill="#94a3b8" font-size="11">fib(3) ×2 중복</text>
  <rect x="500" y="356" width="12" height="12" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="518" y="367" fill="#94a3b8" font-size="11">최초 호출</text>

  <!--
    Node layout (center x, center y):
    ─ Level 0 (y=55):  fib(5)@412
    ─ Level 1 (y=120): fib(4)@242  fib(3)R@583
    ─ Level 2 (y=185): fib(3)LL@158  fib(2)LR@327  fib(2)RL@527  fib(1)RR@640
    ─ Level 3 (y=250): fib(2)LLL@102  fib(1)LLR@215  fib(1)LRL@290  fib(0)LRR@365  fib(1)RLL@490  fib(0)RLR@565
    ─ Level 4 (y=315): fib(1)@65  fib(0)@140
    Each rect: cx-30 to cx+30, cy-14 to cy+14
    Edge: parent (cx, cy+14) → child (cx, cy-14)
  -->

  <!-- ==================== EDGES ==================== -->
  <!-- fib(5) → fib(4) / fib(3)R -->
  <line x1="412" y1="69"  x2="242" y2="106" stroke="#334155" stroke-width="1.5"/>
  <line x1="412" y1="69"  x2="583" y2="106" stroke="#334155" stroke-width="1.5"/>

  <!-- fib(4) → fib(3)LL / fib(2)LR -->
  <line x1="242" y1="134" x2="158" y2="171" stroke="#334155" stroke-width="1.5"/>
  <line x1="242" y1="134" x2="327" y2="171" stroke="#334155" stroke-width="1.5"/>

  <!-- fib(3)R → fib(2)RL / fib(1)RR -->
  <line x1="583" y1="134" x2="527" y2="171" stroke="#334155" stroke-width="1.5"/>
  <line x1="583" y1="134" x2="640" y2="171" stroke="#334155" stroke-width="1.5"/>

  <!-- fib(3)LL → fib(2)LLL / fib(1)LLR -->
  <line x1="158" y1="199" x2="102" y2="236" stroke="#334155" stroke-width="1.5"/>
  <line x1="158" y1="199" x2="215" y2="236" stroke="#334155" stroke-width="1.5"/>

  <!-- fib(2)LR → fib(1)LRL / fib(0)LRR -->
  <line x1="327" y1="199" x2="290" y2="236" stroke="#334155" stroke-width="1.5"/>
  <line x1="327" y1="199" x2="365" y2="236" stroke="#334155" stroke-width="1.5"/>

  <!-- fib(2)RL → fib(1)RLL / fib(0)RLR -->
  <line x1="527" y1="199" x2="490" y2="236" stroke="#334155" stroke-width="1.5"/>
  <line x1="527" y1="199" x2="565" y2="236" stroke="#334155" stroke-width="1.5"/>

  <!-- fib(2)LLL → fib(1)LLLL / fib(0)LLLR -->
  <line x1="102" y1="264" x2="65"  y2="301" stroke="#334155" stroke-width="1.5"/>
  <line x1="102" y1="264" x2="140" y2="301" stroke="#334155" stroke-width="1.5"/>

  <!-- ==================== NODES ==================== -->

  <!-- Level 0 -->
  <rect x="382" y="41"  width="60" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="412" y="59"  text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">fib(5)</text>

  <!-- Level 1 -->
  <rect x="212" y="106" width="60" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="242" y="124" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">fib(4)</text>

  <rect x="553" y="106" width="60" height="28" rx="6" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="583" y="124" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="700">fib(3)</text>

  <!-- Level 2 -->
  <rect x="128" y="171" width="60" height="28" rx="6" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="158" y="189" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="700">fib(3)</text>

  <rect x="297" y="171" width="60" height="28" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="327" y="189" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">fib(2)</text>

  <rect x="497" y="171" width="60" height="28" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="527" y="189" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">fib(2)</text>

  <!-- fib(1) leaf at level 2 -->
  <rect x="610" y="171" width="60" height="28" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="640" y="189" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(1)</text>

  <!-- Level 3 -->
  <rect x="72"  y="236" width="60" height="28" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="102" y="254" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">fib(2)</text>

  <rect x="185" y="236" width="60" height="28" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="215" y="254" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(1)</text>

  <rect x="260" y="236" width="60" height="28" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="290" y="254" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(1)</text>

  <rect x="335" y="236" width="60" height="28" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="365" y="254" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(0)</text>

  <rect x="460" y="236" width="60" height="28" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="490" y="254" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(1)</text>

  <rect x="535" y="236" width="60" height="28" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="565" y="254" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(0)</text>

  <!-- Level 4 (children of fib(2)LLL) -->
  <rect x="35"  y="301" width="60" height="28" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="65"  y="319" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(1)</text>

  <rect x="110" y="301" width="60" height="28" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="319" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(0)</text>
</svg>
