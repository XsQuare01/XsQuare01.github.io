<svg viewBox="0 0 620 345" width="930" height="518" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="620" height="345" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="310" y="26" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">fib(5) 재귀 호출 트리</text>

  <!-- Legend -->
  <rect x="30" y="305" width="12" height="12" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="48" y="316" fill="#94a3b8" font-size="11">기저 사례 (fib(0), fib(1))</text>
  <rect x="180" y="305" width="12" height="12" rx="3" fill="#ef4444" opacity="0.85"/>
  <text x="198" y="316" fill="#94a3b8" font-size="11">fib(2) ×3 중복</text>
  <rect x="320" y="305" width="12" height="12" rx="3" fill="#f97316" opacity="0.85"/>
  <text x="338" y="316" fill="#94a3b8" font-size="11">fib(3) ×2 중복</text>
  <rect x="450" y="305" width="12" height="12" rx="3" fill="#3b82f6" opacity="0.85"/>
  <text x="468" y="316" fill="#94a3b8" font-size="11">최초 호출</text>

  <!-- ==================== EDGES ==================== -->
  <!-- fib(5) -> fib(4) -->
  <line x1="310" y1="64" x2="190" y2="104" stroke="#475569" stroke-width="1.5"/>
  <!-- fib(5) -> fib(3)a -->
  <line x1="310" y1="64" x2="440" y2="104" stroke="#475569" stroke-width="1.5"/>

  <!-- fib(4) -> fib(3)b -->
  <line x1="190" y1="122" x2="115" y2="162" stroke="#475569" stroke-width="1.5"/>
  <!-- fib(4) -> fib(2)a -->
  <line x1="190" y1="122" x2="270" y2="162" stroke="#475569" stroke-width="1.5"/>

  <!-- fib(3)a -> fib(2)b -->
  <line x1="440" y1="122" x2="385" y2="162" stroke="#475569" stroke-width="1.5"/>
  <!-- fib(3)a -> fib(1)leaf -->
  <line x1="440" y1="122" x2="500" y2="162" stroke="#475569" stroke-width="1.5"/>

  <!-- fib(3)b -> fib(2)c -->
  <line x1="115" y1="180" x2="72" y2="220" stroke="#475569" stroke-width="1.5"/>
  <!-- fib(3)b -> fib(1)b -->
  <line x1="115" y1="180" x2="160" y2="220" stroke="#475569" stroke-width="1.5"/>

  <!-- fib(2)a -> fib(1)c -->
  <line x1="270" y1="180" x2="240" y2="220" stroke="#475569" stroke-width="1.5"/>
  <!-- fib(2)a -> fib(0)a -->
  <line x1="270" y1="180" x2="305" y2="220" stroke="#475569" stroke-width="1.5"/>

  <!-- fib(2)b -> fib(1)d -->
  <line x1="385" y1="180" x2="355" y2="220" stroke="#475569" stroke-width="1.5"/>
  <!-- fib(2)b -> fib(0)b -->
  <line x1="385" y1="180" x2="420" y2="220" stroke="#475569" stroke-width="1.5"/>

  <!-- fib(2)c -> fib(1)e -->
  <line x1="72" y1="238" x2="44" y2="278" stroke="#475569" stroke-width="1.5"/>
  <!-- fib(2)c -> fib(0)c -->
  <line x1="72" y1="238" x2="104" y2="278" stroke="#475569" stroke-width="1.5"/>

  <!-- ==================== NODES ==================== -->

  <!-- fib(5) — blue, level 0 -->
  <rect x="280" y="48" width="60" height="26" rx="6" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="310" y="65" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">fib(5)</text>

  <!-- fib(4) — blue -->
  <rect x="160" y="106" width="60" height="26" rx="6" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="123" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">fib(4)</text>

  <!-- fib(3)a — orange duplicate -->
  <rect x="410" y="106" width="60" height="26" rx="6" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="440" y="123" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="700">fib(3)</text>

  <!-- fib(3)b — orange duplicate -->
  <rect x="85" y="164" width="60" height="26" rx="6" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="115" y="181" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="700">fib(3)</text>

  <!-- fib(2)a — red duplicate -->
  <rect x="240" y="164" width="60" height="26" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="270" y="181" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">fib(2)</text>

  <!-- fib(2)b — red duplicate -->
  <rect x="355" y="164" width="60" height="26" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="385" y="181" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">fib(2)</text>

  <!-- fib(1) leaf a (child of fib(3)a) — green -->
  <rect x="470" y="164" width="60" height="26" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="500" y="181" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(1)</text>

  <!-- Level 4 leaves -->

  <!-- fib(2)c — red duplicate (child of fib(3)b) -->
  <rect x="42" y="222" width="60" height="26" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="72" y="239" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">fib(2)</text>

  <!-- fib(1)b leaf (child of fib(3)b) — green -->
  <rect x="130" y="222" width="60" height="26" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="160" y="239" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(1)</text>

  <!-- fib(1)c leaf (child of fib(2)a) — green -->
  <rect x="210" y="222" width="60" height="26" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="240" y="239" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(1)</text>

  <!-- fib(0)a leaf (child of fib(2)a) — green -->
  <rect x="275" y="222" width="60" height="26" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="305" y="239" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(0)</text>

  <!-- fib(1)d leaf (child of fib(2)b) — green -->
  <rect x="325" y="222" width="60" height="26" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="355" y="239" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(1)</text>

  <!-- fib(0)b leaf (child of fib(2)b) — green -->
  <rect x="390" y="222" width="60" height="26" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="420" y="239" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(0)</text>

  <!-- Level 5 leaves (children of fib(2)c) -->
  <rect x="14" y="262" width="60" height="26" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="44" y="279" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(1)</text>

  <rect x="74" y="262" width="60" height="26" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="104" y="279" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">fib(0)</text>

  <!-- Complexity annotation -->
  <text x="570" y="48" text-anchor="end" fill="#64748b" font-size="11">총 호출: O(2ⁿ)</text>
  <text x="570" y="64" text-anchor="end" fill="#64748b" font-size="11">중복 계산 발생</text>
</svg>
