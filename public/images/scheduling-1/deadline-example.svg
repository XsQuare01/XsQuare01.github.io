<svg viewBox="0 0 760 420" width="1140" height="630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="760" height="420" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">Deadline Scheduling — 이익 큰 일부터, 마감 기한에 가깝게</text>
  <text x="380" y="56" text-anchor="middle" fill="#64748b" font-size="11.5">할 일 (D, P) = {(2, 2), (1, 3), (1, 1)} · 각 일은 1시간 소요</text>

  <!-- ===== STEP 1 : sort by profit ===== -->
  <text x="60" y="98" fill="#94a3b8" font-size="12" font-weight="600">① 이익(P)을 내림차순으로 정렬해 큰 것부터 본다</text>

  <!-- chip 1 : P=3, D=1 -->
  <rect x="60" y="112" width="150" height="48" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="135" y="135" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">P = 3</text>
  <text x="135" y="152" text-anchor="middle" fill="#7dd3fc" font-size="10.5">마감 D = 1</text>

  <!-- chip 2 : P=2, D=2 -->
  <rect x="230" y="112" width="150" height="48" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="305" y="135" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">P = 2</text>
  <text x="305" y="152" text-anchor="middle" fill="#7dd3fc" font-size="10.5">마감 D = 2</text>

  <!-- chip 3 : P=1, D=1 -->
  <rect x="400" y="112" width="150" height="48" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="475" y="135" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">P = 1</text>
  <text x="475" y="152" text-anchor="middle" fill="#7dd3fc" font-size="10.5">마감 D = 1</text>

  <!-- order arrows -->
  <text x="220" y="142" text-anchor="middle" fill="#475569" font-size="18" font-weight="700">›</text>
  <text x="390" y="142" text-anchor="middle" fill="#475569" font-size="18" font-weight="700">›</text>

  <!-- ===== STEP 2 : place near deadline ===== -->
  <text x="60" y="205" fill="#94a3b8" font-size="12" font-weight="600">② 마감 기한 D에 가장 가까운 빈 칸에 배치한다 (자리가 없으면 버린다)</text>

  <!-- slot 1 : time 1, holds P=3 -->
  <rect x="195" y="224" width="150" height="52" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="270" y="248" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">P = 3  (D = 1)</text>
  <text x="270" y="265" text-anchor="middle" fill="#86efac" font-size="10">시간 1 — 마감 직전</text>

  <!-- slot 2 : time 2, holds P=2 -->
  <rect x="345" y="224" width="150" height="52" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="420" y="248" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">P = 2  (D = 2)</text>
  <text x="420" y="265" text-anchor="middle" fill="#86efac" font-size="10">시간 2 — 마감 직전</text>

  <!-- discarded : P=1 -->
  <rect x="545" y="224" width="160" height="52" rx="8" fill="#3f1d1d" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="625" y="248" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">P = 1  (D = 1)</text>
  <text x="625" y="265" text-anchor="middle" fill="#f87171" font-size="10">버림 — 시간 1 이미 참</text>

  <!-- time ticks under the two slots -->
  <line x1="195" y1="276" x2="195" y2="286" stroke="#334155" stroke-width="1.5"/>
  <line x1="345" y1="276" x2="345" y2="286" stroke="#334155" stroke-width="1.5"/>
  <line x1="495" y1="276" x2="495" y2="286" stroke="#334155" stroke-width="1.5"/>
  <text x="195" y="300" text-anchor="middle" fill="#64748b" font-size="10">0</text>
  <text x="345" y="300" text-anchor="middle" fill="#64748b" font-size="10">1</text>
  <text x="495" y="300" text-anchor="middle" fill="#64748b" font-size="10">2</text>
  <text x="520" y="300" fill="#475569" font-size="10">시간</text>

  <!-- total profit -->
  <rect x="195" y="326" width="300" height="36" rx="8" fill="#0f1117" stroke="#22c55e" stroke-width="1.5"/>
  <text x="345" y="349" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">총 이익 = 3 + 2 = 5</text>

  <!-- footnote -->
  <text x="380" y="392" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">이익이 큰 (1,3)이 시간 1을 먼저 차지하고, (2,2)는 시간 2로. 같은 마감을 노린 (1,1)은 자리가 없어 버려진다.</text>
</svg>
