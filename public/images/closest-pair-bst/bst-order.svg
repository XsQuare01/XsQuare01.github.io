<svg viewBox="0 0 720 400" width="1080" height="600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="400" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">y를 키로 둔 이진 탐색 트리 — 중위 순회가 곧 y정렬</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">모든 노드에서 왼쪽 &lt; 자기 &lt; 오른쪽 · 왼쪽→자기→오른쪽 순으로 방문</text>

  <!-- Edges -->
  <line x1="360" y1="92" x2="220" y2="152" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="360" y1="92" x2="500" y2="152" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="220" y1="172" x2="140" y2="232" stroke="#3b82f6" stroke-width="1.3"/>
  <line x1="220" y1="172" x2="300" y2="232" stroke="#3b82f6" stroke-width="1.3"/>
  <line x1="500" y1="172" x2="420" y2="232" stroke="#3b82f6" stroke-width="1.3"/>
  <line x1="500" y1="172" x2="580" y2="232" stroke="#3b82f6" stroke-width="1.3"/>

  <!-- Root: y=5 -->
  <circle cx="360" cy="80" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="85" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">y=5</text>

  <!-- Level 1 -->
  <circle cx="220" cy="160" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="220" y="165" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">y=2</text>
  <circle cx="500" cy="160" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="500" y="165" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">y=8</text>

  <!-- left / right hints -->
  <text x="285" y="120" text-anchor="middle" fill="#64748b" font-size="10">작다 ↙</text>
  <text x="440" y="120" text-anchor="middle" fill="#64748b" font-size="10">↘ 크다</text>

  <!-- Level 2 -->
  <circle cx="140" cy="240" r="18" fill="#162032" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="245" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">y=1</text>
  <circle cx="300" cy="240" r="18" fill="#162032" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="300" y="245" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">y=4</text>
  <circle cx="420" cy="240" r="18" fill="#162032" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="420" y="245" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">y=7</text>
  <circle cx="580" cy="240" r="18" fill="#162032" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="580" y="245" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">y=9</text>

  <!-- In-order arrow -->
  <text x="60" y="312" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">중위</text>
  <text x="60" y="326" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">순회</text>
  <line x1="100" y1="318" x2="150" y2="318" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrb)"/>
  <defs>
    <marker id="arrb" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Sorted strip -->
  <g>
    <rect x="168" y="302" width="48" height="32" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="192" y="323" text-anchor="middle" fill="#6ee7b7" font-size="12">1</text>
    <rect x="220" y="302" width="48" height="32" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="244" y="323" text-anchor="middle" fill="#6ee7b7" font-size="12">2</text>
    <rect x="272" y="302" width="48" height="32" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="296" y="323" text-anchor="middle" fill="#6ee7b7" font-size="12">4</text>
    <rect x="324" y="302" width="48" height="32" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="348" y="323" text-anchor="middle" fill="#6ee7b7" font-size="12">5</text>
    <rect x="376" y="302" width="48" height="32" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="400" y="323" text-anchor="middle" fill="#6ee7b7" font-size="12">7</text>
    <rect x="428" y="302" width="48" height="32" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="452" y="323" text-anchor="middle" fill="#6ee7b7" font-size="12">8</text>
    <rect x="480" y="302" width="48" height="32" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
    <text x="504" y="323" text-anchor="middle" fill="#6ee7b7" font-size="12">9</text>
  </g>
  <text x="348" y="360" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">y 오름차순 — 따로 정렬하지 않아도 트리가 유지</text>
</svg>
