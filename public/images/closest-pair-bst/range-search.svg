<svg viewBox="0 0 720 400" width="1080" height="600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="400" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">구간 [y_P−D, y_P+D] 탐색 (예: [3, 7])</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">① 하한(y≥3인 첫 노드)까지 내려가기 → ② 거기서 중위로 훑고 y&gt;7이면 멈춤</text>

  <!-- Base edges -->
  <line x1="360" y1="92" x2="220" y2="152" stroke="#334155" stroke-width="1.4"/>
  <line x1="360" y1="92" x2="500" y2="152" stroke="#334155" stroke-width="1.4"/>
  <line x1="220" y1="172" x2="140" y2="232" stroke="#334155" stroke-width="1.2"/>
  <line x1="220" y1="172" x2="300" y2="232" stroke="#334155" stroke-width="1.2"/>
  <line x1="500" y1="172" x2="420" y2="232" stroke="#334155" stroke-width="1.2"/>
  <line x1="500" y1="172" x2="580" y2="232" stroke="#334155" stroke-width="1.2"/>

  <!-- Descent path overlay (orange): 5 -> 2 -> 4 -->
  <line x1="360" y1="92" x2="220" y2="152" stroke="#f97316" stroke-width="2.4" stroke-dasharray="5 3"/>
  <line x1="220" y1="172" x2="300" y2="232" stroke="#f97316" stroke-width="2.4" stroke-dasharray="5 3"/>

  <!-- Root: y=5 (in window -> green) -->
  <circle cx="360" cy="80" r="22" fill="#14352b" stroke="#34d399" stroke-width="2"/>
  <text x="360" y="85" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">y=5</text>

  <!-- y=2 : outside window (gray), on descent path -->
  <circle cx="220" cy="160" r="20" fill="#1a1d26" stroke="#475569" stroke-width="1.8"/>
  <text x="220" y="165" text-anchor="middle" fill="#64748b" font-size="12" font-weight="700">y=2</text>

  <!-- y=8 : outside window (gray) — stop point -->
  <circle cx="500" cy="160" r="20" fill="#1a1d26" stroke="#475569" stroke-width="1.8"/>
  <text x="500" y="165" text-anchor="middle" fill="#64748b" font-size="12" font-weight="700">y=8</text>

  <!-- y=1 : outside (gray) -->
  <circle cx="140" cy="240" r="18" fill="#1a1d26" stroke="#475569" stroke-width="1.5"/>
  <text x="140" y="245" text-anchor="middle" fill="#64748b" font-size="11" font-weight="700">y=1</text>

  <!-- y=4 : lower bound, in window (green + ring) -->
  <circle cx="300" cy="240" r="18" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="300" cy="240" r="23" fill="none" stroke="#f97316" stroke-width="1.6" stroke-dasharray="3 2"/>
  <text x="300" y="245" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700">y=4</text>
  <text x="300" y="278" text-anchor="middle" fill="#f97316" font-size="9" font-weight="700">하한(lower_bound)</text>

  <!-- y=7 : in window (green) -->
  <circle cx="420" cy="240" r="18" fill="#14352b" stroke="#34d399" stroke-width="1.5"/>
  <text x="420" y="245" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700">y=7</text>

  <!-- y=9 : outside (gray) -->
  <circle cx="580" cy="240" r="18" fill="#1a1d26" stroke="#475569" stroke-width="1.5"/>
  <text x="580" y="245" text-anchor="middle" fill="#64748b" font-size="11" font-weight="700">y=9</text>

  <!-- in-order sorted strip -->
  <text x="60" y="322" text-anchor="middle" fill="#94a3b8" font-size="10">중위 순서</text>
  <g>
    <rect x="168" y="306" width="46" height="30" rx="5" fill="#1a1d26" stroke="#475569" stroke-width="1.3"/>
    <text x="191" y="326" text-anchor="middle" fill="#64748b" font-size="12">1</text>
    <rect x="218" y="306" width="46" height="30" rx="5" fill="#1a1d26" stroke="#475569" stroke-width="1.3"/>
    <text x="241" y="326" text-anchor="middle" fill="#64748b" font-size="12">2</text>
    <rect x="268" y="306" width="46" height="30" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.8"/>
    <text x="291" y="326" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">4</text>
    <rect x="318" y="306" width="46" height="30" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.8"/>
    <text x="341" y="326" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">5</text>
    <rect x="368" y="306" width="46" height="30" rx="5" fill="#14352b" stroke="#34d399" stroke-width="1.8"/>
    <text x="391" y="326" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">7</text>
    <rect x="418" y="306" width="46" height="30" rx="5" fill="#2a1518" stroke="#f87171" stroke-width="1.6"/>
    <text x="441" y="326" text-anchor="middle" fill="#f87171" font-size="12">8</text>
    <rect x="468" y="306" width="46" height="30" rx="5" fill="#1a1d26" stroke="#475569" stroke-width="1.3"/>
    <text x="491" y="326" text-anchor="middle" fill="#64748b" font-size="12">9</text>
  </g>
  <!-- walk arrow over collected -->
  <line x1="291" y1="300" x2="391" y2="300" stroke="#34d399" stroke-width="1.6" marker-end="url(#arrg)"/>
  <text x="341" y="294" text-anchor="middle" fill="#4ade80" font-size="9">② 훑기</text>
  <text x="441" y="352" text-anchor="middle" fill="#f87171" font-size="9" font-weight="700">y=8 &gt; 7 → 멈춤 (upper_bound)</text>
  <defs>
    <marker id="arrg" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Legend -->
  <line x1="150" y1="372" x2="172" y2="372" stroke="#f97316" stroke-width="2.4" stroke-dasharray="5 3"/>
  <text x="178" y="376" fill="#f97316" font-size="10">① 하한까지 경로 O(log n)</text>
  <circle cx="360" cy="372" r="6" fill="#14352b" stroke="#34d399" stroke-width="1.8"/>
  <text x="372" y="376" fill="#4ade80" font-size="10">구간 안 (조회됨)</text>
  <circle cx="500" cy="372" r="6" fill="#1a1d26" stroke="#475569" stroke-width="1.3"/>
  <text x="512" y="376" fill="#64748b" font-size="10">구간 밖 (안 봄)</text>
</svg>
