<svg viewBox="0 0 720 380" width="1080" height="570" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="380" rx="10" fill="#0f1117"/>
  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">cycle이 있는 그래프는 MST가 아니다</text>
  <text x="360" y="50" text-anchor="middle" fill="#64748b" font-size="11">cycle 안의 간선 하나를 빼도 그래프는 여전히 연결된다</text>

  <!-- Divider -->
  <line x1="360" y1="80" x2="360" y2="350" stroke="#1e293b" stroke-width="1"/>

  <!-- ============ PANEL 1: cycle present ============ -->
  <text x="180" y="100" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600">cycle이 있는 연결 그래프</text>

  <!-- Triangle edges (orange) -->
  <line x1="100" y1="170" x2="260" y2="170" stroke="#f97316" stroke-width="3"/>
  <line x1="260" y1="170" x2="180" y2="290" stroke="#f97316" stroke-width="3"/>
  <line x1="100" y1="170" x2="180" y2="290" stroke="#f97316" stroke-width="3"/>

  <!-- Edge labels -->
  <rect x="166" y="160" width="28" height="20" rx="4" fill="#0f1117" stroke="#f97316" stroke-width="1"/>
  <text x="180" y="175" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">3</text>

  <rect x="206" y="220" width="28" height="20" rx="4" fill="#0f1117" stroke="#f97316" stroke-width="1"/>
  <text x="220" y="235" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">4</text>

  <rect x="126" y="220" width="28" height="20" rx="4" fill="#0f1117" stroke="#f97316" stroke-width="1"/>
  <text x="140" y="235" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">5</text>

  <!-- Nodes panel 1 -->
  <circle cx="100" cy="170" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="175" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">A</text>
  <circle cx="260" cy="170" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="260" y="175" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">B</text>
  <circle cx="180" cy="290" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="295" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">C</text>

  <text x="180" y="335" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">합 = 3 + 4 + 5 = 12</text>

  <!-- Arrow between panels -->
  <text x="360" y="215" text-anchor="middle" fill="#94a3b8" font-size="22" font-weight="600">→</text>
  <text x="360" y="245" text-anchor="middle" fill="#64748b" font-size="10">가장 무거운</text>
  <text x="360" y="259" text-anchor="middle" fill="#64748b" font-size="10">간선 제거</text>

  <!-- ============ PANEL 2: cycle removed ============ -->
  <text x="540" y="100" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="600">cycle 제거 후 — 여전히 연결</text>

  <line x1="460" y1="170" x2="620" y2="170" stroke="#22c55e" stroke-width="3"/>
  <line x1="620" y1="170" x2="540" y2="290" stroke="#22c55e" stroke-width="3"/>
  <!-- Removed edge: dashed gray -->
  <line x1="460" y1="170" x2="540" y2="290" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4"/>

  <rect x="526" y="160" width="28" height="20" rx="4" fill="#0f1117" stroke="#22c55e" stroke-width="1"/>
  <text x="540" y="175" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">3</text>

  <rect x="566" y="220" width="28" height="20" rx="4" fill="#0f1117" stroke="#22c55e" stroke-width="1"/>
  <text x="580" y="235" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">4</text>

  <rect x="476" y="220" width="44" height="20" rx="4" fill="#0f1117" stroke="#475569" stroke-width="1"/>
  <text x="498" y="235" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">5 제거</text>

  <circle cx="460" cy="170" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="460" y="175" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">A</text>
  <circle cx="620" cy="170" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="620" y="175" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">B</text>
  <circle cx="540" cy="290" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="295" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">C</text>

  <text x="540" y="335" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">합 = 3 + 4 = 7 (더 작음, A↔B↔C 연결 유지)</text>

  <text x="360" y="365" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">cycle이 존재한다면 더 작은 답이 항상 존재한다 — MST는 트리</text>
</svg>
