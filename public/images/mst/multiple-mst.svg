<svg viewBox="0 0 720 380" width="1080" height="570" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="380" rx="10" fill="#0f1117"/>
  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">MST는 유일하지 않을 수 있다</text>
  <text x="360" y="50" text-anchor="middle" fill="#64748b" font-size="11">동일 가중치 간선이 여러 개일 때, 어느 것을 고르느냐에 따라 다른 MST가 나온다</text>

  <line x1="360" y1="80" x2="360" y2="350" stroke="#1e293b" stroke-width="1"/>

  <!-- ============ PANEL 1: MST 1 ============ -->
  <text x="180" y="100" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">MST 1: {A-B, A-C, C-D}</text>

  <!-- Edges -->
  <line x1="90" y1="160" x2="270" y2="160" stroke="#ef4444" stroke-width="3"/>
  <line x1="90" y1="160" x2="180" y2="280" stroke="#ef4444" stroke-width="3"/>
  <line x1="270" y1="160" x2="180" y2="280" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="180" y1="280" x2="320" y2="280" stroke="#ef4444" stroke-width="3"/>

  <rect x="166" y="150" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444" stroke-width="1"/>
  <text x="180" y="165" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">1</text>

  <rect x="121" y="210" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444" stroke-width="1"/>
  <text x="135" y="225" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">1</text>

  <rect x="211" y="210" width="28" height="20" rx="4" fill="#0f1117" stroke="#475569" stroke-width="1"/>
  <text x="225" y="225" text-anchor="middle" fill="#64748b" font-size="12" font-weight="700">1</text>

  <rect x="236" y="270" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444" stroke-width="1"/>
  <text x="250" y="285" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">2</text>

  <!-- Nodes -->
  <circle cx="90" cy="160" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="90" y="165" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">A</text>
  <circle cx="270" cy="160" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="270" y="165" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">B</text>
  <circle cx="180" cy="280" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="285" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">C</text>
  <circle cx="320" cy="280" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="285" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">D</text>

  <text x="180" y="325" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">합 = 1 + 1 + 2 = 4</text>

  <!-- ============ PANEL 2: MST 2 ============ -->
  <text x="540" y="100" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">MST 2: {A-B, B-C, C-D}</text>

  <line x1="450" y1="160" x2="630" y2="160" stroke="#ef4444" stroke-width="3"/>
  <line x1="450" y1="160" x2="540" y2="280" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="630" y1="160" x2="540" y2="280" stroke="#ef4444" stroke-width="3"/>
  <line x1="540" y1="280" x2="680" y2="280" stroke="#ef4444" stroke-width="3"/>

  <rect x="526" y="150" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444" stroke-width="1"/>
  <text x="540" y="165" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">1</text>

  <rect x="481" y="210" width="28" height="20" rx="4" fill="#0f1117" stroke="#475569" stroke-width="1"/>
  <text x="495" y="225" text-anchor="middle" fill="#64748b" font-size="12" font-weight="700">1</text>

  <rect x="571" y="210" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444" stroke-width="1"/>
  <text x="585" y="225" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">1</text>

  <rect x="596" y="270" width="28" height="20" rx="4" fill="#0f1117" stroke="#ef4444" stroke-width="1"/>
  <text x="610" y="285" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">2</text>

  <circle cx="450" cy="160" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="165" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">A</text>
  <circle cx="630" cy="160" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="630" y="165" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">B</text>
  <circle cx="540" cy="280" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="285" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">C</text>
  <circle cx="680" cy="280" r="20" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="680" y="285" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">D</text>

  <text x="540" y="325" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">합 = 1 + 1 + 2 = 4 (동일)</text>

  <text x="360" y="365" text-anchor="middle" fill="#64748b" font-size="10" font-style="italic">모든 간선 가중치가 서로 다르면 MST는 유일하다 (증명 생략)</text>
</svg>
