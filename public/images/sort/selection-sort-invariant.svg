<svg viewBox="0 0 720 240" width="1080" height="360" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="720" height="240" rx="10" fill="#0f1117"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Selection Sort 루프 불변식</text>
  <text x="360" y="48" text-anchor="middle" fill="#64748b" font-size="11">k번째 반복이 끝났을 때의 배열 상태</text>

  <!-- Array cells -->
  <!--
    Each cell: width 56, height 40, y=88
    Total 8 cells, k=3 (3 sorted prefix)
    Start x=80, gap 0 (touching cells with border)
  -->

  <!-- Sorted prefix (0..k-1) - green -->
  <g>
    <rect x="80"  y="88" width="56" height="40" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
    <text x="108" y="113" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">3</text>
    <text x="108" y="146" text-anchor="middle" fill="#64748b" font-size="10" font-family="ui-monospace,monospace">a[0]</text>

    <rect x="136" y="88" width="56" height="40" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
    <text x="164" y="113" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">5</text>
    <text x="164" y="146" text-anchor="middle" fill="#64748b" font-size="10" font-family="ui-monospace,monospace">a[1]</text>

    <rect x="192" y="88" width="56" height="40" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
    <text x="220" y="113" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">7</text>
    <text x="220" y="146" text-anchor="middle" fill="#64748b" font-size="10" font-family="ui-monospace,monospace">a[2]</text>
  </g>

  <!-- Boundary k -->
  <line x1="248" y1="78" x2="248" y2="138" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="248" y="72" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="700">k = 3</text>

  <!-- Unsorted suffix (k..n-1) - gray -->
  <g>
    <rect x="248" y="88" width="56" height="40" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="276" y="113" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="700">9</text>
    <text x="276" y="146" text-anchor="middle" fill="#64748b" font-size="10" font-family="ui-monospace,monospace">a[3]</text>

    <rect x="304" y="88" width="56" height="40" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="332" y="113" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="700">12</text>
    <text x="332" y="146" text-anchor="middle" fill="#64748b" font-size="10" font-family="ui-monospace,monospace">a[4]</text>

    <rect x="360" y="88" width="56" height="40" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="388" y="113" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="700">8</text>
    <text x="388" y="146" text-anchor="middle" fill="#64748b" font-size="10" font-family="ui-monospace,monospace">a[5]</text>

    <rect x="416" y="88" width="56" height="40" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="444" y="113" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="700">15</text>
    <text x="444" y="146" text-anchor="middle" fill="#64748b" font-size="10" font-family="ui-monospace,monospace">a[6]</text>

    <rect x="472" y="88" width="56" height="40" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="500" y="113" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="700">11</text>
    <text x="500" y="146" text-anchor="middle" fill="#64748b" font-size="10" font-family="ui-monospace,monospace">a[7]</text>
  </g>

  <!-- Brackets / labels -->
  <text x="164" y="178" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="600">정렬 완료 영역</text>
  <text x="164" y="194" text-anchor="middle" fill="#94a3b8" font-size="10">a[0] &lt; a[1] &lt; a[2]</text>

  <text x="388" y="178" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">미정렬 영역</text>
  <text x="388" y="194" text-anchor="middle" fill="#94a3b8" font-size="10">모두 a[2]보다 큼</text>

  <!-- Bottom rule -->
  <text x="360" y="222" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">
    Invariant: a[0] &lt; a[1] &lt; ... &lt; a[k-1]   ∧   a[k-1] &lt; a[x] for all x ≥ k
  </text>
</svg>
