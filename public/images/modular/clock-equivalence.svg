<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="960" height="450">
  <rect width="640" height="300" fill="#0f1117" rx="10"/>
  <text x="320" y="17" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">모듈러 산술 — mod 7 시계와 동치류 (Equivalence Classes)</text>

  <!-- Clock circle (mod 7), center (150, 158), r=105 -->
  <circle cx="150" cy="158" r="108" fill="none" stroke="#2d3748" stroke-width="1.5"/>
  <circle cx="150" cy="158" r="4" fill="#475569"/>

  <!-- Clock labels 0..6 at angles 270°+k*360/7 (12시=0) -->
  <!-- k=0: 270° → (150, 50) -->
  <circle cx="150" cy="50" r="18" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2"/>
  <text x="150" y="56" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4ade80">0</text>

  <!-- k=1: 270+51.4=321.4° → cos=0.780,sin=0.626 → (150+84,158-67)=(234,91) -->
  <circle cx="234" cy="91" r="18" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="2"/>
  <text x="234" y="97" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#60a5fa">1</text>

  <!-- k=2: 270+102.9=12.9° → cos=0.974,sin=0.223 → (150+105,158-24)=(255,134) wait, let me recalc -->
  <!-- angle = 270 + k*360/7 degrees, in radians = (270 + k*360/7)*π/180 -->
  <!-- k=2: (270+102.86)=372.86=12.86° → x=150+108*cos(12.86°)=150+108*0.9749=255, y=158+108*sin(12.86°)=158+108*0.2225=182 -->
  <!-- wait: standard SVG angle: angle from positive x-axis, so let me use angle measured from top (12 o'clock) going clockwise -->
  <!-- position: x = cx + r*sin(2πk/n), y = cy - r*cos(2πk/n) -->
  <!-- r for label placement = 108 -->
  <!-- k=0: x=150+0=150, y=158-108=50 ✓ -->
  <!-- k=1: x=150+108*sin(2π/7)=150+108*0.7818=150+84.4=234, y=158-108*cos(2π/7)=158-108*0.6235=158-67.3=91 ✓ -->
  <!-- k=2: x=150+108*sin(4π/7)=150+108*0.9749=150+105.3=255, y=158-108*cos(4π/7)=158-108*(-0.2225)=158+24=182 -->
  <circle cx="255" cy="182" r="18" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="2"/>
  <text x="255" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#a78bfa">2</text>

  <!-- k=3: x=150+108*sin(6π/7)=150+108*0.4339=150+46.9=197, y=158-108*cos(6π/7)=158-108*(-0.9009)=158+97.3=255 -->
  <circle cx="197" cy="255" r="18" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <text x="197" y="261" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fbbf24">3</text>

  <!-- k=4: x=150+108*sin(8π/7)=150+108*(-0.4339)=150-46.9=103, y=158-108*cos(8π/7)=158+97.3=255 -->
  <circle cx="103" cy="255" r="18" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <text x="103" y="261" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#fbbf24">4</text>

  <!-- k=5: x=150+108*sin(10π/7)=150-105.3=45, y=158-108*cos(10π/7)=158+24=182 -->
  <circle cx="45" cy="182" r="18" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="2"/>
  <text x="45" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#a78bfa">5</text>

  <!-- k=6: x=150-84.4=66, y=158-67.3=91 -->
  <circle cx="66" cy="91" r="18" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="2"/>
  <text x="66" y="97" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#60a5fa">6</text>

  <!-- Tick lines from center to just inside each circle -->
  <line x1="150" y1="158" x2="150" y2="72" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="158" x2="222" y2="105" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="158" x2="241" y2="179" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="158" x2="185" y2="241" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="158" x2="115" y2="241" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="158" x2="59" y2="179" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="158" x2="78" y2="105" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Clock label -->
  <text x="150" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#475569">mod 7 — 7개의 동치류</text>

  <!-- Right side: Equivalence classes -->
  <text x="360" y="42" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#94a3b8">동치류 (Equivalence Classes)</text>
  <text x="360" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">같은 나머지를 공유하는 정수들의 집합</text>

  <!-- Class 0 -->
  <rect x="358" y="66" width="265" height="26" rx="4" fill="rgba(74,222,128,0.07)" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4"/>
  <text x="366" y="83" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#4ade80">[0]₇</text>
  <text x="400" y="83" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">= { ..., −14, −7, 0, 7, 14, ... }</text>

  <!-- Class 1 -->
  <rect x="358" y="96" width="265" height="26" rx="4" fill="rgba(96,165,250,0.07)" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.4"/>
  <text x="366" y="113" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#60a5fa">[1]₇</text>
  <text x="400" y="113" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">= { ..., −13, −6, 1, 8, 15, ... }</text>

  <!-- Class 2 -->
  <rect x="358" y="126" width="265" height="26" rx="4" fill="rgba(167,139,250,0.07)" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
  <text x="366" y="143" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#a78bfa">[2]₇</text>
  <text x="400" y="143" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">= { ..., −12, −5, 2, 9, 16, ... }</text>

  <!-- Class 3 -->
  <rect x="358" y="156" width="265" height="26" rx="4" fill="rgba(251,191,36,0.07)" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.4"/>
  <text x="366" y="173" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#fbbf24">[3]₇</text>
  <text x="400" y="173" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">= { ..., −11, −4, 3, 10, 17, ... }</text>

  <!-- dots for 4,5,6 -->
  <text x="366" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#475569">[4]₇, [5]₇, [6]₇  마찬가지...</text>

  <!-- Separator -->
  <line x1="358" y1="212" x2="623" y2="212" stroke="#2d3748" stroke-width="1"/>

  <!-- Key property: a ≡ b (mod 7) ↔ same class -->
  <text x="360" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#94a3b8">a ≡ b (mod 7)  ↔  a, b가 같은 동치류</text>
  <text x="360" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">예: 15 ≡ 1 (mod 7)  →  15, 1 ∈ [1]₇</text>
  <text x="360" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#6b7a99">예: 23 ≡ 2 (mod 7)  →  23, 2 ∈ [2]₇</text>

  <!-- Equivalence relation properties -->
  <text x="360" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#475569">반사·대칭·추이 성립 → 동치 관계 (Equivalence Relation)</text>
</svg>
