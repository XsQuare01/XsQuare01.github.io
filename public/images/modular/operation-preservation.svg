<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" width="960" height="435">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="640" height="290" fill="#0f1117" rx="10"/>
  <text x="320" y="17" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">모듈러 연산의 보존 성질 — mod 7 예시</text>

  <!-- Column headers -->
  <text x="100" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">정수 세계 (ℤ)</text>
  <text x="540" y="36" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">mod 7 세계 (ℤ₇)</text>

  <!-- Vertical divider -->
  <line x1="320" y1="28" x2="320" y2="275" stroke="#2d3748" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- === ROW 1: Addition === -->
  <text x="20" y="62" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#cbd5e1">덧셈</text>

  <!-- Left: 8 + 10 = 18 -->
  <rect x="30" y="68" width="58" height="30" rx="5" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="59" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">8</text>
  <text x="97" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">+</text>
  <rect x="107" y="68" width="58" height="30" rx="5" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="136" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#60a5fa">10</text>
  <text x="173" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">=</text>
  <rect x="183" y="68" width="58" height="30" rx="5" fill="rgba(251,191,36,0.12)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="212" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#fbbf24">18</text>

  <!-- Arrow across middle -->
  <line x1="255" y1="83" x2="310" y2="83" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="283" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#4ade80">mod 7</text>

  <!-- Right: 1 + 3 = 4 -->
  <rect x="330" y="68" width="40" height="30" rx="5" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="350" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">1</text>
  <text x="378" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">+</text>
  <rect x="388" y="68" width="40" height="30" rx="5" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="408" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#60a5fa">3</text>
  <text x="436" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">=</text>
  <rect x="446" y="68" width="40" height="30" rx="5" fill="rgba(251,191,36,0.12)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="466" y="88" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#fbbf24">4</text>

  <!-- Annotation -->
  <text x="510" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">8≡1, 10≡3</text>
  <text x="510" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#4ade80">18≡4 ✓</text>

  <!-- === ROW 2: Multiplication === -->
  <line x1="20" y1="112" x2="620" y2="112" stroke="#1e2738" stroke-width="1"/>
  <text x="20" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#cbd5e1">곱셈</text>

  <!-- Left: 8 × 10 = 80 -->
  <rect x="30" y="136" width="58" height="30" rx="5" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="59" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">8</text>
  <text x="97" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">×</text>
  <rect x="107" y="136" width="58" height="30" rx="5" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="136" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#60a5fa">10</text>
  <text x="173" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">=</text>
  <rect x="183" y="136" width="58" height="30" rx="5" fill="rgba(249,115,22,0.12)" stroke="#f97316" stroke-width="1.5"/>
  <text x="212" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f97316">80</text>

  <line x1="255" y1="151" x2="310" y2="151" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="283" y="144" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#f97316">mod 7</text>

  <!-- Right: 1 × 3 = 3 -->
  <rect x="330" y="136" width="40" height="30" rx="5" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="350" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">1</text>
  <text x="378" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">×</text>
  <rect x="388" y="136" width="40" height="30" rx="5" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="408" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#60a5fa">3</text>
  <text x="436" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">=</text>
  <rect x="446" y="136" width="40" height="30" rx="5" fill="rgba(249,115,22,0.12)" stroke="#f97316" stroke-width="1.5"/>
  <text x="466" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f97316">3</text>

  <text x="510" y="146" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">8≡1, 10≡3</text>
  <text x="510" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#f97316">80≡3 ✓</text>

  <!-- === ROW 3: Exponentiation === -->
  <line x1="20" y1="180" x2="620" y2="180" stroke="#1e2738" stroke-width="1"/>
  <text x="20" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#cbd5e1">지수</text>

  <!-- Left: 8^3 = 512 -->
  <rect x="30" y="204" width="58" height="30" rx="5" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="59" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">8³</text>
  <text x="98" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">=</text>
  <rect x="110" y="204" width="60" height="30" rx="5" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="140" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#60a5fa">512</text>

  <line x1="185" y1="219" x2="240" y2="219" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="212" y="213" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#60a5fa">mod 7</text>

  <rect x="252" y="204" width="50" height="30" rx="5" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="277" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#a78bfa">1</text>

  <!-- Equivalently: 1^3 = 1 -->
  <text x="320" y="212" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#cbd5e1">≡</text>

  <rect x="330" y="204" width="40" height="30" rx="5" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="350" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">1³</text>
  <text x="378" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">=</text>
  <rect x="388" y="204" width="40" height="30" rx="5" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="408" y="222" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#a78bfa">1</text>

  <text x="460" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">8≡1 (mod 7)</text>
  <text x="460" y="226" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#a78bfa">512≡1 ✓</text>

  <!-- Bottom summary -->
  <line x1="20" y1="248" x2="620" y2="248" stroke="#2d3748" stroke-width="1"/>
  <text x="320" y="265" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="600" fill="#e2e8f0">a ≡ b (mod m),  c ≡ d (mod m)  →  a±c ≡ b±d,  ac ≡ bd,  aⁿ ≡ bⁿ (mod m)</text>
  <text x="320" y="282" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">나눗셈은 gcd(k, m) = 1 일 때만 성립</text>
</svg>
