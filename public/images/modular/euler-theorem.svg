<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 310" width="960" height="465">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
  </defs>

  <rect width="640" height="310" fill="#0f1117" rx="10"/>
  <text x="320" y="17" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">오일러 정리 증명 — b·ℤₘ* = ℤₘ* 전단사 대응 (m=9, b=2)</text>

  <!-- Setup info -->
  <text x="20" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">m = 9,  ℤ₉* = {1, 2, 4, 5, 7, 8}  (gcd(a,9)=1인 원소),  φ(9) = 6</text>
  <text x="20" y="54" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">b = 2를 곱하면:  2·ℤ₉* = {2, 4, 8, 10≡1, 14≡5, 16≡7} = {1, 2, 4, 5, 7, 8} = ℤ₉*</text>

  <!-- Left set: Z9* -->
  <text x="110" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">ℤ₉*</text>
  <text x="110" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">{a₁,...,a₆}</text>

  <!-- Left elements: 1,2,4,5,7,8 -->
  <!-- Stacked vertically at x=110, y=115 to y=265, spacing 30 -->
  <circle cx="110" cy="120" r="18" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2"/>
  <text x="110" y="126" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">1</text>

  <circle cx="110" cy="158" r="18" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2"/>
  <text x="110" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">2</text>

  <circle cx="110" cy="196" r="18" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2"/>
  <text x="110" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">4</text>

  <circle cx="110" cy="234" r="18" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2"/>
  <text x="110" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">5</text>

  <circle cx="110" cy="272" r="18" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2"/>
  <text x="110" y="278" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">7</text>

  <circle cx="110" cy="295" r="18" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="2" cy="295"/>
  <text x="110" y="301" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#4ade80">8</text>

  <!-- ×2 label in middle -->
  <text x="250" y="188" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17.6" font-weight="700" fill="#f97316">×2</text>
  <text x="250" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">mod 9</text>

  <!-- Arrows: 1→2, 2→4, 4→8, 5→1, 7→5, 8→7 (mapping x → 2x mod 9) -->
  <line x1="130" y1="120" x2="360" y2="158" stroke="#f97316" stroke-width="1.2" stroke-opacity="0.7" marker-end="url(#arrow)"/>
  <line x1="130" y1="158" x2="360" y2="196" stroke="#f97316" stroke-width="1.2" stroke-opacity="0.7" marker-end="url(#arrow)"/>
  <line x1="130" y1="196" x2="360" y2="295" stroke="#f97316" stroke-width="1.2" stroke-opacity="0.7" marker-end="url(#arrow)"/>
  <line x1="130" y1="234" x2="360" y2="120" stroke="#f97316" stroke-width="1.2" stroke-opacity="0.7" marker-end="url(#arrow)"/>
  <line x1="130" y1="272" x2="360" y2="234" stroke="#f97316" stroke-width="1.2" stroke-opacity="0.7" marker-end="url(#arrow)"/>
  <line x1="130" y1="295" x2="360" y2="272" stroke="#f97316" stroke-width="1.2" stroke-opacity="0.7" marker-end="url(#arrow)"/>

  <!-- Right set: 2·Z9* (= Z9* reordered) -->
  <text x="390" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#f97316">2·ℤ₉*</text>
  <text x="390" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">= ℤ₉* (재배열)</text>

  <!-- Right elements in same order as arrows: 2,4,8,1,5,7 -->
  <circle cx="390" cy="120" r="18" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="2"/>
  <text x="390" y="126" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f97316">2</text>
  <text x="416" y="124" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">←1×2</text>

  <circle cx="390" cy="158" r="18" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="2"/>
  <text x="390" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f97316">4</text>
  <text x="416" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">←2×2</text>

  <circle cx="390" cy="196" r="18" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="2"/>
  <text x="390" y="202" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f97316">8</text>
  <text x="416" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">←4×2</text>

  <circle cx="390" cy="234" r="18" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="2"/>
  <text x="390" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f97316">1</text>
  <text x="416" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">←5×2</text>

  <circle cx="390" cy="272" r="18" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="2"/>
  <text x="390" y="278" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f97316">5</text>
  <text x="416" y="276" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">←7×2</text>

  <circle cx="390" cy="295" r="18" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="2" cy="295"/>
  <text x="390" y="301" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f97316">7</text>
  <text x="416" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">←8×2</text>

  <!-- Right side: product equations -->
  <line x1="468" y1="66" x2="468" y2="308" stroke="#2d3748" stroke-width="1"/>

  <text x="478" y="82" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">두 집합의 곱 비교</text>

  <text x="478" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">∏ ℤ₉* = 1·2·4·5·7·8</text>
  <text x="478" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">= 2240 ≡ 1 (mod 9)</text>

  <line x1="478" y1="132" x2="628" y2="132" stroke="#2d3748" stroke-width="1"/>

  <text x="478" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">∏ 2·ℤ₉* = 2·4·8·1·5·7</text>
  <text x="478" y="166" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">= 2⁶ · ∏ ℤ₉*</text>

  <line x1="478" y1="178" x2="628" y2="178" stroke="#2d3748" stroke-width="1"/>

  <text x="478" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">두 집합이 동일 →</text>
  <text x="478" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">∏ ℤ₉* ≡ 2⁶ · ∏ ℤ₉* (mod 9)</text>

  <line x1="478" y1="226" x2="628" y2="226" stroke="#2d3748" stroke-width="1"/>

  <text x="478" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#e2e8f0">양변에 (∏ ℤ₉*)⁻¹ →</text>
  <rect x="476" y="256" width="150" height="28" rx="4" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="551" y="274" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" font-weight="700" fill="#4ade80">2⁶ ≡ 1 (mod 9)</text>

  <text x="478" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#e2e8f0">b<tspan baseline-shift="super" font-size="70%">φ(m)</tspan> ≡ 1 (mod m)</text>
</svg>
