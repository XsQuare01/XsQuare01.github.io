<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="1080" height="510">
  <rect width="720" height="340" fill="#0f1117" rx="10"/>
  <text x="360" y="17" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">Cantor Set — 길이는 0이지만 크기는 |ℝ|</text>

  <!-- ===== 좌측: 단계별 제거 과정 ===== -->
  <text x="30" y="42" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#e2e8f0">단계별 중간 1/3 제거</text>

  <!-- Scale labels -->
  <text x="50" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#94a3b8">0</text>
  <text x="530" y="58" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#94a3b8">1</text>

  <!-- Step 0: [0,1] full bar -->
  <text x="30" y="76" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">n=0</text>
  <rect x="50" y="66" width="480" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>

  <!-- Step 1: remove middle [1/3, 2/3] -->
  <text x="30" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">n=1</text>
  <rect x="50" y="90" width="160" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <rect x="210" y="90" width="160" height="14" rx="2" fill="#f87171" fill-opacity="0.15" stroke="#f87171" stroke-width="0.5" stroke-dasharray="3,2"/>
  <rect x="370" y="90" width="160" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <text x="290" y="100" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#f87171">제거</text>

  <!-- Step 2: remove [1/9,2/9] and [7/9,8/9] -->
  <text x="30" y="124" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">n=2</text>
  <!-- [0, 1/9] -->
  <rect x="50" y="114" width="53" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <!-- [1/9, 2/9] removed -->
  <rect x="103" y="114" width="54" height="14" rx="2" fill="#f87171" fill-opacity="0.1" stroke="#f87171" stroke-width="0.5" stroke-dasharray="3,2"/>
  <!-- [2/9, 3/9] -->
  <rect x="157" y="114" width="53" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <!-- [3/9, 6/9] already removed -->
  <rect x="210" y="114" width="160" height="14" rx="2" fill="transparent"/>
  <!-- [6/9, 7/9] -->
  <rect x="370" y="114" width="53" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <!-- [7/9, 8/9] removed -->
  <rect x="423" y="114" width="54" height="14" rx="2" fill="#f87171" fill-opacity="0.1" stroke="#f87171" stroke-width="0.5" stroke-dasharray="3,2"/>
  <!-- [8/9, 1] -->
  <rect x="477" y="114" width="53" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>

  <!-- Step 3: 8 smaller segments -->
  <text x="30" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">n=3</text>
  <rect x="50" y="138" width="18" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <rect x="86" y="138" width="17" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <rect x="157" y="138" width="18" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <rect x="193" y="138" width="17" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <rect x="370" y="138" width="18" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <rect x="406" y="138" width="17" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <rect x="477" y="138" width="18" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>
  <rect x="513" y="138" width="17" height="14" rx="2" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1"/>

  <!-- Dots -->
  <text x="290" y="170" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">⋮</text>

  <!-- n=∞ -->
  <text x="30" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8">n=∞</text>
  <!-- Dust-like dots -->
  <circle cx="50" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="68" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="86" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="103" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="157" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="175" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="193" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="210" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="370" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="388" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="406" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="423" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="477" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="495" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="513" cy="186" r="1.5" fill="#4ade80"/>
  <circle cx="530" cy="186" r="1.5" fill="#4ade80"/>
  <text x="290" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#4ade80">Cantor Set</text>

  <!-- ===== 우측: 핵심 설명 ===== -->
  <line x1="555" y1="34" x2="555" y2="198" stroke="#2d3748" stroke-width="1"/>

  <rect x="565" y="40" width="140" height="56" rx="6" fill="rgba(248,113,113,0.06)" stroke="#f87171" stroke-width="1"/>
  <text x="635" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#f87171">제거된 길이의 합</text>
  <text x="635" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#f87171">1/3 + 2/9 + … = 1</text>
  <text x="635" y="90" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#cbd5e1">길이(measure) = 0</text>

  <rect x="565" y="106" width="140" height="56" rx="6" fill="rgba(74,222,128,0.06)" stroke="#4ade80" stroke-width="1"/>
  <text x="635" y="124" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#4ade80">살아남은 원소의 수</text>
  <text x="635" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#4ade80">|Cantor Set| = |ℝ|</text>
  <text x="635" y="156" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#cbd5e1">불가산 무한 (ℵ₁)</text>

  <rect x="565" y="172" width="140" height="28" rx="4" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1"/>
  <text x="635" y="190" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#a78bfa">길이 0 ≠ 원소 0개</text>

  <!-- ===== 하단: 3진수 해석 ===== -->
  <line x1="18" y1="210" x2="702" y2="210" stroke="#2d3748" stroke-width="1"/>

  <text x="360" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" font-weight="700" fill="#e2e8f0">3진수 해석 — Cantor Set ↔ 실수 전체 일대일 대응</text>

  <rect x="18" y="244" width="330" height="80" rx="6" fill="#0d1524" stroke="#334155" stroke-width="1.5"/>
  <text x="183" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#4ade80">Cantor Set의 원소 (3진수)</text>
  <text x="183" y="284" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">0.0 2 0 2 2 0 0 2 …₃</text>
  <text x="183" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#cbd5e1">숫자 1이 한 번도 등장하지 않음</text>
  <text x="183" y="316" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#cbd5e1">{0, 2}만 사용</text>

  <!-- Arrow -->
  <text x="365" y="285" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#a78bfa">→</text>
  <text x="365" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7.2" fill="#a78bfa">2→1 치환</text>

  <rect x="392" y="244" width="310" height="80" rx="6" fill="#0d1524" stroke="#334155" stroke-width="1.5"/>
  <text x="547" y="264" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" font-weight="700" fill="#60a5fa">[0,1)의 실수 (2진수)</text>
  <text x="547" y="284" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">0.0 1 0 1 1 0 0 1 …₂</text>
  <text x="547" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#cbd5e1">{0, 1} 사용 → 모든 2진수 표현</text>
  <text x="547" y="316" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#cbd5e1">= [0,1) 전체 실수</text>
</svg>