<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 215" width="1320" height="323">
  <rect width="880" height="215" fill="#0f1117" rx="10"/>
  <text x="440" y="20" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#e2e8f0">가산 무한 — 자연수와의 일대일 대응</text>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- ─── LEFT CARD: ℕ ↔ ℤ ─── -->
  <rect x="15" y="30" width="412" height="174" rx="8" fill="#1a2035" stroke="#f97316" stroke-width="1"/>
  <rect x="15" y="30" width="412" height="40" rx="8" fill="rgba(249,115,22,0.15)"/>
  <rect x="15" y="58" width="412" height="12" rx="0" fill="rgba(249,115,22,0.15)"/>
  <text x="221" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.2" font-weight="700" fill="#f97316">ℕ  ↔  ℤ</text>

  <!-- ℕ row label -->
  <text x="32" y="97" font-size="11.2" font-weight="700" fill="#f97316">ℕ</text>
  <!-- ℕ boxes: centers 72,127,182,237,292,347 -->
  <rect x="52"  y="82" width="40" height="26" rx="4" fill="rgba(249,115,22,0.1)" stroke="#f97316" stroke-width="1"/>
  <text x="72"  y="99" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">0</text>
  <rect x="107" y="82" width="40" height="26" rx="4" fill="rgba(249,115,22,0.1)" stroke="#f97316" stroke-width="1"/>
  <text x="127" y="99" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">1</text>
  <rect x="162" y="82" width="40" height="26" rx="4" fill="rgba(249,115,22,0.1)" stroke="#f97316" stroke-width="1"/>
  <text x="182" y="99" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">2</text>
  <rect x="217" y="82" width="40" height="26" rx="4" fill="rgba(249,115,22,0.1)" stroke="#f97316" stroke-width="1"/>
  <text x="237" y="99" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">3</text>
  <rect x="272" y="82" width="40" height="26" rx="4" fill="rgba(249,115,22,0.1)" stroke="#f97316" stroke-width="1"/>
  <text x="292" y="99" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">4</text>
  <rect x="327" y="82" width="40" height="26" rx="4" fill="rgba(249,115,22,0.1)" stroke="#f97316" stroke-width="1"/>
  <text x="347" y="99" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">5</text>
  <text x="396" y="99" text-anchor="middle" font-size="12" fill="#4a5568">…</text>

  <!-- Arrows (ℕ→ℤ, vertical) -->
  <line x1="72"  y1="108" x2="72"  y2="128" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="127" y1="108" x2="127" y2="128" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="182" y1="108" x2="182" y2="128" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="237" y1="108" x2="237" y2="128" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="292" y1="108" x2="292" y2="128" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="347" y1="108" x2="347" y2="128" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ℤ row label -->
  <text x="32" y="153" font-size="11.2" font-weight="700" fill="#38bdf8">ℤ</text>
  <!-- ℤ boxes (wider for negatives) -->
  <rect x="52"  y="130" width="40" height="26" rx="4" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1"/>
  <text x="72"  y="147" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">0</text>
  <rect x="107" y="130" width="40" height="26" rx="4" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1"/>
  <text x="127" y="147" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">1</text>
  <rect x="156" y="130" width="52" height="26" rx="4" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1"/>
  <text x="182" y="147" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">-1</text>
  <rect x="217" y="130" width="40" height="26" rx="4" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1"/>
  <text x="237" y="147" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">2</text>
  <rect x="266" y="130" width="52" height="26" rx="4" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1"/>
  <text x="292" y="147" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">-2</text>
  <rect x="327" y="130" width="40" height="26" rx="4" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1"/>
  <text x="347" y="147" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" fill="#f0f6fc">3</text>
  <text x="396" y="147" text-anchor="middle" font-size="12" fill="#4a5568">…</text>

  <!-- Result -->
  <text x="221" y="191" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.4" font-weight="700" fill="#e2e8f0">|ℕ| = |ℤ| = ℵ₀</text>

  <!-- ─── RIGHT CARD: ℕ ↔ ℚ⁺ ─── -->
  <rect x="453" y="30" width="412" height="174" rx="8" fill="#1a2035" stroke="#38bdf8" stroke-width="1"/>
  <rect x="453" y="30" width="412" height="40" rx="8" fill="rgba(56,189,248,0.15)"/>
  <rect x="453" y="58" width="412" height="12" rx="0" fill="rgba(56,189,248,0.15)"/>
  <text x="659" y="56" text-anchor="middle" font-size="11.2" font-weight="700" fill="#38bdf8">ℕ  ↔  ℚ⁺  (대각선 열거)</text>

  <!-- Column headers (q=분모) -->
  <text x="521" y="82" text-anchor="middle" font-size="8.8" fill="#e2e8f0">q=1</text>
  <text x="611" y="82" text-anchor="middle" font-size="8.8" fill="#e2e8f0">q=2</text>
  <text x="701" y="82" text-anchor="middle" font-size="8.8" fill="#e2e8f0">q=3</text>
  <text x="791" y="82" text-anchor="middle" font-size="8.8" fill="#e2e8f0">q=4</text>

  <!-- Row headers (p=분자) -->
  <text x="465" y="102" text-anchor="middle" font-size="8.8" fill="#e2e8f0">p=1</text>
  <text x="465" y="138" text-anchor="middle" font-size="8.8" fill="#e2e8f0">p=2</text>
  <text x="465" y="174" text-anchor="middle" font-size="8.8" fill="#e2e8f0">p=3</text>

  <!-- Grid cells (row p, col q) — box 44×24, centers at col×row -->
  <!-- Row 1 (y=90..114, center 102) -->
  <rect x="499" y="90" width="44" height="24" rx="3" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1"/>
  <text x="521" y="106" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#f0f6fc">1/1</text>
  <rect x="589" y="90" width="44" height="24" rx="3" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="611" y="106" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#e2e8f0">1/2</text>
  <rect x="679" y="90" width="44" height="24" rx="3" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="701" y="106" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#e2e8f0">1/3</text>
  <rect x="769" y="90" width="44" height="24" rx="3" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="791" y="106" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#a0aec0">1/4</text>

  <!-- Row 2 (y=126..150, center 138) -->
  <rect x="499" y="126" width="44" height="24" rx="3" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="521" y="142" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#e2e8f0">2/1</text>
  <!-- 2/2 = 1/1, skip (dashed) -->
  <rect x="589" y="126" width="44" height="24" rx="3" fill="rgba(74,85,104,0.1)" stroke="#4a5568" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="611" y="142" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#4a5568">2/2</text>
  <rect x="679" y="126" width="44" height="24" rx="3" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="701" y="142" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#a0aec0">2/3</text>
  <rect x="769" y="126" width="44" height="24" rx="3" fill="rgba(74,85,104,0.07)" stroke="#4a5568" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="791" y="142" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#4a5568">2/4</text>

  <!-- Row 3 (y=162..186, center 174) -->
  <rect x="499" y="162" width="44" height="24" rx="3" fill="rgba(56,189,248,0.08)" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="521" y="178" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#a0aec0">3/1</text>
  <rect x="589" y="162" width="44" height="24" rx="3" fill="rgba(56,189,248,0.06)" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="611" y="178" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#a0aec0">3/2</text>
  <rect x="679" y="162" width="44" height="24" rx="3" fill="rgba(74,85,104,0.07)" stroke="#4a5568" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="701" y="178" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#4a5568">3/3</text>
  <rect x="769" y="162" width="44" height="24" rx="3" fill="rgba(74,85,104,0.07)" stroke="#4a5568" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="791" y="178" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" fill="#4a5568">3/4</text>

  <!-- Diagonal path polyline: 1/1→1/2→2/1→3/1→(2/2)→1/3→1/4→2/3→3/2 -->
  <polyline points="521,102 611,102 521,138 521,174 611,138 701,102 791,102 701,138 611,174"
    fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Enumeration numbers -->
  <text x="501" y="93" font-size="8" font-weight="700" fill="#a78bfa">①</text>
  <text x="591" y="93" font-size="8" font-weight="700" fill="#a78bfa">②</text>
  <text x="501" y="129" font-size="8" font-weight="700" fill="#a78bfa">③</text>
  <text x="501" y="165" font-size="8" font-weight="700" fill="#a78bfa">④</text>
  <text x="681" y="93" font-size="8" font-weight="700" fill="#a78bfa">⑤</text>
  <text x="771" y="93" font-size="8" font-weight="700" fill="#a78bfa">⑥</text>
  <text x="681" y="129" font-size="8" font-weight="700" fill="#a78bfa">⑦</text>
  <text x="591" y="165" font-size="8" font-weight="700" fill="#a78bfa">⑧</text>

  <!-- Result -->
  <text x="659" y="200" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9.6" font-weight="700" fill="#e2e8f0">|ℕ| = |ℚ⁺| = ℵ₀  (중복 제외 후)</text>
</svg>
