<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 268" width="930" height="402">
  <rect width="620" height="268" fill="#0f1117" rx="10"/>
  <text x="310" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">b = qa + r 의 시각화 (예: b=14, a=4, q=3, r=2)</text>

  <defs>
    <marker id="arr-line" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#94a3b8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#4ade80"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0,0 7,4 0,8" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Number line -->
  <line x1="40" y1="110" x2="530" y2="110" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr-line)"/>

  <!-- Segment fills (a=100px each, 3 segments) -->
  <rect x="60" y="95" width="100" height="30" rx="3" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.2"/>
  <rect x="160" y="95" width="100" height="30" rx="3" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.2"/>
  <rect x="260" y="95" width="100" height="30" rx="3" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.2"/>

  <!-- Remainder segment -->
  <rect x="360" y="95" width="50" height="30" rx="3" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.2"/>

  <!-- Tick marks and labels -->
  <line x1="60"  y1="103" x2="60"  y2="117" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="160" y1="103" x2="160" y2="117" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="260" y1="103" x2="260" y2="117" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="360" y1="103" x2="360" y2="117" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="410" y1="103" x2="410" y2="117" stroke="#f87171" stroke-width="1.8"/>

  <text x="60"  y="135" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">0</text>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">a</text>
  <text x="260" y="135" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#e2e8f0">2a</text>
  <text x="360" y="135" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10.4" fill="#4ade80">qa</text>
  <text x="410" y="135" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.2" font-weight="700" fill="#f87171">b</text>

  <!-- Segment label: a -->
  <text x="110" y="113" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#86efac">a</text>
  <text x="210" y="113" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#86efac">a</text>
  <text x="310" y="113" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#86efac">a</text>
  <text x="385" y="113" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.8" fill="#fca5a5">r</text>

  <!-- Bottom bracket for qa -->
  <line x1="60"  y1="155" x2="60"  y2="160" stroke="#4ade80" stroke-width="1.2"/>
  <line x1="360" y1="155" x2="360" y2="160" stroke="#4ade80" stroke-width="1.2"/>
  <line x1="60"  y1="158" x2="360" y2="158" stroke="#4ade80" stroke-width="1.2"/>
  <text x="210" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#4ade80">qa (몫 × 제수)</text>

  <!-- Bottom bracket for r -->
  <line x1="360" y1="155" x2="360" y2="160" stroke="#f87171" stroke-width="1.2"/>
  <line x1="410" y1="155" x2="410" y2="160" stroke="#f87171" stroke-width="1.2"/>
  <line x1="360" y1="158" x2="410" y2="158" stroke="#f87171" stroke-width="1.2"/>
  <text x="385" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#f87171">r</text>

  <!-- Formula -->
  <text x="310" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">b  =  qa  +  r</text>
  <text x="310" y="254" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.6" fill="#6b7a99">0 ≤ r &lt; a  (나머지는 제수보다 작다)</text>
</svg>
