<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 410" width="1188" height="738">
  <defs>
    <marker id="ga" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="ra" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
    <marker id="ya" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="660" height="410" fill="#0f1117" rx="10"/>
  <text x="330" y="18" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#e2e8f0">암호화 해시 함수의 3대 보안 성질</text>

  <!-- ===== 1. Pre-image Resistance (일방향성) ===== -->
  <rect x="16" y="28" width="196" height="162" rx="8" fill="rgba(74,222,128,0.04)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="114" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#4ade80">① 일방향성</text>
  <text x="114" y="64" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#e2e8f0">Pre-image Resistance</text>

  <!-- m → H → h (easy) -->
  <rect x="28" y="76" width="58" height="30" rx="5" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="57" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.4" font-weight="700" fill="#4ade80">m</text>
  <line x1="86" y1="91" x2="100" y2="91" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ga)"/>
  <rect x="104" y="76" width="36" height="30" rx="4" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="122" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#fbbf24">H</text>
  <line x1="140" y1="91" x2="154" y2="91" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ga)"/>
  <rect x="158" y="76" width="36" height="30" rx="5" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="176" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.4" font-weight="700" fill="#60a5fa">h</text>
  <text x="114" y="122" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#4ade80">O(1) — 쉬움</text>

  <!-- h → m (hard) -->
  <line x1="176" y1="128" x2="176" y2="144" stroke="#f87171" stroke-width="1.3"/>
  <line x1="176" y1="144" x2="57" y2="144" stroke="#f87171" stroke-width="1.3" marker-end="url(#ra)"/>
  <text x="114" y="140" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#f87171">역산</text>
  <text x="114" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#f87171">2ⁿ — 어려움</text>
  <text x="114" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#cbd5e1">h 주어져도 m 복원 불가</text>

  <!-- ===== 2. Second Pre-image Resistance ===== -->
  <rect x="232" y="28" width="196" height="162" rx="8" fill="rgba(167,139,250,0.04)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="330" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#a78bfa">② 2차 역상 저항</text>
  <text x="330" y="64" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#e2e8f0">2nd Pre-image Resistance</text>

  <!-- m1 → H → h -->
  <rect x="244" y="76" width="46" height="30" rx="5" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="267" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#a78bfa">m₁</text>
  <line x1="290" y1="91" x2="304" y2="91" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ga)"/>
  <rect x="308" y="76" width="34" height="30" rx="4" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="325" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#fbbf24">H</text>
  <line x1="342" y1="91" x2="356" y2="91" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ga)"/>
  <rect x="360" y="76" width="34" height="30" rx="5" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="377" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11.4" font-weight="700" fill="#60a5fa">h</text>

  <text x="330" y="124" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#f87171">H(m₂) = h 인 m₂ 찾기</text>
  <text x="330" y="142" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#f87171">2ⁿ — 어려움</text>
  <text x="330" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#cbd5e1">m₁ 알아도 같은 해시의 m₂ 못 찾음</text>
  <text x="330" y="178" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#cbd5e1">→ 서명 위조 불가</text>

  <!-- ===== 3. Collision Resistance ===== -->
  <rect x="448" y="28" width="196" height="162" rx="8" fill="rgba(248,113,113,0.04)" stroke="#f87171" stroke-width="1.5"/>
  <text x="546" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#f87171">③ 충돌 저항성</text>
  <text x="546" y="64" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#e2e8f0">Collision Resistance</text>

  <!-- m1, m2 → same h -->
  <rect x="460" y="72" width="46" height="28" rx="5" fill="rgba(248,113,113,0.12)" stroke="#f87171" stroke-width="1.5"/>
  <text x="483" y="91" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#f87171">m₁</text>
  <rect x="460" y="106" width="46" height="28" rx="5" fill="rgba(248,113,113,0.12)" stroke="#f87171" stroke-width="1.5"/>
  <text x="483" y="125" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#f87171">m₂</text>

  <line x1="506" y1="86" x2="530" y2="100" stroke="#f87171" stroke-width="1.3" marker-end="url(#ra)"/>
  <line x1="506" y1="120" x2="530" y2="106" stroke="#f87171" stroke-width="1.3" marker-end="url(#ra)"/>

  <rect x="532" y="88" width="34" height="28" rx="4" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="549" y="107" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#fbbf24">H</text>

  <line x1="566" y1="102" x2="580" y2="102" stroke="#f87171" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="582" y="88" width="46" height="28" rx="5" fill="rgba(248,113,113,0.12)" stroke="#f87171" stroke-width="1.5"/>
  <text x="605" y="107" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#f87171">같은 h</text>

  <text x="546" y="144" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#fbbf24">2<tspan baseline-shift="super" font-size="70%">n/2</tspan> — Birthday Paradox</text>
  <text x="546" y="162" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#cbd5e1">①②보다 찾기 쉬움 → 해시 길이 결정</text>
  <text x="546" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#cbd5e1">SHA-256 실질 안전성 = 2¹²⁸</text>

  <!-- ===== Checksum vs Hash comparison ===== -->
  <line x1="16" y1="206" x2="644" y2="206" stroke="#2d3748" stroke-width="1"/>
  <text x="330" y="226" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#e2e8f0">Checksum vs 암호화 해시</text>

  <!-- Checksum -->
  <rect x="16" y="236" width="300" height="150" rx="8" fill="rgba(248,113,113,0.04)" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="166" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#f87171">Checksum — 오류 감지용</text>
  <text x="30" y="278" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#e2e8f0">· 1000 Byte → 합산 → 1 Byte 저장</text>
  <text x="30" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#e2e8f0">· Parity: 1 bit, 합의 홀/짝 검사</text>
  <text x="30" y="318" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#f87171">· 취약점: A+1, B-1 하면 체크섬 불변</text>
  <text x="30" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#f87171">· 의도적 변조에 무력함</text>
  <text x="30" y="358" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#cbd5e1">→ 네트워크 전송 오류 감지에만 사용</text>

  <!-- Crypto Hash -->
  <rect x="344" y="236" width="300" height="150" rx="8" fill="rgba(74,222,128,0.04)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="494" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" font-weight="700" fill="#4ade80">암호화 해시 — 무결성 보장</text>
  <text x="358" y="278" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#e2e8f0">· 임의 길이 → 고정 크기 (SHA-256: 256 bit)</text>
  <text x="358" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#e2e8f0">· 1 bit 변경 → 해시값 완전히 달라짐 (눈사태)</text>
  <text x="358" y="318" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#4ade80">· 해시 맞추는 메시지 조작 = 계산적 불가능</text>
  <text x="358" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="8.3" fill="#4ade80">· MD5, SHA-1, SHA-256, SHA-3 등</text>
  <text x="358" y="358" font-family="system-ui,-apple-system,sans-serif" font-size="9.4" fill="#cbd5e1">→ 서명, 무결성 검사, 패스워드 저장 등</text>
</svg>
